利他的法業生活所需是依在家衆的供施而來的在印度佛與出家弟子每日去村落城中乞食布施飲食的不能説是供僧因為這是隨來乞求的而施與不是平等的施給多數人如在家弟子請多少不定衆去他家裡受供養平等的供給每一位那就是供僧了在供僧中安居施七月十五日最隆重佛制比丘比丘尼在夏三月四月十五七月十五日中雨安居這雖由於雨季不適宜到處遊行而三月中安居修行也是好事古人多有在安居中成聖的所以安居終了俗稱解夏那一天附近的信衆都來供養稱為安居施除豐盛的飲食外還有供養布匹做新衣用的日常用品的這是佛教的大節日佛法是平等的但法在世間也不能沒有限制安居施只布施給在這裡安居的人數是一定的如有聽説這裡的安居施豐厚他處的出家人臨時趕來那安居施是沒有他這一分的出家衆三月安居到這天受比丘戒的年齡長了一歲所以比丘及比丘尼的年齡古稱多少夏中國佛教不重安居與世俗的年節混合所以變成僧臘了這一天比丘比丘尼都大了一歲如父母見兒女長大一樣所以稱為佛歡喜日可是中國佛教七月十五日與餓鬼相結合成為超度鬼魂的佳節唉佛法的演化有些真是出人意外的信衆出家人也可以到寺院裡打齋西藏稱為放茶平等供養就是供僧我受戒時天童寺打齋的分供衆如意齋上堂齋那是依供養金錢多少而分類的現在台灣戒會在上堂齋以上又有齋齋而最高的是護法大齋一般人總説佛教守舊其實創新的也著實不少呢七月十五日供僧中國佛教早變質度鬼而忘記了似乎菩提樹雜志社發起七月十五日供僧由信徒發心集合購買些日用品選定對象到時分別寄去每人一分雖不是安居施而確是喚起供僧的先導者台北蓮華佛學院多年來也發起這樣的供僧不到十年吧中國佛教界在七月十五日有齋比丘比丘尼僧大會元亨寺等局限於南部縣市台北方面是全國全省性的真可説盛況空前四方僧到處遠來見面晤對可以增進佛教僧團的和合團結也許有些作用的不過一全省國性的齋僧地區未免太廣了遙遠的乘車有的可以搭飛機遠地是要早一天動身的為了參加一餐午齋也許還有物品而要費二三天時間總覺得不償失將來全國統一如主辦齋僧大會遠地的飛機往來也要好幾天呢二某次齋會是中佛會與城隍廟合辦的也許是中佛會名義被利用一下城隍廟的神像是屬於中國道教的與中佛會合辦可能城隍爺已經信佛了兩年前曾接到一份城隍廟的月訊似乎也在努力宣揚有一篇文字主題是佛由心成教因魔興八個字佛由心成似乎肯定佛教的即心是佛而教因魔興顯然是反對出家教團的這八個字原本是道門的老話從城隍廟通訊看來即使是自稱信佛或者加入中佛會而城隍廟份子的反佛教出家特性明顯的存在我建議要辦齋僧大會切不可與城隍廟某某宮等合作將來大家神佛不分佛魔不分誰來負因果的責任十拈華微笑盛唐以下佛法日漸在起伏中衰落能始終維持佛法形象受到一般人尊敬的是禪宗雖然禪宗已多少中國化了但從維繫佛法來説對中國佛教的功績是首屈一指的佛法有師承的傳授師長並以護持正法相付囑如西晉譯的阿育王傳説佛告摩訶迦葉言於我滅後當撰結集法眼卷三迦葉付囑阿難而作是言長老阿難我今欲入涅槃以法付汝汝善守護阿難語商那和修我今欲入涅槃汝當擁護佛法卷四商那和修語優波毱多言我今以法付囑於汝卷五優波毱多語提多迦言我今以法付囑於汝卷六在自己要入滅時這樣一代代的付囑下去法藏是佛法藏如摩訶迦葉等所結集的法眼是悟入佛法的清淨知見可見付囑的是結集的法藏與佛法的如實知見付囑後人要後來的護持佛法以達成正法久住的目標這一臨終付囑的傳説元魏所譯付法藏因緣傳共二十四代到師子尊者為止都是這樣的付囑禪宗是菩提達磨傳來的起初也是這樣的臨終付囑一代一人到了黃梅五祖以後來學而得益的不少所以形成了從師長修學而有深悟的就得師長的付囑在形式的付囑外還有密傳心印受付囑不一定在臨終受付囑的也不止一人所以傳説有達磨的預言我本來大唐茲土傳法度迷情一華開五葉結果自然成燉煌本壇經五葉是五代從此以後果實纍纍不再單傳一人了禪宗所傳的西天二十八祖還是依付法藏因緣傳略加補正而成的六祖以後師資授受分為五宗在宋代出現了釋迦付法的新傳説如西元一一八八年宋智昭的人天眼目卷五説世尊登座拈花示衆人天百萬悉皆罔措獨有金色頭陀破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相分付摩訶大迦葉一一九年撰禪門續燈録一一八三聯燈會要也有這一記録但契嵩在皇祐年中一四九一五三所著傳法正宗記卷一對這一付囑還不敢肯定這是過去禪家所沒有的傳説大抵是宋代西元九六以來所傳出的這一傳説出現的意義是釋迦化世一向以聲教為主所以説此方真教體清淨在音聞達磨西來還是以楞伽印心付法藏因緣傳也只是付囑護持而禪宗接引學衆的方便馬祖弘法於西元七五後等以後作風大有變化如彈指謦咳揚眉瞬目推倒禪床棒喝交施可能會引起懷疑過去傳法説的可信性那麼拈華示衆破顏微笑的心心相印而付囑就適合當前的禪風了而且禪師們輕視經論自稱最上乘這一傳説也是很適合的從此拈華微笑被一般看作禪源禪宗是從拈華微笑而來的後來甚至有抹殺五家宗旨單傳釋迦拈花一事謂之直提向上的五宗原序這可能是不滿宗派偏執專在師資授受上起諍論的反響十一付法與接法禪宗自五祖弘忍以下