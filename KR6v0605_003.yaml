壽經的不同譯本也沒有五惡趣字樣所以五應該是三的訛寫不過五趣是三界生死是有漏法雜染不淨法約勝義善説姑且説是三界五惡趣吧三界五趣生死是怎麼出離的有以為佛法的淨土法門是橫超的其他的法門是豎出的豎出的是漸不如橫超的頓出這樣淨土法門是太好了據我的了解解脫生死的佛法都是頓斷橫出的豎出是不能解脫生死的什麼是豎出三界是欲界色界無色界外道依禪定求解脫如離欲界而得初禪那是豎出欲界了離初禪而得二禪離二禪而得三禪離三禪而得四禪還在色界以內如進離四禪而得空無邊處那是豎出色界了空無邊處是無色界中最低的如離空無邊處而得識無邊處離識無邊處而得無所有處離無所有處而得非想非非想處那是無色界中最高的了修到這一地步就不可能離非想非非想處而超出無色界為什麼因為這一修行厭下苦粗障欣上靜妙離是以世俗的欣厭心厭離當前的缺陷而求以上的美妙可是到了非想非非想處再沒有可欣求處也就不能出離非想非非想處了經論中比喻為尺蠖或作屈步蟲緣樹而上總是前腳先搭住上面然後後腳放鬆身體一拱就前進一步這樣的向上到了樹頂向上再沒有落腳處無法前進還是向下回來了厭此欣彼的禪定行也是這樣從非想非非想處退回來又到欲界人間三惡趣中了佛法所以能超出三界不是豎出而是橫出的為什麼有三界五趣的生死是業力所感的為什麼有感報的業力是煩惱所引發的所以要解脫生死重要點在斷煩惱煩惱有枝末的也有根本的佛法能頓斷煩惱根本所以能離煩惱繫而出離生死人間的修行者如截斷三界生死的根本煩惱那就是得初預流果的聖者了得初果的不墮惡趣法決定正趣三菩提正覺七有天人往生究竟苦邊這是説得了初果的再也不會墮落三惡趣了最多也不過天上人間七番生死就決定能得究竟解脫不再有生死苦了經上比喻為得初果的如大湖的水乾涸了只剩一些些水這是説無量無邊的業力沒有煩惱的滋潤所以都乾枯而不再受報僅剩七番生死的總報業力如截斷樹根樹還在發芽開華結果而很快的就不會再生了説出離生死佛法都是這樣説的所以能頓斷生死的根本煩惱那由於智慧的體悟無住無著的根斷我我所見加疑與戒禁取名為三結是勝義慧不是厭下欣上那樣的世俗智所以解脫生死是頓斷對禪定的豎出可説是橫出的淨土行者厭惡五濁惡世而欣求淨土約三界生死説欣厭心是不能出離生死的不過生在淨土的由於環境好諸上善人俱會一處蓮華化生不會生老病死不已在這樣的環境下是一定要解脫生死的所以因中説果不妨説往生淨土已解脫生死了正如得初預流果的雖還有七番生死但決定解脫不妨説我生已盡了至於修行在淨土是否比穢土要快些依經文説淨土修行不如在穢土修行如無量壽經卷下説在此娑婆五濁惡世為德立善正慈心正意齋戒清淨一日一夜勝在無量壽國為善百歲可以説在淨土中進修是緩慢的但不會退墮非常穩當穢土修行功德強進步快只是障礙多風險要大些穢土與淨土法門適應不同根性是各有長處的不要自誇橫出三界了十四帶業往生稱念南無阿彌陀佛能帶業往生極樂淨土這是念佛法門的特勝我沒有查考不知這是那一位淨宗大德所倡説的十年前陳健民居士批評帶業往生是沒有根據的依據經文要消業才能往生於是帶業往生與消業往生在台灣著實熱鬧了一番消業往生是根據觀無量壽佛經的經説觀想念佛念佛的剎土念佛菩薩的身相如説此觀想成者滅除五百億劫生死之罪必定當生極樂世界念佛而可以懺罪就是取相懺於定心中能見佛相及國土相念佛而能懺除生死罪業往生各方淨土是多種大乘經所説的不限於觀念阿彌陀佛往生極樂淨土其實念佛消罪生淨土是沒有一定關係的如觀無量壽佛經説此經名觀極樂國土無量壽佛觀世音菩薩大勢至菩薩亦名淨除業障生諸佛前這是觀念佛消業障生淨土三者一致的經上接著説聞佛名二菩薩名除無量劫生死之罪何況憶念觀念這是聞名也能消罪沒有説淨土這是消罪業不一定生淨土觀無量壽佛經是由於韋提希的我今樂生極樂世界阿彌陀佛所佛才教他修三種淨業正因及觀想淨業正因與願樂生是往生淨土的先決條件否則如般舟三昧經卷上説念佛而見佛現前還問佛怎樣才能往生佛國可見念佛見佛而不發願往生是不一定能往生的淨土行者所説的帶業往生我以為是當然的合理的但並不表示淨土法門的特勝往生是什麼意義死了以後生到別處去就是往生往生人間往生天上都是往生般若經有往生品往生是不限於往生淨土的但往生西方往生淨土我國的淨土行者説多了大家也聽慣了以為往生就是往生西方淨土那是不對的説到業佛弟子都認為衆生無始以來積集了無邊能感生死總報的業力這一生又造了不少造作了善業惡業就有業力潛能存在在沒有受果報以前那怕是千生萬劫業是永不會消失的徹底的解決方法就是智慧般若現證截斷生死根源的煩惱根本煩惱一斷那無邊的惡業善業乾枯而不再受生死報了如種子放在風吹日曬的環境中失去了發芽的能力那種子也就不成其為種子了這是徹底辦法但是深了一點大乘佛法的方便道是以強有力的功德如念佛誦經等壓制罪業使罪業的功能減弱惡消善長轉重為輕罪業還是罪業但功能減弱因緣不具不能再感生死苦報那就是消業了如種子放在石板上種子無法生芽生芽也長不下去重罪輕受一般衆生的業如從人而生鬼的由於某鬼趣業成熟所以往生鬼趣受鬼趣果報但在前生人中還有無始來的種種業與這一生所造的種種業並不因為生鬼趣而消失無邊潛在的業力都帶著往生鬼趣如因善業或禪定力往生天國無邊的業力都帶著到天國去所以依佛法説業是從來隨造業者而去帶業往生的如人有信有願有行念稱名念觀想念佛而求生淨土的只要淨業成就就能往生淨土無邊生死業都帶到淨土去了業與煩惱在淨土中是一樣的一般除得無生忍的上上品往生淨土的沒有斷煩惱煩惱卻不會生起帶有無邊的生死罪業業卻不會感苦報所以我以為帶業往生是當然的合理的大家都是這樣的帶業往生淨土值不得特別鼓吹的十五隔陰之迷四十年前我曾讀過一本淨土宗的書有這麼一句羅漢猶有隔陰之迷意思説修證到羅漢還有隔陰之迷不如往生極樂世界的好但阿羅漢生死已了不會再受後陰怎麼會有隔陰之迷呢我曾向人請教有的説四果羅漢本指第四阿羅漢果有的以為一二三四果都可以稱為阿羅漢才有這樣的文句中國人的作品有些是不能以嚴格的法義來評量的雖這麼説我也不知對不對近見當代雜志三十期所引印光大師淨土決疑論説一切法門皆仗自力縱令宿根深厚徹悟自心倘見思二惑稍有未盡則生死輪回依舊莫出況既受胎陰觸境生著由覺至覺者少從迷入迷者多當然沒有念佛法門的穩當了文句説到既受胎陰從迷入迷者多也許這就是隔陰之迷的一種解説吧先説什麼是隔陰什麼是迷陰是五陰五蘊我們的身心自體佛分別為五陰色陰受陰想陰行陰識陰衆生在生死中只是這五陰的和合相續沒有是常是樂的自我這一生的身心自體是前陰下一生的身心自體是後陰前陰與後陰生死相續而不相同所以説隔陰迷有二類迷事是對事相的迷亂錯誤無知迷理是對諦理無常無我我所空性法住法界的迷惑約迷事説一般衆生及證得初果二果三果的聖者在從此生到下一生的過程中都是不正知的如入胎時或見怖畏或見歡樂的境界在胎中與出生時也這樣的不能正知前生的自己與事都忘失了約事迷説一切衆生就是前三果聖者阿羅漢不會再受後陰都是有此隔陰之迷的不過三果聖者初生時雖不能正知但很快能憶知前生的一切所以釋迦佛的在家弟子得三果而生色界天的有的從天上來下向佛致敬與説偈讚歎如約迷理説凡夫是迷理的如不能轉凡成聖是從迷入迷的初果聖者是能見諦理的一得永得是不會再退失的在入胎出胎時雖不能正知不能現見諦理但所得無漏智果並沒有失落如錢在衣袋中雖沒有取出來用你還是有錢的所以得初果的最多是七番生死得二果一來的一往天上一來人間得三果不還的一生天上就能究竟解脫所以聖者雖有隔陰之迷對解脫生死來説是絶對穩當的解脫生死是為期不遠的聖者決不會從覺入迷不知念佛的人為什麼要怕聖者的隔陰之迷再來研求淨土決疑論的意趣文中説到徹悟自心大抵是針對中國禪者説的我不知禪者的徹悟自心有沒有斷惑見惑是見道所斷煩惱思惑是修道所斷煩惱見惑是見諦所斷的佛教中或説一心見諦或説十五心見諦十五心是十五剎那心就世俗説是一霎眼就過去了所以見惑説斷就斷盡而成聖者不斷就是凡夫見惑是不會斷而未盡的徹悟自心如等於見道斷惑那即使受胎迷著也不可能從迷入迷而一定是由覺至覺的也許中國禪者的徹悟自心內心雖有些超常經驗但不能斷見惑還是與凡夫一般如説思惑沒有斷盡那是二果三果的事怎麼會從迷入迷者多這一段文字是不正確的印光大師是精通天台的淨土行者對這些應該是不會不知道的可能慈悲心重為了弘揚淨土故意這樣説的吧十六四句料簡佛教界流傳有禪淨的四句料簡據説是宋初永明延壽大師造的現在簡略的引述如下有禪無淨土十人九岔路無禪有淨土萬修萬人去有禪有淨土猶如帶角虎無禪無淨土鐵床并銅柱四句偈中的禪不是一般的專指達磨傳來發揚廣大的禪宗淨土也不是十方淨土而是西方阿彌陀佛的極樂淨土禪與淨土表示參禪與念佛往生淨土的修行永明延壽是一位禪淨雙修的在他的著作中並沒有這四句偈所以是否延壽所作是值得再考慮的依四句偈的內容來判斷這是在禪淨都流行的時代作者沒有輕視禪宗而卻是志在西方淨土以淨土行為最殊勝的法門這是四句偈作者的立場有禪有淨土的最為理想如虎稱獸王老虎頭上生角那真是雄猛無上了最理想的有禪有淨土姑且不論所説有禪無淨土無禪有淨土到底怎樣是有怎樣是無如看語録或住過禪堂打過禪七這是不是有禪如有時去佛寺或去居士林蓮社等念佛名號或打過佛七這是不是有淨土如説是有這樣的有禪可能還沒有到達禪的邊緣走入岔路的資格都沒有呢這樣的有淨土就能萬修萬人去嗎念佛而能生淨土的如觀無量壽佛經所説的三種淨業正因其中發菩提心決不是心裡想一下願成佛道願度衆生就得了發起菩提心也不太容易吧放低標準如阿彌陀佛經説執持名號一心不亂其人臨命終時心不顛倒即得往生要修到一心不亂與心不顛倒也不能説是萬修萬人去呀如説有禪把標準提高以為禪者即使徹悟自心還可能多數走入歧途説到有淨土把標準儘量抑低以為只要口頭喃喃稱念阿彌陀佛就可以了那不是公正恰當的料簡六度萬行是如實的難行道念佛往生淨土是方便的易行道難行與易行是有的那是適應根性的不同而又相成的法門決不能如四句料簡偈的那種偏私論法末後一句無禪無淨土鐵床并銅柱可説是豈有此理中國的禪宗自達磨傳來經過中國的玄學化被稱為最上乘禪中國的念阿彌陀佛往生淨土也有適應中國的特性這是中國佛教但佛教是不限於中國的如今日錫蘭等南傳佛教國佛教非常興盛就是我國的隋唐時代也不及他們然而南傳佛教國家沒有我國所弘的禪也不知道西方極樂淨土與阿彌陀佛這當然是無禪無淨土的難道這樣的信佛修行者都要鐵床并銅柱非墮入地獄不可嗎作者處身於禪淨盛行的中國只知道禪與淨缺乏對佛教深廣的遠見一心要弘揚淨土才作出這不合情理的料簡以上所説的橫出三界帶業往生隔陰之迷四句料簡是一般淨土行者用來讚揚淨土法門的依法義説這都含有似是而非的成分但在弘揚淨土來説確有接引初學的作用可以説雖缺乏真實意義卻有為人生善的宣導價值十七臨終助念臨終是病重而死亡快將到來可能幾點鐘也可能拖上幾天人既然生了那就不能不死從生到死的過程中又不免老病生老病死中病而走向死亡確是最痛苦的身體上的病苦阿羅漢也是有的佛在涅槃那一年在三月安居中病已相當重了後來與阿難走向拘尸那的途中受純陀的供養引發了重病如經上説重病發迸出赤血赤痢生起近於死亡之苦南傳長部大般涅槃經學佛不是修到沒有身體的病苦只是身苦心不苦而已中國佛教界似乎多數以無疾而終為修行成就往生淨土的證明如見人生病或纏綿床笫就説他不修行業障深重自己念佛修行只是為了死得好些這可説對佛法沒有正確的了解阿羅漢而成就甚深禪定的臨死也不是沒有身苦只是能正念正知忍苦而心意安詳一般的無疾而終其實是心臟麻痺症或是嚴重的腦溢血很快就死亡了這是世間常事不學佛的窮凶極惡的都可能因此而死如以此為念佛修行的理想之一那可能要漂流於佛法以外了臨終者的痛苦身苦以外心苦是最大的苦痛如人在中年自知病重而不免死亡會想到上有老年的父母下有未成年的兒女中有恩愛的夫妻那種難以捨離的愛念繫縛是苦到難以形容的還有豐富的資産經濟的政治的正在成功的事業眼前一片光明忽而黑暗來臨那是怎樣的失望與悲哀衰老殘年屬於自己的眷屬財富事業權力早已漸漸消失世間是不屬於自己的了臨終會心苦少一些但不論少壯與老年是不能沒有後有愛的會想到死亡以後善良的人好一些以殺盜淫妄為生的不惜損人以成就自己的現在一身將死後顧茫茫恐怖的陰影形形式式的幻境電影般的從心上掠過這是愛所繫縛業所影響比起身體上的病苦心苦的嚴重性是局外人所難以想像的臨終者的身苦心苦苦惱無邊應該給以安慰雖方法與程度不同而可説是一切宗教所共有的釋迦佛的時代知道某比丘某長者病重了會有比丘也有佛自己去的去探病安慰他勉勵他開示佛法的心要使他遠離顛倒妄想身心安定為一般信衆説念佛念法念僧念戒念施念天教病人一心念佛的功德莊嚴圓滿念法是清涼而能解脫的念僧有戒定慧等功德是世間無上福田念三寶功德也就是心向三寶在三寶光明的護念中念戒是念自己的持戒功德念施是念自己曾在功德田悲田敬田中如法的清淨布施念天是念七寶莊嚴的勝妙福樂的天報一心歸向三寶的持戒淨施的一定能上生天上人死生天如出茅屋而登大廈離低級職務而上升這那裡會有恐怖憂苦呢這就是助念幫助臨終的病人使他念三寶等而心得平安佛法在流傳中有些因時因地的演化但原則是相同的唐義淨西元七一年所譯的無常經附有臨終方訣教病人對佛像而起觀想念佛使他發菩提心為病人説三界難安歸依菩提必生十方諸佛剎土教病人禮佛菩薩願生淨土懺悔受戒如病太重了若臨命終看病餘人但為稱佛聲聲莫絶念佛是隨病者的意願不一定稱念無量壽佛與我國不同的是印度沒有專稱阿彌陀佛名號的淨土宗如命終時見佛菩薩來迎病者便生歡喜身不苦痛心不散亂正見心生如入禪定這是當時印度大乘佛教的助念法助念是病重到命終使病死者身心安定的方便臨終助念是佛教安頓病死者的行儀而信佛學佛的決不能專憑臨終憶念的人的死後往生有隨重隨習隨憶念的三類我曾在成佛之道八八八九説到有隨重的或造作重大的善業或造作重大的惡業如五無間業等業力異常強大無論意識到或者沒有意識到重業一直占有優越的地位一到臨命終時或見地獄或見天堂就是業相現前是上升或下墜的徵兆接著或善或惡的重業起作用而決定招感未來的果報這就是常説的強者先牽或有隨習的既沒有重惡也沒有大善平平的過了一生在這一生中對於某類善業或惡業養成一種習慣性這也就很有力量了到了臨命終時那種慣習了的業力自然起用而決定招感來生的果報從前大名長者問佛我平時憶念佛不失正念可是有時在十字街頭人又多象馬又多連念佛的正念也忘了我想那時候如不幸而身死不知道會不會墮落佛告訴他説不會墮落的你平時念佛養成向佛的善習即使失去正念而死還是會上升的因為業力強大是與心不相應的如大樹傾向東南而長大的一旦鋸斷了自然會向東南倒的所以止惡行善能造作重大的善業當然很好最要緊的還是平時修行養成善業的習性臨終自然會因業力而向上或有隨憶念的生前沒有重善大惡也不曾造作習慣性的善惡業到臨命終時如忽而憶念善行就引發善業而感上升人天的果報如忽而憶念生前的惡行就能引發惡業而墮落對這種人臨命終時的憶念非常重要所以當人臨終時最好能為他説法為他念佛説起他生前的善行讓他憶念善行引發善業來感果淨土宗的臨終助念也就是這一道理學佛修行到底平時要緊臨終助念是幫助病人使他能憶念佛心向佛願生淨土不是病人躺著一切讓別人來幫助的念阿彌陀佛名號往生西方淨土的信仰在中國非常普遍所以助念阿彌陀佛也特別流行在這裡我想説到幾點一我國的信佛者似乎只知臨終憶念而不重視業力與一心不亂重善或惡的業力習慣性的善業業力是潛在的或説是心種子或説是無表色或説是心不相應行總之是與現起心不相應的念佛如得一心不亂平時即使忘了也還是得到了的得是心不相應的佛法重視潛在的力量舉喻來説如政治或經濟存有某種潛在問題起初不覺什麼重要有深見遠見的人是見到了的等到潛在的問題發動起來可能手忙腳亂攪得一塌糊塗佛法重視潛力所以修學佛法要平時積集善業念佛的要信願深切念得一心不亂這才是正常的穩當的修行臨終隨重與隨習而往生後世的是多數臨終隨憶念而往生的是少數如病重而心力衰弱不能專注憶念或一病及橫禍等而失去知識不能再聽見聲音想助他憶念也無能為力了二臨終助念是從病重到死亡這一階段的助念臨終方訣説人死了請法師讀無常經孝子止哀勿復啼哭人生的老病死是無可如何而必然要到來的大家不用悲哀了應該從無常的了解中不著世間而歸向菩提這樣的讀經主要是對眷屬及參與喪禮者的安慰與開示是通於佛法及大乘佛法的又説到持咒以淨水及淨泥土灑在尸身上可以消除惡業那是羼入祕密佛教的作法了死亡以後不用再助念了但中國人慎終追遠特別多助念些有人説不斷念佛八小時內不可移動其實死了或六識不起而還沒有死聽不見聲音已失去助念的意義而轉為處理死亡的儀式了三有人發起助念團的組織應病家的邀請而前往助念如出於悲心弘揚彌陀淨土的熱心那是難得的不過好事可能引起副作用如發展為專業組合極可能演變為三百六十行以外的一行未必是佛教的好事了四台灣經濟繁榮佛教也似乎興盛了有佛教界的知名長老大德長者死亡以後四十九日念佛聲不斷這是什麼意義是助念嗎長老們一生提倡念佛精進念佛而臨終及死後還要人長期助念怕他不能往生嗎那是對長老長者的一種誣辱如以七七念佛為紀念那只是中國人厚喪厚葬的變形不是為了死者而是為了活人的場面如有心紀念那在每年忌辰集衆精進念佛不是更有意義嗎對死者的鋪張場面我覺得是應該再考慮的聽説高雄有一位唐一玄長者平時攝化青年老而不已臨終的遺言是不用為我念佛因為我不想去西方不用為我誦經因為我讀的經已夠多了唉末法時代還有老老實實的學佛者十八肉身菩薩印度佛教的出家人死了多採用火葬制如釋迦佛那樣火化後的骨灰稱為碎身舍利舍利是遺體的意思舍利中有堅固的微粒中國人稱之為舍利子是更適合於分散供養紀念的如土葬的稱為全身舍利也有經多年而沒有壞的近代中國佛教界稱之為肉身菩薩這是很難得的但與是否菩薩無關民國四十七年攝受來台的僧青年對當時台灣佛教大有貢獻的慈航法師發現他的遺體不壞被稱為肉身菩薩受到多少人的稱歎那時我在馬尼拉恰好讀到了日報上一篇尸身不壞的報道就寫了篇肉身菩薩但想到那時而發表這篇文字是不合時宜也會被人誤解的文字一擱下原稿也就丟了現在時過境遷對於這一事實不妨依事實而略加説明以人的遺體來説古代埃及以香料斂尸尸身不壞而久存的稱為木乃伊我家鄉的習慣入殮時棺內多放石灰包與燈心草這兩種都是能吸收水分的近代以防腐劑來保存國家偉人的遺體更是不少這種以藥物來保存不是我所要説明的我所要説的是自然不壞的生物中動物死了核果實熟了是會腐爛的但也有例外如桃子在沒有成熟前乾癟而留在樹枝上不會掉下來可以作藥用名為桃梟在動物中蝦蟆就是一例蝦蟆一名土蛙灰色在我家鄉的桑樹上每發見蝦蟆死而乾了沒有腐爛俗稱蝦蟆乾乾蝦蟆民國五十七年我住在台北外雙溪的報恩小築一天一陳風過有什麼從屋上落到門前地上原來是一條蛇蛇頭向上豎起的我驅斥他他卻不睬我只好用竹竿去趕才發現是風乾了的死蛇動物風乾而暫時不壞我想是不會少的説到人在馬尼拉當時所見的報道在南美洲某地國名忘了有一廢棄了的古老教堂一個唱詩班死了都靠在牆壁上有少數已風化倒地了人死了而不腐爛的還真不少民國十七年孫殿英的部下挖掘河北省遵化縣的東陵乾隆帝與慈禧太后的陵寢盜取珍寶在乾隆帝的陵寢中有一棺木內的妃子或采女尸身好好的沒有變壞民國十五六年讀過一本有關蘇俄革命的書書名忘了説到俄羅斯人信仰的東正教天主教的一支傳説神父的信仰虔誠到什麼程度死後是尸身不會壞的所以也留下不壞的遺體在革命期間發現其中有些是假的大概公認為應該不壞的而竟腐爛了怕削弱信徒的信心所以有了偽造的但在這故事中可見東正教的神父確有死而不腐壞的七十七年十二月五日到九日聯合報上有馬仲欣所寫的新疆古尸古尸多極了有一千年前的高昌公主皮膚仍有彈性的古尸有距今兩千年前漢代皮膚光滑五官清晰內臟未損的女尸有三千兩百年前商代手足軀幹毛髮與指甲清晰可辨全身脫水乾縮尸重只有七公斤的古尸我想皮膚光滑內臟未損的古尸應該是經過防腐手續的那個脫水乾縮的可能是自然風乾的在四川時聽人説起西藏的薩迦派就是元世祖時帝師八思巴這一派元代起擁有西藏的統治權對敵人是決不容忍的對不利自己政權的分子指為魔類捉來繫縛在忿怒相明王的腳下就此死了有的死而不壞經長期而後風化骸骨離散在明王腳下恐怖極了這些傳説我沒有親見中的事實如南美洲的俄羅斯的新疆的西藏高原的都有天氣寒冷或極熱乾燥的特性在這種情況下遺體不壞似乎是並不太希罕的説到新疆記起唐玄奘大唐西域記卷十二所説有二石窟各一羅漢於中入滅盡定端然而坐難以動搖形若羸人膚骸不朽已經七百餘歲其鬚髮恆長故衆僧年別為剃髮易衣玄奘所見的在新疆西部的蔥嶺正是天氣冷空氣薄而乾燥的地區玄奘所説有眼見的有傳聞的如七百餘歲年為剃髮這是年久而乾癟了的人死了由於肌肉萎縮水分消失會覺得鬚髮長了不少的也就有每年為剃髮的傳説傳説中的入滅盡定也只是我國所説的肉身菩薩而已中國佛教界禪宗的黃梅五祖曹溪六祖石頭希遷等都是全身不壞的我所見到的普陀山古佛洞有一位那是辛苦募化而建這道場的香港九龍某院有一位是佛教而略有道門氣息的生前經常到星洲與星方的佛教界相熟三十九年閩南大德廣周廣義廣淨三位來香港等候去星洲的手續就住在他那時是他徒弟主持的精舍在台灣除慈老外後來新店有一位清嚴法師也是肉身不壞曾引起徒衆與地方區公所的一番爭奪香港台灣的氣候溼熱死後肉身不壞可能與坐龕有關律制出家人死後是火化的人一死就將身體燒了在中國風俗中未免有些不適應發展出坐龕俗稱坐缸的方式人死了安放在陶瓷的缸中還是跏趺而坐上蓋龕頂作斜尖形象徵塔的形式所以也稱塔龕龕一般是倚山巖而供奉的也有死後棺殮土葬與俗人一樣過了幾年開缸如身體變壞那就火化了檢骨灰入塔如發見肉體不壞那就加漆或裝金而供奉我以為龕是漆封得密密的氧氣不容易進入而龕底缸底大抵是不上釉的水分能微微的滲出如供龕處高燥就有肉身不壞的可能了在台灣慈老的肉身經過三十年偶爾還有人去瞻禮而新店的那一位冷落淒涼似乎誰也忘記了小品般若波羅蜜經卷二説得好我於碎身的或全身的舍利非不恭敬以舍利從般若波羅蜜生故般若波羅蜜所熏故得供養佛與佛弟子的舍利遺體受到尊敬供養是由於曾依此遺體修發般若智慧慈悲等功德以正法自利以正法利益衆生不要以為碎身舍利全身舍利表示什麼修證功德動物人類不知佛法的異教徒肉身不壞的多著呢
