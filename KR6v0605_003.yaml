body:
  text: 中國佛教瑣談一生解脫生死是修行佛法的根本問題所以了生死了生脫死成為中國佛教界的一般論題然而什麼是生什麼是死大家似乎並不想正確的去認識所以不免有以訛傳訛的傳説流行依我們人類來説一般以為胎兒從母胎中誕生就是生釋迦佛不也是四月初八日生的嗎不錯這只是常識所説的生一般誤解了以為這是了生死的生於是傳出了投胎的故事如説老爺睡在書房中似夢非夢的見某人進來正在驚疑不定環來報夫人生了公子哦孩子就是某人的靈魂投胎而生的又如説有女人懷孕過了十個月還沒有生下孩子等山中某老禪師坐化了女人才生下孩子來所以孩子是某老禪師的轉世我國有太多的這類投胎故事使人相信三世因果其實這是我國佛教界的錯誤傳説依佛法説什麼是生生是一期新生命的開始約胎生的人類來説父精母血現代稱為精子卵子和合因業力而識依精血生起名為結生從此識緣名色名色緣識也就是心與肉體的相依日漸成長正常的經三十八個七日約二百七十天而誕生所以生老病死的生是新生命的開始人是依父精母血識三事結合而開始的結胎以後早已有了識後來又有了呼吸那裡要等另一個人的識俗稱靈魂來投胎而才生呢二死死是一期生命的結束依佛法説人死了或立即往生如地獄天上等或要等因緣如人要有父精母血和合而往生人如已經死了是不可能復活的但我國民間及佛教界的傳説中有的説某人死後去了地獄見到閻王原來陽壽未終所以被飭回而活了轉來有的説某人死後魂遊地獄活轉來説得繪影繪聲這類傳説不少有些不一定是造謠但都是錯誤的這是在病到某種情況如呼吸停止等一般以為是死了這才有死了活轉來的傳説病人在信仰或社會傳説影響下有怕墮地獄的意識所以從昏迷醒來可能有去了地獄一趟的感覺其實這並不是死還在病的階段所以死了活轉來的傳説是錯誤的不合佛法的怎樣才是死通俗以呼吸停止沒有知覺為死亡然如溺水縊死等呼吸停止每能依人工呼吸而恢復所以但憑呼吸停止是不能確定為死亡的佛教及外道修得第四禪的身行滅出入息停止了然身體健康等到一出定呼吸就立刻恢復了印度的瑜伽行者每有埋在土裡數小時出來還是好好的這一定是修到呼吸停止否則沒有被土埋而不窒息死的説到知覺一般是接觸外境色聲香味觸而起的佛法名為眼識耳識鼻識舌識身識前五識如修習而得禪定五識都是不起的從前釋迦佛在田邊入定當時雷電交加田裡的人與牛都被電殛死了那種近距離的霹靂聲佛也沒有聽見五根五官的沒有引起知覺當然不能説是死的還有意識是內在的了別作用依五識而引起的知外物也知內心知事也知理法則規律等知有也知沒有知當前也知過去未來這樣的意識一般人是沒有中止的但在悶絶昏厥得不省人事熟睡無夢時意識也是不起的特別是修無心定無想定滅盡定的六識都長時沒有了但只定中不起而不是死了所以也不能但憑沒有知覺而認定為死的人類因疾病而瀕臨死亡邊緣近代醫學界以腦死來決定如腦幹死了不能自己呼吸即使心臟還在跳動但不久就要停止所以腦死了不能再生存下去就可宣告死亡然依佛法説這不能説是死這是在向死亡接近的過程中不能因為不久一定死就宣告已死亡了佛法説死是一期生命的最後結束經上説壽暖及與識三法捨身時所捨身僵仆如木無思覺壽暖識三者不再在身體上生起也就是沒有這三者才是死了倒在地上的身體與砍斷了的樹木落地的蘋果一樣識不但沒有六識內在的細意識十八界中六識界以外的意界也不再生起了暖人是熱血動物如體溫下降全身冷透了就是死因病而死的體溫漸漸消失以全身冰冷為準壽也稱為命根指從業力而受生的生存有局限性因業力而決定的生存期限稱為壽命一般人或酗酒縱欲飲食沒有節制等不知維護身體而受到傷害或受到疾病的傳染等早衰而早死或受到水火戰爭等而橫死的大都不能盡其壽命無論是病死或橫死如沒有了識與暖壽命也就完了這三者是同時不起而確定為死亡的這樣如還有體溫也就是還有意界識與壽命而醫生宣告死亡就移動身體或捐贈器官的就進行開割手術那不是傷害到活人嗎不會的如病到六識不起等於一般所説的腦死身體部分變冷那時雖有微細意界唯識學稱為末那識與阿賴耶識但都是捨受不會有苦痛的感受移動身體或分割器官都不會引起苦痛或厭惡的反應所以如醫生確定為腦死接近死亡那麼移動身體與分割器官對病近死者是沒有不良後果的三鬼與地獄在生死輪回的六趣六道中鬼與地獄是六趣中不同的二趣鬼與地獄可説是古代極一般的信仰在佛法傳來以前我國也早有了鬼與近似地獄的信仰佛法傳來在重信仰的民間佛教中鬼與地獄有了混合的傾向特別是盛唐以後佛教偏重實行法義的理解衰落傳出了國人自己編寫的經典鬼與地獄被混合為一成為民間的信仰在我國古代的傳説中如魑魅魍魎魃魈等或是山精木怪或是災旱疫癘的厲鬼有關天象的稱為神人類是聚族而居的最初想到的死是回到民族祖神的所在帝所如文王的在帝左右但知識漸增自身的所作所為深深的有了罪惡感不但一般人自覺沒有回歸祖神所在的可能連君主也要舉行封禪禮在高山上加些土封在山下挖掉些土禪才有出地府而登天的希望這樣才有人死曰鬼鬼者歸也的信仰鬼起初似乎還有些自由如對於生前的怨敵有訴之帝所而來索命的也有對生前的恩人如結草銜環來報恩的不過人類的命運越來越悲慘終於為鬼而住在地獄中了從戰國時代的傳説來看古代的死鬼住處略有三處一東方泰山是夷族殷商屬於這一系發展的中心地帶泰山最高泰山下有梁父蒿或作高里等山是當時的葬地所以古代的挽歌極可能起初是推挽靈車去安葬時所發的哀聲有梁父吟泰山吟蒿里薤露等名目人非死不可似乎有鬼卒來提取那樣所以漢代古樂曲説鬼伯一何相催促人命不得少躊躇死了就是鬼葬在地下鬼也在地下淒慘而不得自由所以説魂歸泰山獄這是地獄一詞的來源二西方九原或作九京在今山西省絳縣是晉國士大夫的葬地黃河流域是黃土地葬在地下地下是有水的所以有黃泉一詞九原也就稱為九泉了黃泉九泉都是鬼魂的住處三南方長江上流古代有夔越在今四川的奉節這裡古代稱歸州秭歸夔歸都與鬼有關所以奉節以西長江北岸的酆都後來被傳説為鬼魂住處我國是多民族融和而成的地區廣大鬼的住處當然也不可能一致但死了鬼在泰山獄的傳説由於這裡的文化高影響大西漢時已成為普遍的信仰了佛教所説的地獄與鬼是不同的兩類衆生地獄原語音譯為泥犁那洛迦等意義是苦器住著最苦痛的衆生這一類衆生主要的在地下所以早期的譯經者為了國人的容易接受就譯作太泰山地獄如吳支謙譯的佛説八吉祥神咒經説不墮太山地獄西晉失譯的鬼子母經説盜人子殺噉之死後當入太山地獄中後來譯師們都譯作地獄或音譯為泥犁那洛迦等太山是方便的譯法其實地獄並不是在泰山的地獄可分四大類一八熱地獄在地下最底層是阿鼻無間地獄這是地獄中最根本的到處充滿火焰與基督教所説的永火相近二遊增地獄每一熱地獄的四門每門又有四小地獄八熱地獄四門各有四獄總共有百二十八地獄這是附屬於大地獄的是從大地獄出來的衆生要一一遊歷的苦處所以總名為遊增三八寒地獄是極寒冷的苦處都以寒冷悲號及身體凍得變色為名四孤獨地獄這是在人間的山間林中等過著孤獨的非人的生活可説是人間地獄八熱八寒遊增孤獨總有十八地獄部派中也有立八熱十寒十八地獄的我國一向傳説十八層地獄説十八是對的但不是一層一層的十八層總之這是六道中最苦痛的受極熱極寒或在人間而受非人生活的一類説到鬼本於印度的固有信仰佛教又加以條理簡別鬼的原語為閉戾多一般譯作餓鬼印度傳説世界最初的鬼王名閉多是父或祖父老祖宗所以閉戾多是父或祖父所有的意思這與中國傳説人死了回到祖神那裡一樣後來的鬼王名為閻魔王或譯閻羅閻魔羅鬼閉戾多也分二類一住在閻魔世界的由閻魔王治理二散在人間的多數在樹林中所以稱樹林為鬼村這些鬼可分三類無財鬼少財鬼多財鬼無財鬼與少財鬼是沒有飲食可得或得到而不大能受用這是名符其實的餓鬼多財鬼中也有享受非常好的與天神一樣這與我國所説人死為鬼如有功德的為神意義相近這是約人死為鬼而説的所以名閉戾多依佛法説人間兒孫的祭祀唯有這類餓鬼才會接受兒孫的祭品從六道輪回來説鬼不一定是人死為鬼人死也不一定做鬼的也可能是從地獄畜生天中來的這類鬼名目繁多有與天象風雲雷雨等有關的有與地山河地林榖等有關的有高級而被稱為天神的也有極低賤的名目有夜叉羅剎乾闥婆緊那羅鳩盤陀毗舍遮富單那迦吒富單那等夜叉是手執金剛杵的羅剎男的非常暴惡而女的以色欲誘人致死乾闥婆是愛好音樂的緊那羅頭上有一角鳩槃陀形似冬瓜以噉人精氣為生的這類鬼泛稱為鬼神高級的稱為天如四大王衆天忉利天有些是鬼而又天天而又鬼的也有畜生而天的如龍迦樓羅摩睺羅伽等這類鬼神有善的也要信受佛法護持三寶惡的卻要害人障礙佛法所以佛法有降伏這些鬼神的傳説這類鬼神近於中國的魑魅魍魎雷神河伯龍鳳等與人死為鬼是不同的佛教傳説的鬼神為中國人所關切的是人死為鬼在地獄中的鬼受到儒家慎終追遠的孝道思想誰都關心死後父母等的餓鬼生活希望有所救濟使孝子賢孫們得到安慰首先傳來西晉失譯的報恩奉盆經我國又敷衍為大乘化的盂蘭盆經經上説目連尊者的生母墮在餓鬼中請佛救濟佛説在七月十五僧自恣日發心供養僧衆可以使七世父母六親眷屬等脫出三途三惡趣的苦報這是有印度習俗成分的但到了中國大大的發展起來流傳出目連救母的故事演變為著名的目連戲不過目連只是阿羅漢重大乘的中國佛教終於發見了與地有關的地藏菩薩依地藏十輪經説地藏菩薩特地在穢土人間現出家相宣説種種墮地獄的惡業勸告在家衆不可違犯這是著重化度衆生不致於墮落地獄而不是專門救墮地獄衆生當然地藏菩薩神力示現也有現閻羅王身地獄卒身的就這樣中國佛教開展出地藏菩薩救度地獄餓鬼的法門一地藏菩薩本願功德經傳為唐實叉難陀所譯但在唐宋的經録中沒有這部經宋藏麗藏磧砂藏元藏也沒有到明藏才有這部經這是可疑的地藏菩薩本願功德經説到一位婆羅門女以孝順心供養佛塔稱念佛名使墮在地獄中的亡母生天又説地藏菩薩的本生光目女發大誓願願度盡地獄等惡道衆生然後成佛就這樣要墮地獄的母親脫離了苦難重孝道重於度脫地獄餓鬼衆生適合中國人心可説是目連救母的大乘化二地藏菩薩發心因緣十王經續藏經乙二三傳説是趙宋藏川所傳出的陰間地府閻羅國中有十王就是一般傳説的十殿閻羅人死以後要在這裡接受十王的審判怕他們審判不公地藏菩薩也會來參加裁斷十殿閻王加上判官鬼卒儼然是陽人間官府模樣依佛法自作惡不善業是故汝今必當受報自作自受隨業受報是不用審判的地藏菩薩發心因緣十王經説無非參照人間政制編出來教化愚民十殿閻羅大都塑造在民間的城隍廟中地藏與十王的傳説與目連救母説混合終於陰曆七月被稱為鬼月了鬼者歸也中國舊有死後招魂有魂兮歸來的傳説陰陽家以為人死了在一定時間內要回來的所以有避煞接煞的習俗有一位法師説人死後就像去旅行一般總要回到自己的房子身體文殊三二期這不是佛法只是中國固有的民間信仰七月十五日道家稱為中元節恰好佛教説七月十五自恣日供僧可以度脫餓鬼的苦難再與地藏閻羅王説相混合而有七月底為地藏菩薩誕的推定中國民間及佛教信仰七月是開放月地獄的鬼魂都回故鄉來探望親人唐代實叉難陀與不空都譯出救拔焰口餓鬼陀羅尼經不空還傳出焰口儀軌焰口是餓鬼中口出火焰的所以或譯面然燃這是印度佛教後期祕密大乘的救度餓鬼法可以救度無數的餓鬼適合中國人死為鬼的信仰七月裡到處放焰口救度父母眷屬的鬼魂有的稱之為普度倒也合適七月裡大批的鬼魂擁到到處放焰口有的七月裡誦地藏菩薩本願經放我想是發放救濟餓鬼飲食的意思中國的陰曆七月是教孝月救鬼月也可説是鬼魂回鄉渡假月熱鬧非凡儒釋道三教混合的七月超度與佛法中地獄與鬼的原意似乎越離越遠了四嬰靈嬰靈是近年台灣佛教界的新話題有人説墮胎的罪業極重嬰靈會纏繞生母使母親晝夜心神不寧甚至全家不安嬰靈非超度不可如要超度可到他的寺院去代為超脫有人説這不是佛法無非妖言惑衆設法斂財我不想斷人的財路因為形形色色的財神法多著呢這裡只是依佛法來論究一番嬰靈纏繞母親等是不合佛法的超度嬰靈者所根據的經典佛説長壽滅罪護諸童子陀羅尼經是我國歷代的經録藏經所沒有的近代日本人編輯的續藏經才出現這部經這是可疑的什麼是五逆殺父殺母殺阿羅漢破和合僧出佛身血這是窮凶極惡的重罪要墮無間地獄的這樣的五逆罪可説是一切經所同的但該經的五罪除去殺阿羅漢而改為墮胎是無間重罪這可論定為後人可能為日本人偽造的嬰靈會不會纏擾母親依佛法是不會的胎兒夭死了或生人間天上或墮惡趣依胎兒過去生中的善惡業力而決定墮胎而死的胎兒還不會引起怨恨報復的敵意怎麼會纏擾母親使母親日夜心神不寧然而墮胎的母親可能會出現嬰靈纏擾的情形那是由於做母親的對墮胎有罪惡感內心深處總覺得對不住親生的骨肉而引起的我從前看過一篇故事書名早已忘了甲與乙是好朋友合資到外地去販賣獲利相當豐碩在歸途中甲起了歹意在住宿無主破屋的那天晚上甲把乙殺了破屋也放火燒了自己帶著全部金銀趕著上路返家回家後每晚夢見乙來索命纏擾不休於是到處求神拜佛作功德超薦但總是陰魂不散時常出現有時白天也聽到乙的聲音半年下來錢快用完了甲的身體已困頓不堪奄奄一息一天上午乙忽然走進來甲嚇得昏了過去原來那天晚上附近的鄉人見破屋起火趕來救火也把被殺而沒有死的乙救了乙以為是盜賊所傷怕甲也遭了毒手所以在身體療養復原後來甲家報告不幸的消息等甲醒來才明白了事實不過錢已用完了甲弄得瘦骨支離乙又沒有死這件事就算了在這一故事中乙並沒有死那害得甲身心不寧半死不活每晚來纏繞的乙的鬼魂是那裡來的呢這是甲的內心負疚是甲自心所現的屠宰者臨死有見無數豬羊來索命的也是如此墮胎而感到嬰靈纏擾不休也就是這樣胎兒早已在他處託生那裡會來糾纏呢嬰靈的纏繞雖是虛妄的但墮胎的罪惡卻是真實的在殺戒中殺人及似人都是重的殺罪似人就是沒完具人形的胎兒雖還沒有出生或沒有完具人形但胎兒的生命與誕生的人是沒有差別的世間的習俗與國法也許有合法的墮胎但在佛法這是極重的罪惡世間事有些是難以理解的如兩性交合實際上是為了種族的延續不是為了欲樂動物的兩性交合多數是有時間性的也許人類進步了在種族的延續要求下發展為情愛有的旦旦而伐似乎還不能滿足現代的人類更進步了進步到戀愛至上人有滿足性交欲樂的權利進步到要戀愛要性交不要負生男育女的義務進步的人類哪進步到違反自然法則自然怕真要向人類低頭了五經懺法事經懺法事或作經懺佛事現代中國台灣的佛事非常興隆富有中國佛教的特色可説是現代中國佛教的主流經懺佛事從印度的大乘佛法中來經是經典的受持讀背誦解説書寫等如般若經法華經等説法華經稱讀誦等者為法師法師是法唄𠽋的意譯在佛教中唄𠽋者是主持音聲佛事的法唄𠽋法師是領導大家來讀經誦經寫經現在印刷方便所以少有人抄寫流通了解説應該是通俗的講説如俗講依龍樹説這是入智慧的方便大智度論卷五十四讀誦書寫供養經典施他經典對當時大乘法的興起流行有相當重要的作用所以讚歎為成就無量無邊功德懺通俗的説是懺悔早期集成的舍利弗悔過經傳出了三品法門悔過隨喜勸請請佛住世請佛轉法輪這一法門是在十方現在佛前懺悔的與律制的懺法不同所以含有稱念佛名與禮佛末了要發願回向這一法門的經典不少主要為禮十方佛稱名讚佛德供養佛懺悔業障擴充到三障五障隨喜勸請二事回向華嚴經的普賢行願品長行又加常隨佛學與恆順衆生成為十法這一法門龍樹稱之為方便的易行道憶念禮敬稱十方佛名經中每舉十方十佛或三十五佛五十三佛為代表也稱諸菩薩的名號然後懺悔隨喜勸請回向這樣修行信願力增強就能進修六度等菩薩大行十住毗婆沙論卷五六天台智者大師立五悔法懺悔勸請隨喜回向發願作為法華觀門的助行摩訶止觀卷七下普賢行願品依此而回向彌陀淨土唐代所傳的祕密儀軌也是以此為修行前方便的與咒語相結合以懺悔為要門的方便修行促成大乘佛法相當的發達如大正藏經集部卷十四從四二六佛説千佛因緣經到四五九文殊師利悔過經都有相同的意義稱佛名號可以懺除業障往生淨土而稱念佛名等還有種種現生功德與般若經等所説讀誦經典相同所以誦經也好念佛禮懺也好有共通的意義而被聯合起來經懺的成為一詞也許因此而來禮佛稱名的懺悔如舍利弗悔過經説持悔過經晝夜各三過讀晝夜各三過讀那是一日一夜六時讀誦經的可説是懺悔與誦經的統一從譯典來看印度佛教發展為誦偈的禮懺如龍樹寶行王正論説現前佛支提日夜各三遍願誦二十偈佛支提是佛舍利塔當時佛像還不多所以在塔前誦偈所誦的二十偈就是禮佛懺悔勸請隨喜等東晉佛陀跋陀羅譯出的文殊師利發願經共四十四偈就是普賢行願品六十二偈的初型出三藏記集卷九文殊師利發願經記説外國四部衆禮佛時多誦此經以發願求佛道這可見禮佛稱名懺悔為主的誦偈已成為印度大乘佛教的一般行持在中國梁陳時代西元五三五八八懺文發達起來唐道宣的廣弘明集卷二十八所載有梁武帝梁簡文帝陳宣帝陳文帝及江總所作的懺文不只懺文而編成懺法儀軌的是陳隋間的天台智者大師智者撰有法華三昧懺儀請觀世音懺法金光明懺法方等三昧懺法懺法智者是稱為行法的後人改稱為懺法天台的後人唐湛然有法華三昧補助儀方等懺補助闕儀到宋代法智有修懺要旨金光明懺儀大悲懺儀遵式有金光明護國儀治定請觀世音菩薩消伏毒害陀羅尼三昧儀治定往生淨土懺儀熾盛光懺儀小彌陀懺儀法華三昧懺儀淨覺有楞嚴禮懺儀仁照有仁王懺儀南宋晚年有志磐的水陸道場儀軌宋初的法智專心講經禮懺三十年而遵式被諡為懺主可見宋代天台學者的重視懺法天台教觀的弘揚與禮懺相結合是影響中國佛教最深切的屬於賢首宗的有唐宗密的圓覺經道場修證儀知玄的慈悲水懺法等從懺法的內容來説有懺罪的是懺法中的取相懺要見相才能消除業障有作為修行的前方便天台宗華嚴宗密宗淨土宗都有這類懺天台的懺法本是以此為主的以上都是自己修持的有為人消災的如陳永陽王從馬上墮下來昏迷不知人事智者曾率衆作觀音懺法永陽王得到了平安這是為人的現生利益而修懺有為國家修懺的如天台宗的法智與遵式仁王護國般若經説到請百位法師一日二時講讀此經不但護國亦有護獲福這是為了國家而講讀經典與修懺法的仁照有仁王懺法誦經修懺法門在民間發展中漸漸的重在消災植福超度鬼魂關鍵在元代元是文化低的蒙古人成為中國的統治者對各種宗教都受到保護但自元世祖起西番僧現在稱為喇嘛受到了異乎尋常的尊敬與縱容對中國傳統的佛教好處是三武二宗加一宋徽宗佛教受到破壞都有道士在從中作怪到了元代總算在帝王的支持下佛道一再辨論達成焚毀一切偽造道經的勝利現在還是編在道藏中壞處是西番僧大都是不僧不俗的修男女和合的歡喜法有的還蒙元帝賜幾位美女國家隨時都在作消災植福的功德經懺法事還成立功德司來管理這主要也是西番僧的事上有好之下必有甚者內地僧侶的不僧不俗與民間的經懺法事當然會大大流行起來明太祖護持佛教也要維持僧伽清淨的從洪武二十四年申明佛教榜册釋氏稽古略續集卷二所見僧人分三類在禪僧講僧以外有瑜伽僧也稱為教僧就是為人誦經禮懺的應赴僧誦經禮懺的已成為一大類怕還是多數中國佛教是大變了榜册中明令有眷屬妻的還俗如與眷屬分離準豫住寺修行對私有眷屬潛住民間的嚴加取締官府拿住必梟首以示衆不僧不俗的情形太嚴重了並禁止民間世俗多有倣僧瑜伽者呼為善友這類應赴經懺的在家人從前我以為上海五馬路今日台灣才有這種現象原來元明間也曾如此虧了明太祖的護持總算阻遏了歪風沒有變成不僧不俗僧俗不分的但在民國初年太虛大師所見的佛教清高流坐香坐禪流講經流懺焰流其衆寡不逮後一懺焰流之什一懺焰流就是瑜伽僧占佛教僧侶十分之九以上台灣似乎少一些這才是元明以來的佛教的主流著重於消災消業超度亡靈的經懺法事現在流行的有一水陸齋會是盛大的普度法會宋釋門正統卷四説梁武帝夢見神僧要他作水陸大齋普度苦惱衆生誰也不知水陸大齋是什麼志公勸武帝廣尋經論武帝在經中見到了阿難遇面然鬼王建立平等斛食這才制立儀文天監四年二月在金山寺修水陸齋帝親臨地席詔僧祐律師宣文志磐的佛祖統紀也這樣説但略去了阿難見面然焰口鬼王事阿難見面然鬼王出於佛救面然餓鬼陀羅尼神咒經是唐西元六九五七四年實叉難陀譯的武帝尋經怎能見到唐代的譯經志磐大概感覺到這一問題所以略去了但是釋門正統所説有事實的成分如説諸仙致食於流水鬼致食於淨地布施餓鬼飲食是放在淨地上的布施仙人及婆羅門飲食瀉流水中這確是救面然餓鬼陀羅尼神咒經所説的水陸二字是依此得名的在每一餓鬼前各有摩伽陀斗四斛九斗飲食也就是平等斛食的意義這樣普度餓鬼仙人的水陸大齋會一定在實叉難陀譯經以後不可能是梁武帝所撰的佛祖統紀卷三三説唐咸亨西元八六八七三年間西京法海寺道英禪師夢泰山府君説起知道梁武帝所集的今大覺寺義濟得之這才得到了水陸儀自是英公常設此齋流行天下這才是中國流行水陸齋會的事實無論是義濟或道英極可能是唐末咸亨年間假傳泰山府君所説託名為梁武帝所集而興起來的二梁皇懺是懺罪消災救度亡靈的法事元末覺岸的釋氏稽古略卷二説梁武帝的夫人郗氏生性殘酷嫉妒死後化為巨蟒在武帝夢中求拯拔帝閲佛經為製慈悲道場懺法十卷請僧懺禮這是梁皇懺的來源稍微早一些的念常編佛祖歷代通載也説到郗氏的酷妒死後在夢中見帝並關心武帝的健康武帝因於露井上為殿衣服委積置銀轆轤金瓶灌百味以祀之卷九文中並沒有説到懺法但目録中作郗氏夫人求懺這應該是後人改寫的郗后的酷妒死後化作龍形唐高宗時李延壽所作的南史已有記載佛祖歷代通載進而説祭祀釋氏稽古略就説到懺法佛祖歷代通載説是天監四年釋氏稽古略改為二年這是天監四年水陸齋會傳説的翻版茶香室叢鈔説梁皇懺是梁代諸名僧刪改齊竟陵王的淨行法門而成元代的妙覺智等重加校訂審核成為現行的梁皇懺慈悲道場懺法可以推定的這是元代所編假借梁武帝的名字來推行的在中國佛教史上梁武帝確是誠信佛法的隋歷代三寶紀卷十一説武帝為了建福禳災或禮懺除障或饗神鬼或祭龍王命寶唱等集録了衆經懺悔滅罪方法等八部雖只是集録經文但對建福禳災禮懺除障饗鬼神與祭龍王等法事是會有影響的這可能是水陸齋會與慈悲道場懺法都仰推梁武帝的理由吧三瑜伽焰口是以超度餓鬼為主的唐不空譯的救拔焰口餓鬼陀羅尼經是實叉難陀所譯救面然餓鬼陀羅尼神咒經的再譯不空並譯出瑜伽集要救阿難陀羅尼儀軌經明藏有較廣的瑜伽集要焰口施食儀可能是元代西番僧所出的明清又有各種不同的改編本施食救濟餓鬼在我國的晚課中有蒙山施食儀近代有人擴編為大蒙山施食儀也有作為法事的水陸齋會瑜伽焰口蒙山施食救度鬼魂的本質是相同的在祕密大乘中只是低級的事續適應中國的人死為鬼與慎終追遠的孝思這一超度鬼魂的法事得到了異常的發展七月鬼月普度而施放救濟品焰口到處都在舉行流行的水陸齋會內壇是主體加上大壇的禮懺華嚴壇淨土壇等的誦經念佛成為經懺法事中最具綜合性的大法事四大悲懺法宋知禮依大悲心陀羅尼經而編成的本是修持的方便但觀世音與現生利益消災植福西方淨土有關所以也成為一般的經懺法事五慈悲三昧水懺是唐末知玄所輯成的可以消釋宿世的冤業也相當的流行六淨土懺往生淨土懺願儀是懺罪而往生西方淨土的七藥師懺依藥師經而造作為消災延壽的法事八地藏懺慈悲地藏懺法這當然是超度亡魂用的此外還有血湖懺金剛懺壬申懺等流行的相當多再説與稱佛名有關的二部懺法萬佛懺與千佛懺陰曆年初寺院中多數拜萬佛與千佛由出家人主持唱誦在家信徒也隨著禮拜這是依佛名經及三千佛名經而來的元魏菩提流支譯佛名經十二卷是大乘經中佛名的集成大正藏中有三十卷本的佛名經每卷都列舉佛名經法名菩薩辟支佛阿羅漢僧名稱名禮敬三寶後有懺文末後附録偽經大乘蓮華寶達問答報應沙門經一段稱法顯傳為法顯傳經分賓頭盧頗羅墮為二人這部佛名經的編集者對佛法的理解顯然是幼稚的三十卷本的佛名經唐開元釋教録卷十八列入偽妄亂真録並且説群愚倣習邪黨共傳若不指明恐穢真教似乎當時已流傳民間了麗藏本在卷一末的校勘記説然此三十卷經本朝盛行行來日久國俗多有倚此而作福者今忽刪之彼必衆怒作福就是作功德知道是偽妄而不敢刪去可以想見流行的盛況了這部經的後二卷與三千佛名經中的現在千佛名經相合也是稱佛名與懺悔的過去未來千佛有佛名而沒有懺法萬佛懺與千佛懺就是依此而來的在現在流行的經懺中萬佛懺與千佛懺及大悲懺法還有集衆禮誦懺的其他懺法都成為僧衆代人禮誦的經懺法事也就是瑜伽應赴僧的專職了經懺法事本出於大乘的方便道演化為應赴世俗的法事從適應世間來説是有相當意義的任何宗教普及社會對信徒都會有一定的宗教義務如結婚生孩子弟兄分家喪葬基督教也會為信徒舉行禮拜天主教伊斯蘭教等都各有不同的宗教儀式中國佛教的經懺法事可説是普及民間滿足信衆要求而形成的在佛教國家中中國是經懺法事最興盛的唐宋時代日韓僧侶來中國求學佛法也有為信徒誦經等行儀代表原始佛教的律部中信徒如生孩子造新房外出遠行去經商喪葬等都會請僧衆去受午供吃好了飯施主在下方坐聽上座略説法要説偈頌回向功德唄𠽋者由此而來如上座不會説法就背誦一則佛經這就是應赴受供為信衆作功德為信衆誦經的起源初期大乘佛法興起誦經禮佛稱名懺悔等方便自力而含他力的思想中國式的經懺法事雖多少中國化了而實受後期祕密大乘的影響如大灌頂神咒經第十二卷是藥師經的古譯是晉人編集的也有印度傳來的內容第十一卷佛説灌頂隨願往生十方淨土經也是地獄餓鬼不分的對臨終及已經死亡的一再説要為他轉讀經修福為人誦經禮懺以救度亡者在中國人死為鬼慎終追遠的民俗中是需要的如明洪武二十四年的聖旨説率衆熟演顯密之教應供是方足孝子順孫報祖父母劬勞之恩適應中國民俗不妨有經懺法事但對中國經懺法事的泛濫總覺得是佛法衰落的現象因為一中國的經懺多主要是人死了都要做功德有