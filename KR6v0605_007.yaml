body:
  text: 談法相在香港三輪佛學社講貴社三輪佛學社重於法相唯識學所以舉法相為題而略加討論一般説來法相似乎就是唯識其實在一切佛法中都可以説有法相的從前在內學上曾刊載過一篇文章龍樹法相學歐陽竟無居士所撰龍樹菩薩也談法相可見法相是廣義的佛法由釋尊證悟後從而教導衆生開示衆生如約如來所證悟的境界來説這是我們所難以瞭解的法是離言的從何説起呢但佛有善巧方便就人類所易解的豫以啓導就在我們的身心上指示出來使我們瞭解到個人的身生理是怎麼回事而心心理的活動是怎樣的情況我們如何由內心的活動而發為外在的行為由行為的力量而形成未來必須接受的果報或由怎樣的行為而影響內心再由內心而引發行為由什麼力量使我們形成人趣之身於此身心使我們瞭解世間的現實指出我們難以覺察到的錯誤從而修正錯誤趨向真理所以佛説法不僅説其證悟的內容更為人類衆生説出身心現實的種種問題因為這些都是我們最容易體會的舉例來説五蘊十二處十八界等等以及四諦十二因緣這些問題都是我們所易於理解的由佛的開示理解再進一步體悟到無我之理認識了人生的錯誤煩惱探究到煩惱的根源無明又如何脫離這些病源而體驗真理在原則上説一切佛法都無非説明這些問題佛法本不僅是理論亦不是一套學問其所以形成一種學問這因為我們如無所了知就無從信仰更無從著手來起修了對宇宙人生現實及修行證果佛也有所説明釋尊涅槃後佛弟子結集聖典為了究明佛法佛法逐漸體系化總不外乎這些問題可以這麼説佛所開示的佛弟子所要理解的就是法而法的種種意義就是法的相種種的法相為什麼稱為佛論上説知諸法自相共相故名為佛佛就是覺悟了一切法的自相共相的聖者這正説明了法相的重點佛所説的五蘊十二處十八界四諦十二因緣等使我們充分理解到這一切法成為我們的信仰依此而修行達到正覺的目的佛入滅後佛弟子對佛法的研究即是古代的阿毗達磨論師阿毗達磨是研究法相以自相共相為法相探究的主要內容自相就是法的自體例如眼眼是什麼探究它的體性法的體性是從具體的法去探究的共相是法的通相例如無常無我有漏無漏等是遍通到種種法的通性古代的佛弟子對佛法探求的重點其一是對於佛所説的種種法作深一層的理解如佛説眼眼是什麼意義什麼是它的體性什麼是其作用如佛説無明什麼是無明的體性無明以什麼為相以什麼為作用諸如此類都不外乎是探求法的自相其二佛為弟子們開示一切法是無常苦空無我到大乘又説明一切法空一切法不生不滅這是一切法最普遍的真理也就是一切法的共相佛法經歷代大德的研究整理逐漸地體系化使後人能充分的易於理解佛學是在這樣情況下而發展起來的所以佛法的探究最初就是法相的探究古人法相的探究不僅是上述的自相共相還有相攝相相應相因緣相等探究佛所説的法法與法之間是相同的嗎不相同的嗎這就是相攝相根據阿毗達磨的論説其名雖不同其體性卻無異這就一體是相攝的若內容不同即是別法不相攝的所謂相應相例如心心所法心與心所相應或此心所與彼心所相應或此心所與彼心所不相應或有了此心所必定有彼心所的諸如此類的探究都是一切法的相應相古人相應相的研究範圍是較廣的此外更探究到法與法間的活動此一法依什麼關係而生起依什麼條件而發生這就是法的因緣相了這些就是古代法相學的根本論題其他還有果報相成就不成就相等在羅什所譯的妙法蓮華經中説唯佛與佛乃能究盡諸法實相唯獨諸佛對一切法的如實相才能究竟諸法實相是什麼呢所謂如是性如是相如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等以上所説就是法相都是法相所探究的問題在成實論龍樹大智度論中也有説到的可見當時印度的論師們對於法相的探究都不外乎這些現在看來差不多就是後代唯識學系以及其他學系所討論的問題所以佛説的法是共同的論師們所探究的論題也是大致相同的成為一切佛學五蘊十二處十八界一切大小乘所共同的都曾應用這一方法來探究整理使佛法成為理論完整極有體系的學問當年支那內學院的歐陽竟無老居士曾主張法相唯識分宗法相屬法相宗唯識屬唯識宗法相是以五蘊十二處十八界等來探究的唯識是以阿賴耶識為中心如成唯識論等所表達者太虛大師不同意這一説法大概虛大師從佛法發展的大趨勢而這樣説法相必宗唯識法相一定是以唯識為宗的於是內學院與虛大師雙方曾就不同見解而引起討論在當時我也曾表示過我的意見法相有歸宗唯識的也有不歸宗唯識的我從佛法各宗各派的思想體系上看有些學派的法相並不一定歸入唯識學當然我的看法不一定是對的虛大師也不會同意我所説但我以為這一問題應從學派的不同觀點來説明的佛説的法是一味的但後人對法相探究的結論不完全相同這是古代的實際情況法是共同的研究的問題又是同樣自相共相因相緣相而佛法卻顯然的分宗了這分化早在小乘時代已存在了到大乘發達起來在分宗方面來説其實仍是老問題當然在大乘佛法中説得更圓滿了法是相同的內學院也有法同義異之説但小乘就有了宗派分別如大衆部與上座部等為何會分宗呢原因決非單純的在理論上有些根本問題時間就是其中的一項在佛教思想分化宗派之分之中有主要的兩大系一是三世有一是現在有佛弟子們對於法相的探索主要是自相與共相自相是探究一一法的體性例如人人是什麼如金剛經説人只是一合相種種因緣條件的和合體但究竟是什麼所和合的呢五蘊和合乃至十八界和合五蘊和合中的識又是什麼呢這麼一問問題就越來越深入了如我們知道的這個東西物見到的是青黃赤白長短方圓是色用手敲敲是有聲音的用手碰碰又發現它是堅硬的這是身根所觸的諸如此類內容有色有聲有香有味有觸這樣探求分析下去於是聲香味觸或地水火風問題就多了法相的探究不論是物質現象或精神現象如一一分析下去就要分析到一種單一性性質上已無可再分的地步在學派中在物質現象上有極微的思想極微是極小極小的物質點到此已不能再分如果仍可分的話那還是假合的和合相分到不能再分的最後點恰如我們中國所説其小無內心理作用亦復如此人類心理作用活動是很復雜的但經過佛法的自相的探索逐漸的分別出來以有識故於是有觸有受有想有思有作意種種的心所相應生起受想作意都有特殊的作用以一般所稱的心理作用來説裡面包含著多種成分所以也還是假合的在探究自相中不論是物理心理生理眼耳鼻舌身均可分析到最極微細單一性而不可再分的單位不可再分析的單位這一一法的自相自性都有時間相其實時間不是實在的是依物質與精神的活動而成立的一一法在時間上也分析到最短最短的時間單位稱為剎那我們平時所稱的一念在時間上就是最短的法相探究到此就接觸到三世有與現在有了如有人現在生起一念心生起一念貪心在貪心未生之前是怎麼樣的在未生前有沒有這一貪心呢生起之後此一剎那貪心已成過去剎那滅過去了還有沒有呢此法在未生前有沒有呢如果沒有那又怎麼能生起呢剎那滅了以後難道什麼都沒有了嗎如此探究這問題就進入了哲學上的思考上述問題的答案在佛法的學派中意見不能統一依三世有的學派説貪念在未生之前早已有了只是在未來而已未來早已存在現在不過是依因緣和合而剎那生起生起後剎那滅滅後還是存在只是在過去而已現在固然是有未來也是有而過去了還是有的這就是三世有的觀念為什麼説過去是有的呢因為過去了的事情對我們有影響力過去生起過貪念雖然已經過去了可是這一過去的貪念對以後仍有影響力以造業來説佛法説造業必受報這一所造業雖剎那過去了可是過去了並不是沒有業仍舊存在不失這才能使我們在未來受報未來怎麼樣未來如果沒有那怎麼會憑空生起來呢舉例來説嬰兒出生後眼睛也睜不開只會哇哇啼叫不論男女其貪欲或淫欲不但存在而且與當前的生命不離它雖還未顯出但終究是要生起的因此當孩子成長到十三四歲的前後男的女的都自然而然地生理起了變化這種貪欲相就顯現了未來一定要生起的所以不能説未來是沒有的對這一理論是否同意那是另一問題但這確是古人對法相在三世中的一種理解由此可以説明因果一切因果業報由這三世有的理論而得以説明一切據三世有者看來未來的法無量無邊其中一部分已與我們發生了關係所以由因緣和合而可以現起在此不妨講一實際問題譬如説修行要斷煩惱有人説我現在內心清淨沒有煩惱這不能説是斷了煩惱現在雖沒有煩惱但過去的煩惱與你沒有脫離關係它的影響力能使我們引起煩惱未來的煩惱早已與你結成關係將伺機生起當前的片刻清淨有什麼用要怎麼樣才算真正清淨呢必須與過去的煩惱一刀兩斷完全脫離關係不再受過去的影響未來煩惱也不會再來到此現在沒有煩惱才是真正斷煩惱了這就是依三世有來説明一切法的法相在佛教思想上可説是極重要的一大派這一派思想對大乘佛法的影響也是極其深刻的在三世有的思想中認為法是如如不變的過去如此現在亦如此未來亦如此一切法如此如此而恆時不變雖不變而隨緣因緣和合而生因緣壞散而滅故説法性恆住隨緣起滅法的體性是恆住的隨著因緣而起滅此處是恆住不是常住如將之解釋成法性常住的話那就是隨緣不變不變隨緣的大乘理論了這一派的思想一切法都是本來有的如果本來沒有的話那就不能生起了過去現在未來所有的一切法不斷地因緣和合通過時間從未來到現在從現在到過去使我們生生世世流轉但現在有學派卻如此説未來是什麼既説未來即是還沒有來沒有來沒有生起而説法已經存在這是難以信受的過去又怎樣過去了剎那滅既已成過去而説法依然存在這也是令人難以理解的這一學派的時間觀認為未來與過去都是假立的只有當下的現在是真實的如問如果只有現在是真實的過去的已剎那滅既已滅去怎麼對當下的現在與未來還有影響力呢起初的解釋是曾有法是曾經有過的所以能對現在起著影響至於未來怎麼一定會來呢又解釋説是當有當時要來可能要來佛説曾有當有其實是不離現在的曾有與當有聽來似不大具體到了經部引出了種子薰習的思想那就較易領會了其解釋是現在法生起後即剎那滅曾有是什麼它就是曾經有過在剎那滅時就薰習而成一種潛能如種子一樣這薰習所成的力量是曾有其實就是現在只是沒有發現出來而已説當有當有即種子有了種子當然會生起其實種子並沒有離開現在這現在有派的思想依我看法一定要講到種子潛能思想才能圓滿依現在有來説過去與未來是假有由於時間觀的不同有此兩派由此可知唯識思想是繼承現在有的學派唯識家指出過去未來是假立的故以種子薰現行現行薰種子來説明一切法的起滅其教理與經部師特別深切此外我想介紹不為一般所注意的一派那一派也説現在有但説過去未來都是假有現在雖有而是無為這成了不生不滅的現在試想既是不生不滅的現在那怎麼去説明有生有滅的現象界呢這一派説一切法都是永遠如是卻又不斷地以種種因緣而現起而其實卻是永遠如此沒有變化可説這一派的學説在小乘學派中並不發展可是在中國大乘佛教學中類似這樣的説法似乎很不少在時間觀念的不同下有上述兩大派別起初三世有與現在派都有一共同的觀念即法是有時間相的而時間有過去現在未來時間是最短的剎那剎那的纍積而成為漫長的時間時間雖不能拿什麼來分割但可以從觀察而把時間分析到剎那既是一剎那一剎那的纍積則前剎那不是後剎那後剎那也不是前剎那從這觀點來看如小乘所説極微空間的物質點沒有方沒有方位的此彼也沒有分就是不可再分割的稱為無方極微時間的剎那分析到時間點又不可再分彼此所以稱為無分剎那大乘唯識家破斥了無方極微唯對於剎那則承認無分剎那剎那是時間上最短的那一剎那就是現在但另有學派如中觀家的看法認為剎那只是一種假定時間實際上時間一定有前後的沒有前後的當下現在也就不成其為時間所以過去與未來是依現在而假立的現在也是不離前後過去未來而假立的唯識家説現在幻有過去未來是假中觀家説三世如幻這是三世有與現在有的大乘説依此來説明一切法當然不會相同了探究法相主要就是現在有與三世有的兩大派法相歸宗唯識是在現在有的基礎上而成立的嚴密精深的理論小乘的三世有的法相不是唯識大乘三世幻有的中觀家法相也不會歸宗唯識的我們對一切事物的了解必賴有相識是能了別的識使我們區別這樣那樣這個不是那個那個不是這個於是我們逐漸地對宇宙人生能探求其真相佛法也是經過這些分別的所以龍樹菩薩説先分別諸法後説畢竟空上面我説過佛法的根源本於釋尊自己證悟而來佛所證悟的一切法恰如法華經所説唯佛與佛乃能究盡諸法實相在佛的境界究竟證悟一切法相這法相是怎麼樣的呢菩薩證悟的境界凡夫所明了的法相又有什麼不同呢這是超出我能説的範圍了我沒有到達大小乘聖者的境界又怎麼能知聖者自覺的法相現在只是依據經論所説的略為敘述而已我們凡夫一切事理的認識一定有相如佛法中所説的所緣緣所緣的境界也即唯識家所説心上現起的影像相相分如沒有相一切無從認識因此可説我們衆生不論是前五識的直覺現量而知或第六意識的分別而知都以相為對象我們對相的認識又是什麼樣的呢茲舉例説如我看到這只杯子這是一只杯子是一個固體物沒有見到它的變化剛才是這樣現在仍是這樣換言之我們對相的認識都是個別的所以重視自相我們所見的形狀就是這樣其內在有什麼因素與其他有什麼關係是怎樣的變化這些在我們的直覺中是不大會理會的這是我們認識的習慣意識的了別是這些相的綜合如起初只見杯子的形態色彩眼識所見如杯子碰了一聲耳根發耳識才能聽到聲音手去觸時才知它是堅固的杯內所容的茶水是熱的或放有冰塊是冷的經意識綜合起來我們才能知道這是茶杯知道茶杯是怎樣的長時的經驗而來的認識是經過意識的了別在直覺上是不能了別的在我們直覺的認識上是個別個別的相自然而然不用造作雖然我們已能進一步去認識它內在的質素因種種關係而存在但這是經過意識的推討而得的結論比量在平常認識中還是依憑直覺的一個個獨立的由此我們對法相的認識就是一般所説的執著見個什麼執著它就是個什麼不會覺察到它的變化與其他的種種關係雖能在推理下知道一切法的關係變化但在直覺上仍不免落在習慣性的老路例如人説人是不能離群獨立的必須依靠社會群衆才能生存士農工商無一不供給我一切所需人都不能脫離社會群衆而得生存這話説得對嗎對極了可是到做起事來時每忘得一乾二淨以自我為中心而處理一切這就是人都執著人我法我的原因依唯識家説如我們見到什麼知道它是物質物質就是物質與我沒有關係至少它在我心之外與我心沒有關係這就是唯識家所要破斥的最根本的錯誤所在使我們不能解脫成佛的就是執著心外有境在我們的直覺上的確境界是在心外的我們看到聽到想到都不期然地認為與心無關自然地以為心外有境這是一種根本的錯誤這就是凡夫的境界一般的認識而且既是心外有境與其相對的也即是境外有心認為心在境界之外這也是錯誤的唯識家説心外有境境外有心是別體能取所取是完全錯誤的可是我們就生存在這一種認識錯誤的境界中佛開示我們以因緣所生為原則指出一切無常無我在時間性上有前後的變化性在彼此間的關係上是種種條件的和合沒有獨立的自體個人固然是無我一切法無不是無我沒有自體因為我們有這種錯誤是顛倒的根本由此而生死輪回不已衆生所認識的法相在唯識上説就是不離遍計所執性衆生從來離不開這種錯誤雖然在唯識學中説五識阿賴耶識是沒有執的能緣依他起相的但以一般來説不一定如此即唯識學派的安慧論師也主張五識八識有法執也許其中有他的獨到意義事實上我們確從未離開過這種認識的錯誤並不是我們要執著它而是當一法現在我們的心前時就是一個錯誤的相不用我們執著看到的就是境在心外有一個心外的相這就是衆生所能認識的法相經過修證以後的聖者們對於法相的認識又是怎麼樣的呢在修行的過程中行者觀察自己的心一定能在未證悟前已經體驗到自心的剎那生滅即生即滅變化無常繼而通達了無常無我空等到達能體悟一切法的真相時就不像凡夫所認識的那種相了唯識家説真正證悟見道時是沒有影像相的體驗空性時大乘中觀與唯識觀念上是相同的一切相不現前沒有心境對立的意義不能不所已超出了能所對立的境界小乘稱為證入寂滅悟了以後呢這其中是有淺深不同的一分小乘出了聖智證悟的境界雖通達了世間不取著世間知道世間一切無常無我但由於慧力淺所以在他眼前現起的相還是與世間一般差不多不過不會如世間一般的去執著它舉例來説如雲馳月運看見月亮好像行得很快這情景是那麼逼真或者我們搭火車在火車開行時兩旁的樹木就在我們眼前退行得很快這是火車在開行的關係火車在動樹木並沒有動但放在我們眼前的相卻還是動的聲聞體驗到的就是這樣不一定知道法相的如幻如化多數學派還是將法説成實有大乘聖者的智慧高深在體驗到真理後就能理解到法相的如幻如化如幻如化就是看起來是這樣其實不是這樣雖然不是這樣卻明明是這樣通達到一切是無常無我一切法空不會如凡夫般的執著可是相卻還是現起依唯識家説中觀也是一樣真正證悟真理時是沒有相現起的等到從真出俗後得智生起時一切相又現前了不過相雖現起能理解到它的如幻如化這如見雲駛月運而心知是雲的動舟行岸移知道是船在動知道一切法相如幻如化如雲駛月運舟行岸移確是與凡夫小乘不同的但是證真時法相不現法相顯現時又不能悟入空性空有還不能不二依經上説要到五地極難勝地菩薩才能把它打成一片五地菩薩要證悟到這種境界確是極難通達的法相是有相真理空性是無相所以證悟空性相不現前相現前了又不能悟入空性一是有相一是無相怎麼能契合不二呢登上五地的菩薩才證悟到這極難的一關相與空性平等不二一切法畢竟空在一切法的空性中一切法現前如幻如化的相與無相諸法真性打成一片所謂二諦並觀二智合一五地菩薩雖通達了這極難的一關但還是不徹底的還只是暫時的等到出了定相與空性又分開了再要統一起來又得再下功夫這樣到了登上七地無相相應一直與空性相應能在一切法相上通達一切法空但雖説無相還有功用還得用力注意如不加功用還不能現證二諦無礙的中道到了八地這才能無相無功用自然而然的不失中道了雖這麼説這還只能自利時如此利他時還不成無相無功用要達到自利利他的無相無功用境界唯有究竟圓滿的佛果以上是凡夫與大小乘聖者對法相認識的不同境界修證到即空即有的境界不但與凡夫二乘所認識的法相不同而且也與初地四地菩薩的所知法相不同中國佛學界喜歡説中道説妙有妙有的根據何在這約二諦並觀以上的聖境而説的妙有這名詞完全中國化印度並沒有這個好名詞大乘中道的證悟是能無相又能了知一切法的在解説上儘可把它分開來無相是怎麼回事法相是怎麼樣但在實際的體驗中融合為一不是易事二諦並觀的證境不是言説思惟所及的中國佛學界在講到理事無礙時特別發揮這一點我想不是中國的祖師們都達到了這一階段勝過了印度的聖者大概他們以經為重就以經中所説八地菩薩或佛果的境界為中心而安立言教發揮妙有的法相成立思想系統但這麼一來與源於印度的小乘中觀唯識的思想就多少不同了佛為衆生開示法相不是以佛的究竟境界來説的若以佛的境界來向衆生施教的話衆生怎麼能懂呢佛就在我們身心上的眼耳鼻舌身意五蘊十二處十八界等開示衆生這樣衆生才容易理解而接受佛的教化古代的法相自相共相因緣相都以緣起的身心為出發點屬緣起論在現實身心上指出一切法是因緣所生一切法無常無我由這基本思想而再深展到一切法空一切法不生不滅道出宇宙人生的真理佛法是由淺而深的釋尊開示衆生是如此小乘各派如此中觀唯識也如此雖然唯識説阿賴耶識似乎不太好懂其實阿賴耶識是一種微細的心理作用也還是生滅無常的由種種條件因緣而存在所以這應該還是容易懂的中國過去的祖師們以佛菩薩自證境空有無礙的妙有為本來説法形而上的氣味太濃不是一般人所能領受在理論上也許是很高深的但對一般由淺而深的理解能力來説是比較困難的以上只是將凡夫認識的法相及大小乘聖者認識的法相乃至八地以上佛果證得的諸法實相作一個簡單的介紹這些也許就是佛教各宗各派思想所以分歧的源由我以為研究佛法法相還是由淺入深以緣起論為出發從現實出發容易理解依此修行也循序而進這才是人人可信人人能學的佛法否則説得過於高深那就只適合少數有形而上的玄學興趣的人一般人是難以理解的不合佛法普化衆生的原則謝慧輪記
