body:
  text: 談佛法的宗教經驗在美國紐約長島菩提精舍講引言佛法的弘揚要健全團結佛法近來似乎有漸呈萎縮的現象每一個法師及有心的居士都想如何可以振興佛法海外的法師和居士們都很希望將佛法轉移到新大陸的美國來發揚這是非常艱巨的工作但是應當怎樣著手呢佛法是一種宗教宗教須適應社會佛法的好處甚深一般人不大了解所以推動更艱難不過出家弟子的健全團結與在家弟子的共同努力實甚重要佛陀在世之時亦頗注意於組織僧團推行佛法團結就是力量佛教是宗教宗教要發生力量必需這個宗教的信徒要具有信心盡心去做不論信也好學也好修習也好要有所得因為人們往往要問你信佛教以後得到什麼不但佛教如此其他宗教也莫不皆然由信心而引發宗教經驗獲得好處佛法的信衆如都能虔誠努力充滿活力在學習過程中得到佛法的真實利益則佛法必能發揚光大反之如沒有所得只知道跟了我父親這樣做隨著我母親或祖父母這樣做我亦照樣做信佛教變成照例文章徒存形式便失去了佛教的真正意義在美國弘揚佛法尤須注意因為美國社會講求實效如講道理要尋根究底講信仰修持亦要有實地的經驗佛法有深深淺淺的不同利益即使淺淺的得到一點點經驗也能加強信念從淺入深積少成多今天不妨就淺近的來講第一信的經驗佛法中的信是什麼信佛信法信僧換言之信仰三寶為什麼要信呢我先說一個比喻一般人生在世上生死輪回中生時不知怎樣生的糊裡糊塗混著過去不知怎樣是好以後怎樣更不知道佛法說生死長夜人生真是漫漫長夜雖然電燈開得很亮但我們人生還是好比在黑暗中摸索東摸西摸找不到出路有一種倣徨空虛的感覺年輕的人如此年紀大了直到老年念頭愈多愈加紛擾假如我們真正有信心信仰三寶的話等於眼前忽然一亮找到一線光明好似在茫茫大海上忽然看到大陸這時真有說不出的高興信佛信法信僧找到了明燈望到了人生的歸宿信心好像一顆澄清濁水的清水珠能將渾水變清信心使我們內心清淨心上得到安定信心沒有生之前煩惱無窮混混沌沌莫知所從凡具有信心者必能得到安定佛經上說若有信者得歡喜這種豁然開朗的經驗因為得到佛法的引導可漸除煩惱的困擾找得了一條光明的大道跟此信心而來若能向此方向努力必得快樂煩惱雖還是有的仍應努力修習但有了內心清淨信心的經驗會安心的向前邁進了第二戒的經驗戒受戒好像是形式的其實不然諸位法師都知道凡出家者由戒師引導受戒他人都來恭喜他希望他得到上品的戒戒的力量確有上品中品下品的受戒者得到的這個戒以誓願為體不應做的事須決心不做應做的事當盡力去做要虔誠懇切懺悔有這種堅強的信願然後可得戒這種依佛法所得的戒即是心裡增加了一種特殊的力量這種力量能防非制惡這力量自得戒後一天一天的增加一般人裡面的感情衝動很強外面的引誘力異常的大推之挽之不能抵抗一個不小心就會做錯所謂一失足成千古恨如得到了戒則自內心發生一種力量可以懸崖勒馬控制自己戒好比一個城叫做戒城古時修築城墻所以防制匪敵有了城墻時如有匪敵進犯保衛這城者在裡面就發動員令當然亦可以求外面的救援但主要的是自力內在的戒備戒的力量是由信佛法所起心理上的變化發生一種清淨誓願力有了這種力量一天一天增長煩惱自然漸除第三定的經驗修定一層似乎中國佛教提倡的標準太高在我國的禪宗發揚以後嫌定太淺修定的少了反而又覺得太難了於是專在禮拜念誦上著力我現在所要講的是生得定是我們每個人生下即得到的假如諸位說沒有那是沒有用因緣來顯發譬如諸位能讀書智力也由於生得經教育的學習而獲得我們都知道我國有一部哲學書莊子莊子有一段孔子與弟子顏回有關靜定的問答孔子教顏回學習靜坐顏回將所得的經驗告訴孔子顏回第一次報告孔子說靜坐久了外面的境界都沒有了第二次又報告說我的手與足也不知何處去了第三次報告孔子說我的心我自己也不知何處去了那時顏回已失卻身心世界心靈一片虛明正如莊子所說虛室生白吉祥止止此種境界中國叫做坐忘這在佛法中是將到未到到達定的邊緣生得的未到定年輕力壯的如能靜坐常會很快發現得到這種經驗上面所說當然是初步的很淺的定當然還須向上修習但是需要指出的是一般人只知道向外面去尋求現代講求科學技術發達很有成就卻不知從身心去尋求不知道身心中無邊功德現現成成在那裡待我人去找尋所以即使略得定力也能深信佛法中的修證而向上趣入第四慧的經驗慧的經驗也是淺深不等現在要講的是最淺的聞所成慧即聞慧我人自讀經或自聽開示而得來的慧與一般生得慧不同就是聞慧對佛法絶對的真理豁然啓悟由豁然無礙而得貫通所謂大開圓解這種解慧並不是證悟試舉一個比喻井中有水已經明白的看到但不是嘗到對聞所成慧正見經裡有頌說假使有世間正見增上者雖復百千生終不墮惡趣這是說若人生於世界上能得到正見的力量增長不退如菩薩長期在生死輪回中度衆生得了此慧雖然或有小錯但決不造重罪故生死雖歷千百次終不墮入地獄結論要求佛教發生力量不能徒尚形式徒重談論而要心有所得修學佛法的人對於信要有信的經驗對於戒要有戒的經驗對於定要有定的經驗對於慧要有慧的經驗總之要有內容要有所得這就是佛法的宗教經驗有了宗教經驗然後能起實效能不退轉記得從前太虛大師就是憑他在西方寺所獲得的宗教經驗所以能夠堅定信心一生從事佛教的工作可以作我們的金鑑再者學佛者要一步一步的修習務須要將淺的辦得好然後再求深的個人來美半年因為身體的不強健未能與諸位法師及居士多所切磋內心很負疚因為不久要回臺灣謹以上面所講的作為臨別贈言真覺記
