body:
  text: 佛法中特別愛好的數目一序説第一義諦中無數無量佛法是沒有什麼數目可説的世諦中為了施設教法説成種種帶數的詞類如三寶四諦等從一數到十數十數以上的經中有非常多的帶數的詞類大抵是依據分類的自然需要説成三四五等種種差別這樣依事實而如此分類那數目有什麼可討論的呢然而如大乘華嚴經的十數形成一部的特徵又如律部多説五數這就不能不説含有某種意義了數目當然種種的不限於某一數目的但如統觀一切而發見特別多用的特別重視的就有注意的必要在初期佛經中四與四的倍數是有特殊地位的不但四數極多有些本來不一定是四數或四之倍數的終於以四為定論所以不妨説在佛法的開展中佛與佛的弟子們對於四這個數目有著特別的好感姊崎正治的印度宗教史考三八二三九四頁以為釋迦族與塞克提族即廣義的塞迦族習慣上有頗多的類似對四與八數兩種族同樣的尊重就是其中的一項姊崎氏以此推定釋迦族為塞種的一支也許是這樣的但現在想要説明的是初期經法特重四數尤其是流行於北方的説一切有部這是值得提示出來豫以注意的釋迦族及早期佛法化區的文化傳統不能不説有特重四數的傾向二教法在教法中四諦苦諦集諦滅諦道諦為佛陀説法的總綱這當然是依實際的需要分為四諦而決非湊成四數的説到苦諦的內容是四苦生苦老苦病苦死苦或加求不得苦或更加怨憎會苦愛別離苦五取蘊古譯五盛陰苦成為八苦八是四的倍數在經説中苦諦本不一定是四是八而八苦終於成為定論其實經上説略説為一五取蘊苦這是以生苦等七為別五取蘊苦為總説而又總別合成八苦的這又多少有點勉強了説到集諦起初但説是愛愛的內容經説有多種分類其中南傳的赤銅鍱部立三愛後有愛喜貪俱行愛彼彼喜樂愛説一切有的雜阿含經也是這樣説而北方的説一切有部論師卻説成四愛愛後有愛喜貪俱行愛彼彼喜樂愛這使我想起了説一切有部的增一阿含經有四阿賴耶愛阿賴耶樂阿賴耶欣阿賴耶喜阿賴耶攝大乘論上而在赤銅鍱部中也沒有愛阿賴耶只是三阿賴耶説律之大品大犍度一五阿賴耶是著處生死的癥結所在與集諦的愛意義相通被解説為愛增長名取的取也立為四取欲取見取戒禁取我語取滅諦是不可分別的至於道諦的內容是八正道正見正思惟正業正語正命正精進正念正定這是一致的教説公認為聖道的原始內容與四諦有同等地位的是緣起為佛陀正觀而成佛的是離二邊的中道在雜阿含經中有支數不定的種種緣起説而十二緣起被認為緣起説的定量十二正是四的倍數關於道諦經中説有種種道品如四證淨佛證淨法證淨僧證淨聖所愛戒證淨這本為對於三寶的淨信由於重視戒行因而增立為四證淨同樣的本為三念念佛念法念僧增念戒而成為四念後來更增多為六念八念十念如四念住身念住受念住心念住法念住四正斷或名四正勤未起惡令不起已起惡令斷未生善令生已生善令增長廣大又依此四正斷別立為四正斷斷斷律儀斷隨護斷修斷四神足是欲勤心觀平常説五力或説四力信力精進力念力慧力八正道修道而得證的立四沙門果須陀洹譯義為預流果斯陀含果阿那含果阿羅漢果須陀洹有四預流支即四證淨別有四預流支或譯入流分親近善友多聞正法如理思惟法隨法行趣入四沙門果的有四沙門果向四果與四向合名八補特伽羅也就是四雙八輩的內容道品中與戒有關的有四聖種衣服喜足飲食喜足臥具喜足樂斷樂修與四聖種有關的律中立四依法但三衣常乞食樹下坐陳棄藥與四聖種四依法有關的有十二頭陀行住阿蘭若處常乞食次第乞食一坐食節量食中後不飲漿糞掃衣但三衣冢間住樹下坐露地坐但坐不臥雖有作十三頭陀行的但一般以十二頭陀行為準八齋戒離殺生離不與取離非梵行離虛誑語離飲酒離高廣大床離塗飾香鬘歌舞觀聽離非時食八敬法本是一敬法而分為八類的各部律所説不同而都説是八敬與定有關的如四禪初禪二禪三禪四禪四無量慈無量悲無量喜無量捨無量四無色定空無邊處識無邊處無所有處非想非非想處這三類綜合名為十二甘露門如安那般那念為四事南傳為四北傳演化為六事廣説為十六特勝四的四倍又如四想小想大想無量想無所有想八解脫八勝處等定法都是以四為數的與慧相關的是苦集滅道四智經説世間法是無常苦無我無我所如合後二為一即無常苦無我三修説一切有部以無我無我所為空無我所以無常苦空無我名苦諦四行相有部的四諦觀每諦作四行相所以成四諦十六行相屬於這一系的如犢子部系立四諦十二行相經部立八行相都是四的倍數不過這是部派的論義了此外如四處慧處諦處捨處寂靜處四行苦遲通行苦速通行樂遲通行樂速通行四攝事布施攝事愛語攝事利行攝事同事攝事八大人覺少欲覺知足覺遠離覺精進覺正念覺正定覺正慧覺不戲論覺這都是與修行有關而分為四類或八類的以上都約修道説關於生死現實的佛以五蘊六處十二因緣來説明依事實分類當然不可能一定説為四類的然五蘊中識於法取著立四識住色識住受識住想識住行識住色蘊中能造色是四大種地大水大火大風大或名為四界六處中依六根分別經中説種種的六法但六根識的取境到底分為四類眼見耳聞鼻舌身合為覺意知了因緣中有四食段食觸食意思食識食論師立四緣或二十四緣也是以四為數的衆生出生的不同經説四生胎生卵生溼生化生前生與後生的關聯論師立四有生有本有死有中有總之教法方面佛與佛弟子們無疑是多以四及四的倍數來説明的三教典教典的輯集傳誦始於佛陀住世的時代佛滅而後廣泛的結集出來最初集成的是相應修多羅分為四品蘊品處品因緣品道品其後增入祇夜記説即雜相應阿含經部分又依雜阿含經補充分編為四阿含經雜阿含經中阿含經長阿含經增一阿含經雖然南傳的巴利藏加小部而為五部或名五阿含但這只是一部派的傳説如大衆部系及分別説部系傳宏於印度的部派都不使小部與四部阿含並立為五部而別稱之為雜藏雜就是小的意思這樣四部阿含合名為經藏小部是雜藏雜藏與經藏律藏論藏並立成為四藏四阿含與四藏是佛教聖典部類的一般分類教典的另一分類起初是三分教修多羅祇夜記説其後發展分別為九分教即從修多羅到未曾有法但在佛法的流傳中考訂而為更嚴密的分類成為十二分教即十二部經十二是四的倍數初期集成的祇夜是八衆誦稱為伽陀優陀南的應有波羅延那義品優陀南波羅延那是問答的偈頌集是佛答十六學童所問的除了序與結恰好是十六章義品也是偈頌與漢譯的義足經附有因緣相當共十六品各部廣律雖傳説十六義品而摩訶僧祇律卻稱之為八跋渠也就是八品卷二三南傳的義品內容有窟八偈經瞋八偈經淨八偈經第一八偈經所以原始集成的義品可能為八品而每品以八偈組成雖然現存的義品偈數已多少不一但仍留下八偈的古迹這與十六義品的部類都不出於四的倍數義品與波羅延那南傳都編入小部的經集經集最後這樣説八誦量之聖典經集畢這可見經集全部古代是分為八誦的南傳的優陀南也分為八品凡是可以看作早期集成的聖典不是四品就是八品十六品八偈或是八誦十二分一切都依四及其倍數所組成這能説是事實所限或偶然的嗎四人物與地區佛世弟子而集為一聚的如千二百五十比丘六群比丘是有事實依據的當然不能湊成四數但十六學童問佛早就為佛教界所傳誦了傳説佛世有四大聲聞大迦葉阿那律賓頭盧羅睺羅共同教化跋提長者及其姊的傳説五分律卷二六佛陀涅槃以後佛教界有感於依怙及護持的需要因而有四大聲聞不入涅槃住世宏化的傳説四大聲聞是大迦葉君徒鉢歎賓頭盧羅睺羅彌勒下生經舍利弗問經後來十六羅漢住世護持佛法的傳説也流傳人間十六羅漢初見於堅慧入大乘論玄奘所譯大阿羅漢難提蜜多羅所説法住記詳説十六羅漢及護持的化區在中國訛傳而成為十八羅漢以上是部派佛教的傳説在大乘佛教中般舟三昧經有賢護等八大菩薩思益梵天所問經等又增一倍而成十六菩薩賢護寶積日藏地持至於如來有四無所畏三十二相八十種好等功德都是四的倍數佛滅度後有八王分舍利的傳説佛陀一生的化迹見於石刻的有四相八相等大乘佛教雖取捨不同對佛陀一生的化迹都揭示八事來總攝一切這就是傳説的八相成道佛世的印度傳有十六大國在漢譯中是一致的傳説但從巴利藏看來就並不如此如漢譯的長阿含經的闍尼沙經舉鴦伽等十六國與此相當的長部闍尼沙經僅列舉鴦伽摩揭陀迦尸憍薩羅跋耆末羅支提跋沙拘樓般遮羅婆蹉首羅先那十二國小部的小義釋裡也提到鴦伽摩揭陀迦尸憍薩羅跋耆末羅支提沙竭羅般遮羅阿槃提臾那劍蒲闍多少不同的十二國增支部三七八四二説到十六國鴦伽摩揭陀迦尸憍薩羅跋耆末羅支提番伽應與跋沙相當拘樓般遮羅婆蹉首羅先那即摩偷羅阿溼摩伽阿槃提健陀羅劍蒲闍與漢譯的闍尼沙經相合長阿含經的遊行經説到四處立塔為信衆巡禮的聖地四處是誕生處嵐毗尼園成佛處佛陀伽耶轉法輪處鹿野苑入涅槃處拘尸那其後擴展為八大靈塔即八大聖地在上述四處外再加舍衛城祇園現大神變處曲女城三道寶階處王舍城化度聲聞處毗舍離捨壽量處八大靈塔名號經大乘也有八塔的傳説多少增入大乘的傳説本生心地觀經佛教傳説的地理以須彌山為中心山在大海中山的四方面也就是海中有四大洲東方海中弗婆提南閻浮提西瞿陀尼北鬱單越拘羅還有八中洲我們所住的是南閻浮提中央有阿耨達池從四方面流出四大河恆河辛頭河博叉河徙陀河南洲有十六大國地上有四大寶藏地下有八熱地獄十六遊增地獄八寒地獄有金輪王統一四天下四洲其後演化四種輪王金輪王銀輪王銅輪王鐵輪王須彌山頂是帝釋天諸天聚會處有四園波婁沙雜色車善雜色歡喜須彌山腰四方有四王天住處毗樓勒迦提頭賴吒毗婁博叉毗沙門四大王天所統率的是天龍八部天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅迦色界有四禪天無色界有四無色處色界天中或説十八天或説十七天説一切有部論定為十六天佛出人間人間天上而預聞佛法的衆生共八衆梵衆魔衆帝釋衆四王天衆婆羅門衆剎帝利衆吠奢衆沙門衆四八十二十六這些四與四的倍數在法相安立上佛與佛弟子的確是特別愛好的這不能不説與民族文化的傳統有關
