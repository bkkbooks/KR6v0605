body:
  text: 法海探珍一正法的本質及其體系佛陀正覺的正法之流適應人海思潮展開了自由與謹嚴自力與他力平常與奧祕渾括與嚴密等多種不同的風度大小空有提示了種種不同的行解在這萬有不齊的法海潮中波譎濤駭也還有它內在的關聯與條理這吐納百川影現萬象的法海確乎使人驚歎它的偉大高深但錯綜復雜也常使人茫然偏執不理解演化中的關聯與條理籠統融貫使佛教的真義晦昧現在的佛教教理需要整理但整理的工作是艱巨的不是某一人的智力所能完成這雖是出力不討好的但總得去做那麼讓我來一個試探宇宙人生的真相雖可從不同的觀點出發去理解説明但這觀點的適中正確與否卻大可討論牽衣一角或者摘網一目即使能達到把握衣網的全體但比之振領提綱到底不同釋尊在生死大海裡在最適中最正確的觀點就是宇宙的中心衆生本位的生命據點上豎起不共世間的法幢開顯人生實相成為人生的指針這生命中心的世間佛陀的正覺是我説緣起但緣起甚深難見難覺它不離我們的認識我們卻不認識它譬如這個這是一個圓圈一般人總覺得這樣其實則不盡然讀者或許發生疑惑這是甚麼呢仔細再看居然發現兩個一是內圈一是外圈真是越看越糊塗非凝心細看不可再看再看不覺豁然大悟哦原來是三個一是圈外一是圈內一是圈其實孤立著的一是神的化身從來不曾存在過有了獨立的一才想到對立著的二中間兩邊的三這一而二二而三或者看為豎的發展或者看為橫的組合這一切是神的不屬於佛法佛法呢佛陀否定了一異為本的或橫或豎的十四戲論六十二種邪見豎起佛教的正法我説緣起諸法的緣起真相在我們習以成性的根本無知沒有被消融以前是無法理解的釋尊大悲善巧拿出彩畫虛空的手段內心不違實相外順世俗給我們指出一條活路來他也説一説異説橫説豎但不同一般人的用心凡是認識上的存在是必然相待的相待就是二就是這個那個這是緣起的差別緣起的彼此釋尊所開顯的是一切法一切法的中心衆生那麼這個就是衆生現實的苦痛世間是生死是無常那個就是聖者現實的安樂出世間勿望文生義是涅槃是寂滅諸行無常與涅槃寂靜在無可説處説出來這還是相對靜止的觀察動呢從這生命無常進入那涅槃寂靜須粉碎我們的根本無知這叫諸法無我諸行無常諸法無我涅槃寂靜釋尊用這三者印定一切佛法就是緣起正法的基本法則諸法無我是更適中更主要的不但佛法的不共在此佛法實踐的特色也在此離了這遍通一切法的無我無常不是灰斷就是世間演變的俗見涅槃更只是形而上的擬想或神世界的別名靜止的觀察是二動的觀察是三還有非動非靜一句嗎自然可以説有卻要另換一付眼光來某人落在海裡逐浪浮沉在生存線上掙扎他忽然發現海岸在東方離自己的所在地不遠二於是乎他開始前進衝破海浪漸漸的遠離西方接近東方的海岸三好了他一翻身滾上沙灘躺在那春風拂拂的陽光裡休息正在那個時候他究竟在東方呢西方呢是動還是靜一釋尊在那漫無邊際的生死大海這麼一下居然有話可説説一説二説三二是靜止的一是觸著即犯虛位而不用的經上都稱為不二想掀翻苦海創造正覺的莊嚴淨土那動的三法印的理解與實踐是最適中的了這三法印是緣起的不要呆想它是一是異是橫是豎説得明白一點那只是緣起正法的三相一實相印即是三法印也不縱也不橫如三點而不是三角的佛陀建立起這樣的體系啓示學佛者的途徑諸法無我空印諸行無常印涅槃寂靜印實相釋尊為甚麼要建立這三法印呢我們要知道佛法不是甚麼神祕它只是適合衆生的機感給豫正確而適當的指導衆生所要求的是真實我體美滿樂趣善存常在所厭惡的是虛妄無我缺陷苦毀滅無常但他們所認為真實的含有根本上的錯誤他們的真理在不斷的否認過程中宇宙人生的大謎鬧到今天依舊是黑漆一團他們心目中的快樂沒有標準也缺少永久性跟著心情的轉移而變他們適應的善存自體與境界的貪戀追求結果還不是歸於毀滅在釋尊的正覺中真我美樂善常不是不可能不過世間一般人因著認識上的根本缺陷引起行動上的錯誤卻是再也走不通這非要別開生路不可一般人所認為真美善先給它個一一勘破是無我是苦是無常倘能無常故苦苦故無我一個翻身才能踏上真美善的境地這真美善依印度人的名字叫它做涅槃依這樣的見地沒有通過無我第一義的那無常苦無我對治的是正確的一般人心目中的常樂我是顛倒通過了無我那常樂我是正確的無常苦無我反而是顛倒了因此佛法的體系是這樣常正無常倒常倒無常正聖凡無我二三期佛教概説從凡夫立足處的無常出發通過空無我的實踐踏入無生寂滅的聖境這緣起三法印是佛法一貫的坦道佛法不能離卻三法印佛教的演變不外適應衆生的機感給以某一法印的特深解釋罷了不同的深刻發揮不免有側重某一法印的傾向這使佛教分流出三個不同體系這三個體系雖然徹始徹終都存在但特別在印度三期佛教中成為次第代起的三期思潮的主流就是説適應思想發展的程序從三藏教小乘的無常中心時代演進到共大乘教大乘的性空中心時代再演進到不共大乘一乘的真常中心時代這三期佛教的發展雖難作嚴格的劃分但從三個不同思想體系的發揚成長而成為教海的主流上看表現得非常明白因此也可以相對的劃分了從釋尊入滅周敬王三十四年到印度佛教衰歇汴宋時有一千六百多年分為三期是這樣一世紀五世紀六世紀九世紀十世紀十六世紀佛教小乘盛無常中心時代共大乘盛性空中心時代不共大乘盛真常中心時代佛陀的根本佛教非常雄渾有力質朴切實富有彈性佛滅第一夏迦葉等結集經律這決定了初期佛教小行大隱的發展二世紀阿育王統一印度因他的熱信擴大了佛教的教化區像末闡地到罽賓摩呬陀到錫蘭大天到摩醯沙慢陀羅等佛教也就因環境及師承等不同漸分為十八部四世紀初阿育王的王統被篡建立了薰迦王朝布修耶米多羅王是婆羅門教的信仰者因此中印度的正統佛教受到了極大的摧殘説一切有系末闡地一派得天獨厚它在罽賓犍陀羅沒有受到摧殘的厄運承受三百年來弘揚的成果在四五六世紀達到最高潮迦膩色迦王七世紀初期成為初二期佛教的分界線性空中心的大乘教經典的傳出該是非常的早行在六度解在真空在增一阿含經序品中已明確揭示出大乘佛教的綱領大事已有十地的教義脅尊者六世紀已見過般若這大乘佛教的應時而興固然順著理論發展自然趨勢從無常到空在長期的辨論中理會到非空不能成立無常從生命本位的有情無我擴展到宇宙論的一切無我這一次的復興傳説有彌勒下生龍樹七世紀到八世紀初提婆八世紀都從南印到中印在他們的傳記裡都提到外道跋扈與復興的困難這一系的思想是攝南印的大衆系與西北印的説一切有系讓它在中印分別説系的基礎上發展起來這當然是從其大體而言中印的大乘佛教經龍樹提婆的唱道脫離小乘而獨立但它始終在外道小乘的包圍下提婆以後又轉向衰運這一期的佛教卻經西印轉到北方在大月氏斫句迦等地完成空前的發展傳到中國來這不能不説是迦膩色迦王信仰佛教的結果性空中心的經論雖説以大乘為主但是大小共行的通教三乘但為菩薩是時代的特徵這大小共行的見解就是承認小果的究竟在這點上龍樹也説不能因法華經的孤證而説二乘決定成佛這大小共行也貫徹在悟解的法性中三乘同學般若三乘同見法空小乘的智斷是菩薩的無生法忍這與小乘學者的三乘同見無我而證一滅有關灼然無疑第二第三期佛教的區分各方面的意見很不同我的看法十世紀起都屬於後期佛教這一期非常復雜但真常無生是時代的主流真常思想的存在其來久矣它與南印的大衆系特別有關七世紀中印度教漸漸抬頭這時代思潮的演變至少使它獲得發展的有利條件九世紀印度教大成真常論者代替性空大乘而成為時代的主流一方面它受了性空論者法法皆真法法本淨思想的啓發緣起性空的見地不能適合時代印度教復興時代的根機於是乎展開了萬有本真常淨的實在論佛性如來藏圓覺常住真心大般涅槃的思想雄據了法界的最高峰它是涅槃寂靜的開顯真常論的發揚達到一切衆生成佛一乘的結論此外八九世紀中無著師資唱道以説一切有系的思想為根本的大乘佛教妄心生滅三乘究竟念佛是方便這都與中期性空者相同但它批判一切無自性從經部的見地轉上唯心論有驚人的成就但好景不常十世紀以後佛護清辨出世性空論復活起來空有的諍論尖鋭化空有的紛諍兩敗俱傷不過促成了真常論更高度的發展祕密佛教與真常論締結不解緣在真常本淨的理論上發達起來它的淵源很古在九世紀時東晉密典已在我國出現十一世紀起它就大露頭角發達到幾乎與印度教渾然一體的地步念佛天三昧欲為方便印度群神無不是佛菩薩的化身第二期時代適應性的佛教與悟無生忍以後的方便在這一期中成為究竟的大法它們融攝了一切龍樹無著他們都被指定為祕密教的祖師不過圓融廣大並不能拯救印度佛教十四世紀時前彌曼薩派的鳩摩利羅後彌曼薩派的商羯羅等鼓吹吠檀多哲學而佛教也就一蹶不振日趨滅亡三佛教的發展與判教三期佛教的發展與古德的判教現出一致的傾向這是很可注意的印度的經論或我國古德的判教大抵根據經典的先後與理致的淺深本文卻是依據論師的弘揚與經典流布人間的先後判教者從一切經都是佛陀一代所説的觀念出發它的判教自然會遭遇困難但經典的次第流布古人也不否認後出的經典往往提到前出的就在這一點上古人據經判教與史的發展有了合一的可能性三期佛教史的發展承認三大思想系的始終存在理解它的錯綜復雜性在時代思潮的主流上去分判這與偏執一經一論一句或洞觀大勢的不同史的研究不是為了考證應有探索佛陀本懷的動機它的最後目的在發現演變中的共通點與發展中的因果遞嬗去把握佛教的核心把它的真義開發出來從經典上看初期佛教的經典只説到法毗奈耶或修多羅毗奈耶摩得勒伽並不自以為小乘現在稱它為三藏教可説非常客觀第二期的經典流傳得很早經中把佛教分為小乘大乘這不但在行果上不同連説法的時間也有前後思益經與般若經的見第二法輪轉是最忠實的敘述第三期佛教是非常復雜的所以經中也有多種不同的三教説解深密經的三時教初説無常令厭第二時説一切空第三時要從空卻遍計性去體證因空所顯的真實不空這與三期佛教的見解一致還有千鉢經的三時教金光明經的轉照持三教前二時是同的第三時是更明顯的真常論與一乘十世紀以後空宗復興反映在經典上就有大乘妙智經的三時教它暗示了後期空宗的復興是在唯識以後但不能符合佛教思想開展的全貌大乘理趣六波羅蜜多經説到三藏般若波羅蜜多藏祕密陀羅尼藏這是密教盛行後的見解傳後期佛教的西藏大都這樣分判它們之所以不能盡同不外因後期佛教有各派錯綜的發達從全體上看解深密經三時不能適合後代空宗與密教盛行的史實它是後期中比較初出的大乘妙智經三時不但不能收攝後期大盛的密教也忽略了瑜伽以前的中觀它只是空有諍論中的一個剪影而已大乘理趣六波羅蜜多經的判法可以攝一切佛教但忽略了大乘顯教從三乘共大到大乘不共的劃時代的不同後期佛教除復興的空宗也不純粹以外都在唱道不空妙有現在把它綜合為第三期同時承認它的復雜性與各種三教説達到吻合從論典上看龍樹菩薩立足在性空中心的見解上把佛教分為三藏摩訶衍在後期中盛行的經典當時已有出世的所以他又把大乘分為三乘共般若與大乘不共般若二類或分為顯露與祕密這與三期的看法相合在真諦譯的世親論裡小乘大乘一乘的分判也並無矛盾從我國古德判教上看地論師的四宗因緣假名從初期開出其實還不止不真宗指三論等真宗指地論等這與三期佛教的次第全同賢首雖分五教後人把它攝為法相破相顯性三宗那不是又相同嗎嘉祥的三論宗雖標揭關河古義只分小乘大乘但它也曾在僧睿的阿含為之作般若為之照以下加上方便為之融這三階的次第等於證實三期佛教的不容否認天台呢藏通別圓四教本是從龍樹三教引伸出來可以説它在三期佛教以上加了中國發揮的新體系最近太虛大師提出三期佛教從小乘大乘顯教大乘密教的盛行上劃為三期從它的盛行上看確乎如此並且還有教證但我那時的意見教理行都要在三期佛教中統一起來那一時代有那一時代的理論特徵性行踐特色不但要在佛陀的基本思想中獲得根據還要行解一貫不能唱道這一時代的中心理論又提倡另一時代的中心行踐這樣願意提出點愚者之見我國過去的密宗雖然也曾自居華嚴經之上或法華經之上但教理的基本體系並不能超出台賢所以從三期佛教的教理行的統一上看密宗應與顯教大乘一分的真常論合一無著師資的瑜伽派應屬於那一時期呢這倒是值得研究的天台宗的別教本來與賢家的終教相近但賢首因奘傳唯識學漸教三乘生滅心為染淨依等把它放在始空以前結果與天台的教判再也不能溝通無著師資的學説特別是奘傳的唯識學富有適合中期佛教的成分但從無著師資的論典去看建立因果緣起不論是真妄和合或者生滅心賴耶總是深細不可知的是不共小乘的見地賴耶轉成法身法身是真常的攝大乘論大乘莊嚴經論都這樣説它與如來藏出纏的見地一致大乘離執證真的見道是不共小乘的這一系的學者思想或有出入但從不離開圓成實非空的見解唯心真常是後期佛教的特徵它是後期佛教的它絶不比大涅槃經金光明經勝鬘經如來藏經等早出它是從説一切有系的基礎上培植起唯心真常的大乘之花它是大乘佛教中後起的生力軍用飛快的速度從無常論達到真常四法身尚在人間經典記載如來的正法因之被稱為法身如來生身雖滅法身尚存這是生在佛滅後二十六紀的我們所應該欣幸的現存人間的佛典數量多而有廣大信衆的可以分為三系一巴利文系三世紀中摩呬陀到錫蘭開始傳入佛教四世紀末年在大寺結集三藏這是有名的巴利文佛教成為今日南方佛教的聖典二華文系七世紀漢桓帝時起到十五世紀汴宋時止我國經過九世紀的長期翻譯成為六千卷的大藏從我國內地又流傳到海東三藏文系從十二世紀唐太宗時到十六世紀佛經傳入我國的西藏除藏衛外還流行康青蒙古一帶巴利文系純粹屬於初期佛教它是上座中的分別説系分別説系的銅鍱部並且是依九世紀的覺音尊者為標準的所以有人稱它為新上座部它有七部毗曇在制度上它維持一種接近原始佛教的僧制這是從事巴利文的修學者所應該注意的地方華文系的傳譯已是印度第二期佛教發揚的時代所以最初傳來已大小並盛它與西域的佛教特別有關在華文聖典中初期佛教有化地法藏大衆有部的廣律還有飲光部的戒經法藏正量銅鍱部的律論這在佛陀制戒與組織僧團的原則的探討上實為人間佛典中的瓌寶在論典上除説一切有系的身義六足等以外有非常古型的舍利弗阿毗曇論富有新意的成實論第二期佛教除大乘經以外龍樹的大智度論與十住毗婆沙論洋洋巨製根本而詳備的龍樹學是華文佛教無上的光榮傳譯者羅什三藏不朽的功績使吾人生起無限的敬意後期佛教裡關於無著系的傳譯得非常完備又精嚴成唯識論是著名的代表作發揚楞伽經勝鬘經等的論典有馬鳴堅慧論特別是大乘起信論它雖只短短兩卷卻有與大智度論成唯識論同等的價值大智度論成唯識論大乘起信論是華文大乘論的精髓代表大乘法門的三個體系後期佛教的空宗論典是我們所欠缺的但不是沒有翻譯的機會這不得不要怪玄奘師資了在密典前三部大體完具少有無上瑜伽為甚麼少趙宋的帝王認為中國係禮義廉恥之邦偽經不容亂傳有的譯出而被禁止了的從這簡短的敘述看來華文佛教是具足三期的聖典初期比巴利文系更有價值中期是它的光榮後期有所缺也有所長還有一點隋唐以前傳譯的大乘經譯筆雖或者拙劣些但保存了初期大乘中期的幾多古義而是後期佛教所忽略的東西華文佛教反映了印度三期佛教的全貌藏文系的精彩在後期初期佛教它的欠缺太多連四阿含也沒有論是偏重十世紀的俱舍論與論疏律是有部後期的中期佛教的經典很豐富西藏雖然盛行性空法門但龍樹提婆的論典僅有幾部小品的著作而且還是偈頌後期佛教無著系的論典很詳備特別是陳那法稱的因