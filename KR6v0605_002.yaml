與涅槃無毫釐差別的結論三法印與一實相印的關係如何在性空論者的見地像龍樹菩薩説三法印即是一實相印如果無常不合實相就不成其為印了不過初期似乎是多説三法印後期多説一實相印唯有在中期佛教中才能一以貫之沒有離一實相的三法印也沒有離三法印的一實相七中道之行佛教是實踐的人生宗教誦習千章不如一行就是教理的探索目的也在獲得正知正見以指導行踐理解與行踐必然一貫這在三期佛教的行踐中可以完美證實佛法中的神奇與臭腐行踐就是試金石佛陀的本懷唯有在行踐中才能突破空談的罥索正確的把握它初期佛教比較接近原始佛教它的行踐特色可以從佛陀適應時代的根機中去理解當時的印度可以分為兩大流一是出家的苦行者目的在個人的解脫除實行嚴酷的苦行外注重禪定的修養以達到廓然無纍的解脫這解脫在佛陀看來只是一種定境而已二是在家的樂行者目的在五欲的享受在後世人天的快樂所用的方法是布施持戒祭祀天神佛陀適應時代的根性唱道中道之行反對祭祀但承認諸天是衆生之一批評無益的苦行但也讚歎合理的淡泊知足大體上初期佛教的聲聞出家弟子衣食知足淡泊清淨少事少業修習禪定是適應這出家苦行者的釋尊的常隨衆不多是從外道中來嗎不同的在注重出世的無我正見與不許有害身心的苦行其實在家經營事業生育男女也還是可以解脫兼攝樂行者那還不能接受出世法的佛常説端正法就是布施持戒生天之法這主要的是適應在家的樂行者釋尊反對他們的祭祀生天但勸導他們布施持戒這可以得人間天上的果報不過要生高級的色無色天那非修禪定不可這又是兼攝苦行者了印度的時代根性樂行者苦行者祭祀布施持戒苦行淡泊禪定無我慧人乘天乘出世法佛教中道之行這樣看來人乘是側重施戒的天乘又加禪定出世法再加無我慧當時出世法雖可説全部是聲聞乘但也還偶有菩薩菩薩是側重利他的在一般聲聞弟子看來菩薩雖在僧中持戒但不修禪定不斷煩惱所以聲聞是側重因定發慧的菩薩是注重布施持戒的據初期佛教的解説在智慧上講聲聞菩薩都是觀察無常而厭離世間的總結起來作大體上的分別人乘是世間樂行者的改善天乘是世間苦行者的救濟聲聞緣覺乘是引導苦行者出世的菩薩乘是引導樂行者出世的從世間到出世的層次上看布施不如持戒持戒不如禪定禪定不如智慧但從以智慧為主的出世法看那又聲聞的戒定自利的不如菩薩的側重施戒利他的了這一點將成為佛教徒行踐的尺度從聲聞乘為主的轉入人身菩薩適應積極的入世的為主的就是中期佛教聲聞弟子已不是教化的對象主機他需要修學般若已在埋怨自己為甚麼不想做菩薩了初期佛教中的在家弟子像賢護等十六開士寶積淨名等五百人王公宰官乃至婦女童子成為佛教的中心人物印度的群神天也在漸露頭角梵王是三果帝釋是初果諸天聽法本來初期佛教也有這樣的記載現在諸天龍鬼觀世音等已現菩薩身了因此修行苦行的外道天乘行者領袖也大有菩薩在在復雜根性與不同的行踐中可以分為三大類據龍樹菩薩説一一分鈍根的菩薩最初觀察五蘊生滅無常不淨要久而久之才能觀察一切法性空這是從無常入空的這一類大乘學者經上説他無數無量發菩薩心難得若一若二住不退者我們要知道大乘菩薩要修行六度四攝去利他的像這樣充滿了厭離世間生死可痛的心情焉能克服難關完成入世度生的目的這樣的學者百分之百是退墮凡小的二一分中根菩薩最初發心就觀察一切法空不生不滅這是中期大乘依人乘而趣入佛乘的正機是從空入無生的唯有理解一切性空才能不厭世間不戀世間才能不著涅槃卻向涅槃前進這樣的大乘行者與菩提心相應大悲為上首無所得為方便去實行菩薩的六度四攝行他一面培養悲心去實行布施持戒慈忍等利他事業一面理解性空的真理在內心中去體驗這需要同時推進因為悲智不足去專修禪定就要被定力所拘不厚厚的培植布施持戒慈忍的根基一心想證空這是邪空如果智勝於悲就有退墮小乘的危險所以在悲心沒有深切悲事沒有積集他不求證悟遍學一切法門隨分隨力去利人他時常警告自己今是學時非是證時三一類利根的菩薩他飛快的得無生忍也有即身成佛的龍樹沒有談到從何下手或者是從涅槃無生入佛道的這根性的不同性空論者的見解既不是無始法爾生成的也不像一分拙劣的學者把鈍根利根看為初學與久學根性的不同在它最初發心以前有沒有積集福智資糧成佛要度衆生要福德智慧這不是可以僥幸的鈍根者現在盲目的學者稱為利根幾乎從來沒有積集功德悲事忽略利他而急求自證的習氣異常強因種過少分智慧偶然的見佛發菩提心但厭離的劣慧使他立刻失敗這與絲毫無備倉卒應戰與優勢的敵軍硬碰結果是全軍覆沒一樣那中根者多少積集智慧功德發心以後他理解事實採取任重致遠的中道之行不敢急求自證悲心一天天的深切功德也漸廣大智慧也同時深入坦然直進完成最高的目的這像沒有充分的準備而事實上不得不應戰那必須採用消耗戰爭取時間穩扎穩打殲滅敵人一樣那利根的在未曾發心以前雖沒有機緣見佛聞法卻能處處行利他行為人群謀幸福福德廣大了煩惱也就被部分的折伏因為入世利他所以會遇見善友扶助不致墮落在世俗學術的研究中也推論出接近佛法的見地這樣的無量世來利他忘己一旦見佛聞法發菩提心自然直入無生完成圓滿正覺了這像充分預備計劃嚴密實行閃電戰一樣總之根機的利鈍全在未發心以前的有沒有準備與正法的淺深無關醍醐毒藥並不是一定的雖有這三類鈍根與小乘學者所説的相同容易墮落後一類希有希有所以無著世親他們也就不去説它要學大乘行自利利他那唯有採取積集悲智學而不證的正軌前機急求自證失敗後機自然的立刻證悟不是勉強得來或者認為非迫切的厭離自己的生死無常苦他絶不能認識他人的苦痛發大悲心去利人他們的意見非從無常門入不可這是非常錯誤的他如果願意一讀諸法無行經就知道行徑的各別了從空而入的依人乘而進趣佛乘不是貪戀世間在性空的正見中才能觀生死無常而不致退失呀從人類菩薩為主轉化為天身菩薩為主的是後期佛教在後期佛教的法會中已少有小乘聖者參加的資格除非他願意轉變中期佛教大乘的菩薩一分已不知去向一分與印度群神合流原來印度的諸天龍鬼夜叉羅剎他們竟然都是諸佛菩薩的示現因此從諸天夜叉等傳出的法門雖然近於印度的外道其實卻説得特別高妙後期佛教經過的時間很長意見也不能一致大體上菩薩有鈍漸之機有從無常入空從空入無生的漸機後期的初階段也有只許這一類的要三大阿僧祇劫才能成佛有直入頓入的利機這利機雖有的主張直入無生或直入佛道的有的以為還是從無常來不過走得快些總之是速成的時代的當機者是利根我們不妨看看它的行踐它是唯心的唯心本是後期佛教的特徵因唯心的理論與利他非神通不可的見解我們認為一般的難行大行不成其為波羅蜜多因為它不得究竟如果從定發通最好體悟清淨法相真俗雙運才能一修一切修一行一切行在定中分身千百億度脫一切衆生它要急急的從事禪定的修習了它又是速成的前二期佛教有一個原則就是成就愈大所需的時間事業愈多聲聞三生六十劫緣覺四生百劫菩薩三大阿僧祇劫到中期佛教達到三僧祇劫有限有量的見解雖有頓入的那是發心以前久久修習得來這種但知利他不問何時證悟的見地在後期佛教中突變就是法門愈妙成佛愈快三生取辦即身成佛即心即佛這當然適合一般口味的它又是他力的自依止法依止不餘依止是佛法的精髓中期佛教也還是自力不由他諸佛護持天龍擁護也是盡其在我達到一定階段才有外緣來助成説明白一點自己有法他才來護並不是請託幫忙易行道的念佛也只是能除怖畏也是壯壯膽的有人想找一條容易成佛的方法給龍樹菩薩一頓教訓怎麼這樣下劣的根性然後攝他教他念佛後來再説別的行法他説你不是教我念佛嗎龍樹説那有單單念佛可為以成佛呢但後期的佛教受著外道的壓迫覺得有託庇諸天其實是佛菩薩的必要他力的頂點達到要學佛非得先請護法神不可它又是神祕的若行者感到人生無味有點活不下去實行厭離自殺如來苦心孤詣教他們念佛的功德相好念天上的快樂這在初期佛教也有中期佛教似乎要發達些但還不出安心的範圍等到後期佛教佛菩薩與諸天融成一體不但求生淨土是念佛密宗的三密相應修天色身何嘗不是念佛佛與天既然是合一印度神教的儀式與修行的方法自然也可與佛法合一茅草可以除罪業牛糞可以塗地尸骨大有用處念念有詞的真言更是有不可思議的效力看地理卜善惡講星宿定吉凶求雨求晴求子求財燒護摩修起尸法方便為究竟印度民俗的一切在後期佛教中無所不包豈不圓融廣大哉它又是淫欲為道的初期佛教的濃厚禁欲色彩本是適應出家僧團的規則並不是究竟談在家弟子不照樣也可以悟道嗎不但説淫欲不障道並且還是妙道這至少也有點深奧先以欲鉤牽後令入佛智在中期佛教裡是大地菩薩的隨機適應淫怒癡即是戒定慧也是在説佛法不離世間後期佛教的佛與天統一以後天有天女佛菩薩也要明妃般若為母方便為父的聖教索性用男女的關係來表現適應遍行外道等淫欲為道的思想漸漸的從象徵的達到事實的生殖器稱為金剛蓮華精血稱為赤白菩提心交合是入定交合的樂觸是大樂男女的精血稱為灌頂既可即身成佛又可洋洋乎樂在其中豈不妙極了嗎這唯心的他力的速成的神祕的淫欲為道的後期佛教的主流當然微妙不可思議但大慈大悲自利利他的大乘佛法能不能在這樣的實踐下兌現確乎值得注意這三期的佛教都有菩薩從他們的實踐看來初期是依小乘行厭離為先而趣入佛乘的中期的主機是依人乘行而趣入佛乘的後期的主機是依天神乘行而趣入佛乘的環顧現實探索佛心我們應提倡些甚麼有眼睛的當看有耳朵的當聽八少壯的佛教印度的三期佛教在理論上行踐上都有它一貫的特徵這三期佛教正像人的一生初期佛教是童年它活潑天真切實批評階級制苦行迷信祭天淫蕩神我指導了不苦不樂的人生正軌不過正法的內容還沒有具體的開發理論上幼稚了些它還在求學時代重於自利中期佛教是少壯時代理智正確發達行動也能切實它不但自利還要利他它不像小孩的亂跳老翁的倚杖間眺它富有生命朝氣大踏步向前走不過世間的經歷漸多不隨時檢討惰性自私怕要躍躍欲試了後期佛教是衰老一直向滅亡前進它的經驗豐富哲理的思辨中期也有不及它的地方它的惰性漸深暮氣沉沉專為子女玉帛打算卻口口聲聲説為人上次虛大師南洋訪問回來説錫蘭教理是小乘行為是大乘中國理論是大乘行為是小乘我看南方佛教較有實際利人的行為這是初期佛教的本色現階段的中國佛教不但理論是後期的大乘唯心的他力的速成的行踐也都是後期佛教的本色我們如果要復興中國佛教使佛教的救世成為現實非推動中期的少壯青年的佛教不可後期佛教可以請它做顧問取它一分豐富的經驗我們更得發揚初期的天真切實的精神以中國內地特有的中期佛教的思想攝取藏文系及巴利文系的寶貴成分發揚佛陀本懷的即人成佛的佛教
