body:
  text: 契理契機之人間佛教一探求佛法的信念與態度三年前宏印法師的妙雲集宗趣窺探說我積多年的見聞總覺得這些人的批評抓不住印公導師的思想核心是什麼換句話說他們不知妙雲集到底是在傳遞什麼訊息最近聖嚴法師在印順長老的佛學思想中說他的著作太多涉及範圍太廣因此使得他的弟子們無以為繼也使他的讀者們無法辨識他究竟屬於那一宗派二位所說都是很正確的我在修學佛法的過程中本著一項信念不斷的探究從全體佛法中抉擇出我所要弘揚的法門涉及的範圍廣了些我所要弘揚的宗趣反而使讀者迷惘了其實我的思想在民國三十一年所寫的印度之佛教自序就說得很明白立本於根本佛教之淳樸宏闡中期佛教之行解梵化之機應慎攝取後期佛教之確當者庶足以復興佛教而暢佛之本懷也歟我不是復古的也決不是創新的是主張不違反佛法的本質從適應現實中振興純正的佛法所以三十八年完成的佛法概論自序就這樣說深深的覺得初期佛法的時代適應性是不能充分表達釋尊真諦的大乘佛法的應運而興確有他獨到的長處宏通佛法不應為舊有的方便所拘蔽應使佛法從新的適應中開展著重於舊有的抉發希望能刺透兩邊不偏於大小而能通於大小讓佛法在這人生正道中逐漸能取得新的方便適應而發揚起來這是我所深信的也就是我所要弘揚的佛法這一信念一生為此而盡力的是從修學中引發決定的在家時期我的修學佛法一切在摸索中進行沒有人指導讀什麼經論是全憑因緣來決定的一開始就以三論唯識法門為研求對象法義太深當然事倍而功半經四五年的閱讀思惟多少有一點了解理解到的佛法那時是三論與唯識與現實佛教界差距太大這是我學佛以來引起嚴重關切的問題佛法與現實佛教界有距離是一向存在於內心的問題出家來八年的修學知道佛法為中國文化所歪曲的固然不少而佛法的漸失本真在印度由來已久而且越到後來越嚴重所以不能不將心力放在印度佛教的探究上遊心法海六十年我在佛法的探求中直覺得佛法常說的大悲濟世六度的首重布施物質的精神的利濟精神與中國佛教界是不相吻合的在國難教難嚴重時刻讀到了增壹阿含經所說諸佛皆出人間終不在天上成佛也回想到普陀山閱藏時讀到阿含經與各部廣律有現實人間的親切感真實感而不是部分大乘經那樣表現於信仰與理想之中而深信佛法是佛在人間以人類為本的佛法也就決定了探求印度佛法的立場與目標如印度之佛教自序所說深信佛教於長期之發展中必有以流變而失真者探其宗本明其流變抉擇而洗鍊之願自治印度佛教始察思想之所自來動機之所出於身心國家實益之所在不為華飾之辯論所蒙蔽願本此意以治印度之佛教所以我這一生雖也寫了中國禪宗史中國古代民族神話與文化之研究對外也寫有評熊十力的新唯識論上帝愛世人等而主要是在作印度佛教史的探討而佛教思想史的探究不是一般的學問而是探其宗本明其流變抉擇而洗鍊之使佛法能成為適應時代有益人類身心的人類為本的佛法印度佛教思想史的研究我是為佛法而研究不是為研究而研究的我的研究態度與方法民國四十二年底表示在以佛法研究佛法一文中我是以佛法最普遍的法則作為研究佛法存在於人間的史實文字制度的方法主要是諸行無常諸法無我涅槃寂靜涅槃寂靜為研究佛法者的究極理想諸行無常從佛法演化的見地中去發現佛法真義的健全與正常的適應諸法無我中人無我是在佛法的研究中就是不固執自我的成見不預存一成見去研究法無我是一切都是在展轉相依相拒中成為現實的一切所以一切法無我唯是相依相成的眾緣和合的存在也就因此要從自他緣成總別相關錯綜離合中去理解這樣研究的方法研究的成果才不會是變了質的違反佛法的佛法這一研究的信念在五十六年夏所寫的談入世與佛學列舉三點要重視其宗教性重於求真實應有以古為鑑的實際意義而說真正的佛學研究者要有深徹的反省的勇氣探求佛法的真實而求所以適應使佛法有利於人類永為眾生作依怙那年冬天在說一切有部為主的論書與論師之研究自序把我的根本信念與看法列舉八項作為研究佛法的準則略我是在這樣的信念態度理想下從事印度佛教思想史的研究但限於學力體力成就有限如七十一年六月致繼程法師的信上說我之思想因所圖者大體力又差致未能完全有成大抵欲簡別餘宗必須善知自他宗故在妙雲集上編曾有三系經論之講記以明確了知三宗義理之各有差別立論方便不同晚年作品自史實演化之觀點從大乘佛法興起之因緣興起以後之發展進展為如來藏佛性妙有說從部派思想之分化以上觀佛法之初期意義澄其流正其源以佛法本義為核心攝取發展中之種種勝義以期更適應人心而跳出神天化之舊徑此為余之思想但從事而未能完成也二印度佛教思想史的分判現在世界各地所傳的佛法目標與修行儀式有相當大的差距但大體的說都是從印度傳來因時地演化而形成的印度的佛教從西元前五世紀釋尊成佛說法而開始流傳到西元十二世紀而滅亡千七百年大概的說千五百年的印度佛教我在印度之佛教中分為五個時期一聲聞為本之解脫同歸二菩薩傾向之聲聞分流三菩薩為本之大小兼暢四如來傾向之菩薩分流五如來為本之佛梵一如這五期中一三五表示了聲聞菩薩如來為主的也就是修聲聞行修菩薩行修如來行有顯著不同特色的三大類型第二與第四期表示了由前期而演化到後期的發展過程在說一切有部為主的論書與論師之研究自序又以佛法大乘佛法秘密大乘佛法三期來統攝印度佛教佛法中含攝了五期的初期與二期也就是一般所說原始佛教與部派佛教大乘佛法中含攝了五期的第三與第四期我通常稱之為初期大乘與後期大乘約義理說初期大乘是一切皆空說後期大乘是萬法唯心說秘密大乘佛法有顯著的特色所以別立為一類三期的分類正與秘密大乘者的分類相合如攝行炬論所說的離欲行地波羅蜜多行具貪行三理炬論所說的諦性義波羅蜜多義廣大密咒義因此我沒有一般人那樣統稱後三期為初期大乘中期大乘後期大乘而在前期大乘後期大乘外把末後的秘密大乘獨立為一期這是約思想的主流說如大乘佛法時期部派佛教也還在發展中秘密大乘佛法時期大乘佛法也還在宏傳只是已退居旁流了在大乘佛法中我在三十年所寫的法海探珍中說到了三系性空唯名虛妄唯識真常唯心後來也稱之為三論後期大乘是真常本有的如來藏我自性清淨心與說一切法自性空的初期大乘都是起源於南印度而流傳北方的西元三四世紀間興起的虛妄唯識論卻是淵源於北方的真常如來藏我自性清淨心法門融攝虛妄唯識而大成於中南印度完成真常唯心論的思想系如楞伽經與密嚴經所以敘列這樣的次第三系向後看真常唯心是佛德本有論正是秘密大乘的理論基礎眾生本有如來功德才有成立即生成佛易行乘的可能向前看聲聞部派的所以分流主要是一釋尊前生的事跡以本生譬喻因緣而流傳出來也就是佛的因行菩薩大行的成立二大眾部分出的部派思想接近大乘如被稱為諸法但名宗的一說部與般若法門的性空唯名是非常接近的這是從聲聞為本的佛法進展到大乘佛法的過程還有第五期的梵佛一如應改正為天佛一如因為秘密大乘所重的不是離欲的梵行而是欲界的忉利天四大王眾天式的具貪行而且天可以含攝一切天所以改名為天佛一如要更為恰當些我對印度佛教史所作的分類有五期說三期說也可分三期的大乘佛法為初期大乘佛法後期大乘佛法成為四期說大乘佛法的三系說開合不同試列表如下五期三系四期三期聲聞為本之解脫同歸佛法佛法菩薩傾向之聲聞分流菩薩為本之大小兼暢性空唯名論初期大乘佛法大乘佛法虛妄唯識論後期大乘佛法如來傾向之菩薩分流真常唯心論如來為本之天佛一如秘密大乘佛法秘密大乘佛法三從印度佛教思想史論臺賢教判上來依印度佛教史所作的分判與我國古德的判教是不同的古德的判教以天臺賢首二家為最完善但古德是以一切經為佛說依佛說的先後而判的如古代的五時教華嚴經的三照如作為出現於歷史的先後那是不符實況的然天臺所判的化法四教賢首所判的五教十宗從義理上說與印度佛教思想史的發展倒是相當接近的試列表而再為解說天臺四教賢首五教四期藏教小教佛法通教始教初期大乘佛法別教終教後期大乘佛法頓教圓教圓教秘密大乘佛法佛法與天臺的藏教賢首的小教相當天臺稱之為藏教依經律論立名法華經雖說到小乘三藏但藏教不但是聲聞也有菩薩佛菩薩大行如南傳小部中的本生漢譯十誦律等也說到五百本生佛除經律中釋尊的言行外南傳小部中有所行藏佛譬喻在漢譯中佛譬喻是編入根本說一切有部毘奈耶藥事中的佛法既通於聲聞緣覺菩薩佛稱之為藏教應該比小教好些賢首的小教就是十宗中的前六宗從犢子部的我法俱有宗到一說部的諸法但名宗在這裡可以看出天臺的藏教主要是依三藏說的賢首的小教重於佛教界的事實小教六宗是部派佛教不能代表一味和合的原始佛教小教與六宗顯然的不如稱為藏教的好天臺的通教與別教與初期大乘及後期大乘相當天臺家用一通字我覺得非常好如般若波羅蜜是三乘共學的阿羅漢所證與菩薩的無生忍相當只是菩薩悲願深切忍而不證罷了大乘經廣說空義每以聲聞聖者的自證為例般若經說聲聞而證入聖位的不可能再發菩提心了這是通前藏教只剩七番生死不可能再歷劫修菩薩行但接著說若發阿耨多羅三藐三菩提心我亦隨喜終不斷其功德所以者何上人應更求上法這是可以發心應該進向大乘了從思想發展來說無我我所就是空空無相無願三解脫門是阿含經所說的部派中說十方有現在佛菩薩得決定無生忍能隨願往生惡趣證知滅不生不滅諦而一時通達四諦人間成佛說法是化身初期大乘不是與佛法藏教無關而是從佛法引發而來的發揚大乘而含容傳統的三藏教法正是大乘初興所採取的態度初期大乘多說空義而空的解說不同如涅槃經以空為佛性這就是通於別圓了通是通前藏教通後別圓在印度佛教史上初期大乘法是從三乘共法而通向大乘不共法的關鍵天臺所說的別教是不共二乘的大乘菩薩特有的行證別說大乘不共的惑業苦在見思惑外別立無明住地在有漏業外別立無漏業在分段生死外別立意生身與不可思議變易死所以天臺宗有界內生死界外生死的安立初期大乘說真諦與俗諦緣起幻有即空性後期大乘說如來藏自性清淨心以空為有餘不了義說別說不空中國所說的妙有天臺稱之為中諦那是別教了這些正是後期大乘經佛法的特色賢首的五教仰推杜順的五種觀門第二生即無生門第三事理圓融門大體與天臺的通教別教相近五教與十宗相對論始教是一切皆空宗也與通教相同但賢首於始教中立始有相始教始空空始教這才與天臺不合了天臺重於經說智者大師在陳隋時代那時的地論師說梨耶是真識攝論師說梨耶通真妄都是別教所攝的賢首的時代玄奘傳出的成唯識論與十地經論攝大乘論本屬一系對如來藏自性清淨心佛性解說與經義不同賢首這才把唯識學納入始教分始教為始有與始空賢首的終教是說一乘的一切眾生有佛性的而成唯識論說有定性二乘還有無聖性的一闡提人與賢首的終教不同賢首的終教多依大乘起信論真如受熏也就是以真如為依而說明染淨因果成唯識論的染淨因果約生滅的依他起性說這又是主要的不同與終教不同於是判玄奘的唯識學為相始教還貶抑在空始教以前了唯識學說一切法空是不了義的說依他圓成實性的有性攝大乘論立十種殊勝也就是十事都與聲聞不同一切唯識心所現二障二種生死三身四身四智一切都是大乘不共法門而且不但說一切法空是不了義的更說到如來藏為真如異名心性本淨即自性清淨心約心真如說在佛教思想史上這無疑是後期大乘佛法比一部分如來藏經還要遲一些不過這一系的根本論瑜伽師地論申明三乘法義推重雜阿含經為佛法根本如攝事分與說一切有系有部與經部有關以生滅的虛妄分別識為染淨所依不妨說離佛法不遠判屬始教如來藏自性清淨心佛性這一系終教經典的傳出比無著世親論要早得多而如來藏藏識心寶性論的佛界佛菩提佛德佛事業真常唯心大乘恰是在虛妄唯識心論發展過程中完成的所以如分別教為二類真如不隨緣的如虛妄唯識論真如隨緣的如真常唯心論似乎比賢首的判虛妄唯識為始教要來得恰當些賢首立頓教只是重視唐代大興的禪宗為禪宗留一地位天臺與賢首都是以圓教為最深妙的天臺重法華經與涅槃經賢首重華嚴經在印度佛教發展史上法華經的成立應該是初期大乘佛法的後期天臺宗的圓義也與般若經空義有關當然是通過了涅槃常住與佛性也接受了華嚴經的心佛眾生三無差別的思想華嚴經有後期大乘佛法的成分賢首宗從華嚴經的地論師發展而來所以思想是重於唯心的臺賢所共同的是如來為本法華經開示悟入佛之知見論法是一乘論人是如來開跡顯本表示佛的壽命無量阿僧祇劫常住不滅華嚴經顯示毘盧遮那的果德說釋迦牟尼與悉達多是毘盧遮那佛的異名釋迦與毘盧遮那相即法華經與華嚴經還是不離釋迦而說毘盧遮那的圓滿佛果的理想與信仰本於大眾部系所說佛無所不在無所不知無所不能壽命無量圓滿的佛果觀在大乘佛法中表顯於法華經及華嚴經中圓滿佛德的信仰與理想與秘密大乘佛法如來為本之天佛一如有一致的理趣雖然天臺與賢首接觸到的秘密大乘佛法還只是事續而意境上卻有相當的共同性竺道生說闡提有佛性臺賢都闡揚如來為本的圓義可說中國古德的卓越智慧能遠見佛法思想發展必然到來的境地唐玄宗時善無畏金剛智及不空傳來的秘密法門從流傳於日本而可知的東密是以賢首宗的圓義臺密是以天臺宗的圓義來闡述的不過臺賢重於法義的理密圓與秘密大乘的重於事密還有些距離可見中國佛教到底還是以大乘佛法為主流的賢首宗成立遲一些最高的事事無礙為元代西番僧喇嘛的無上瑜伽所引用我分大乘佛法為三系性空唯名虛妄唯識真常唯心與太虛大師所判的法性空慧宗法相唯識宗法界圓覺宗三宗的次第相同其實在唐圭峰宗密的教判中已有法相宗破相宗法性宗總攝終頓圓的安立永明延壽是稱為相宗空宗性宗的這可見在大乘佛法發展中的三系說也與古德所說相通次第的前後差異是由於圭峰等是依賢首宗說的真正差別的那是抉擇取捨不同了三系的次第差異如下性空唯名論法性空慧宗法相宗相宗虛妄唯識論法相唯識宗破相宗空宗真常唯心論法界圓覺宗法性宗性宗四印度佛教嬗變的歷程探求印度佛教史實而作五期四期三期及大乘佛法三系的分判與我國古德的教判相通但抉擇取捨不同因為我是從歷史觀點而論判的印度佛教的創始到衰滅凡經五期之演變若取喻人之一生則如誕生童年少壯漸衰而老死也印度之佛教在說一切有部為主的論書與論師之研究自序說得更明白些印度佛教的興起發展又衰落正如人的一生自童真少壯而衰老童真充滿活力是可稱讚的但童真而進入壯年不是更有意義嗎壯年而不知珍攝轉眼衰老了老年經驗多知識豐富表示成熟嗎也可能表示接近衰亡所以我不說愈古愈真更不同情於愈後愈圓滿愈究竟的見解在印度佛教興滅的過程中明顯的見到佛教興起於中印度的東部漸從中印度而擴展到南印與北印及東西印度更發展到印度以外而有南傳與北傳佛教的傳播但西元四世紀以後北印與南印的佛教日漸衰落萎縮到中東印度最後因印度教與回教的入侵而滅亡衰滅固然有外來的因素但發展與衰落應有佛教自身內在的主因正如老人的終於死亡主因是身心的日漸老化一樣所以我尊重童真般的佛法也讚揚少壯般的初期的大乘佛法而作出立本於根本佛教之淳樸宏闡中期佛法之行解攝取後期佛教之確當者庶足以復興佛教的結論佛法大乘佛法的初期與後期秘密大乘佛法印度先後傳出的教典都說這是甚深的了義的究竟的如法華經說是諸經中王金光明經也這樣說秘密大乘的教典有些是名為大呾特羅王大儀軌王漢譯作大教王的以牛乳五味為譬喻的大般涅槃經如醍醐而在大乘理趣六波羅蜜多經中譬喻醍醐的是陀羅尼藏總之每一時代的教典都自稱為最甚深最究竟的到底那些教典是最甚深的那就在信解者的理解不同了先從修證的正法來說佛法中緣起是甚深的以法性法住法界真如不變易性來表示它又說涅槃是最甚深的要先知法住知緣起後知涅槃所以佛弟子是觀緣起的無常苦無我我所空能斷煩惱而證究竟涅槃的初期大乘的大般若經與文殊相關的多數教典是以真如為定量皆依勝義的不分別了解觀察緣起而直觀一切法的但名無實而修證一切法空一切法皆如一切法不可得一切法無生摩訶般若波羅蜜經明確的說深奧處者空是其義真如法性界實際涅槃如是等法是為深奧義空性真如等種種名字無非涅槃的異名涅槃最甚深本是佛法所說的但皆依勝義無蘊處界無善無惡無凡無聖無修無證一切法空的深義一般人是容易誤解的所以般若經說為久學者說生滅不生滅如化說一切法如幻化涅槃也如幻化如幻如化依龍樹論是譬喻空的這是般若經的深義是久學者所能信解修證的又說為新發意菩薩故分別生滅者如化不生不滅者不如化那就近於佛法說緣起如化涅槃不如化了般若經的深義是容易引起誤解的所以西元二三世紀間代表初期大乘的龍樹論依般若經的一切法空與但名無實會通了佛法的緣起中道而說眾因緣生緣起法我說即是空性亦為是假名亦是中道義並且說若不依俗諦不得第一義回歸於先知法住後知涅槃佛法的立場由於緣起而有是如幻如化都無自性的所以緣起即空而以有空義故一切法得成正由於一切法空所以依緣起而成立一切法華經也說諸法從本來常自寂滅相知法常無性佛種從緣起空寂與緣起的統一大乘是世間即涅槃的龍樹成立了中觀的性空唯名論可說通於佛法而又彰顯為久學者說的甚深義後期大乘的解深密經是瑜伽行派虛妄唯識論所宗依的經典經上說一切法皆無自性無生無滅本來寂靜自性涅槃於是般若等經中若諸有情已種上品善根一已清淨諸障二已成熟相續三已多修勝解四已能積集上品福德智慧資糧五彼若聽聞如是法已依此通達善修習故速疾能證最極究竟為五事具足者說能信解通達修證的就是般若經的為久學者說但五事不具足的根機對深奧義引起的問題不少依解深密經說有的不能了解有的誤解空為什麼都沒有有的進而反對大乘因此解深密經依三性來作顯了的解說一切法空是約遍計所執自性說的依他起自性緣起法是有的圓成實自性空性法界等因空所顯是有而不是沒有的這樣的解說了義說那些五事不具的也能信修大乘佛法了這一解說與般若經的為初發意心者說是大致相同的對甚深秘密作不深不密的淺顯說明稱為了義說適應不同根性而有此二類般若經與解深密經本來是一致的只是論師的解說不同罷了後期大乘經以如來藏我佛性自性清淨心為主流西元三世紀起不斷的流傳出來如大般涅槃經前分說如來大般涅槃是常樂我淨如來是常住的那能成佛的一切眾生應有如來了這就是真我我者即是如來藏義一切眾生悉有佛性即是我義我者即是如來大般涅槃經與如來藏經等說相好莊嚴的如來在一切眾生身內但是為煩惱業苦所纏還沒有顯現如人在胎藏內一樣這是真常我說我是有知的所以與為客塵所染的自性清淨心心性本淨相合也就是真常心如來藏說以為般若經等一切空經是有餘說是不究竟的提出了空與不空如大般涅槃經說空者謂無二十五有及諸煩惱一切苦一切相一切有為行不空者謂真實善色常樂我淨不動不變如來真解脫大般涅槃如來是不空的空的是生滅有為的諸行這與般若經為初發意者說的倒是非常吻合後來勝鬘經以如來空智如來空性之智有如智不二意義而說空如來藏不空如來藏也是這一意義有異法是空有異法不空與我國空即不空不空即空的圓融說不同在世俗語言中如來有神我的意義胎藏有梨俱吠陀的神話淵源所以如來藏我的思想與傳統的佛法與初期大乘佛法有相當的距離因此或者以空緣起來解說佛性不再說如來藏了眾生當來有佛性而不是一切眾生定有佛性如大般涅槃經後分所說或以如來藏為依真如的不了義說如瑜伽行派然在如來藏說主流以為這是最甚深的唯佛能了了知見十住菩薩也只能少分見聲聞與一般人只能仰信只存在於理想信仰心中如來藏說有印度神學意味而教典的傳出正是印度教復興的時候如解說為適應信仰神我的一般人的方便應該是正確的大般涅槃經師子吼菩薩品說五百位梵志不能信受佛說的無我經上說我常宣說一切眾生悉有佛性佛性者豈非我耶梵志們聽說有我就發菩提心了其實佛性者實非我也為眾生故說名為我融攝虛妄唯識的楞伽經也這樣說為斷愚夫畏無我句開引計我諸外道故說如來藏當依無我如來之藏傳統的佛法者這樣的淨化了如來藏的真常我說但適應一般人心的真常我真常心的主流真常唯心論者如楞伽經後出的偈頌品大乘密嚴經說無我是沒有外道的神我真我是有的舉種種譬喻而說真我唯是智者所見的這一適應神學為眾生故的如來藏我佛性自性清淨心是一切眾生本有的佛德本有說為秘密大乘佛法所依在中國臺賢都依此而說生佛不二的圓教再從方便來說佛法緣起甚深涅槃更甚深解脫生死真是談何容易這不是容易成就的所以釋尊有不想說法的傳說佛到底慈悲說法了有好多人從佛出家也有廣大的在家信眾但解脫的到底是少數為了化導大眾種善根而漸漸的引向解脫不一定在今生在正常的八正道外別有適應信強慧弱主要為在家的六念法門念佛念法念僧念戒念施念天心念自己歸信的三寶功德念自己持行的戒德念自己所作的布施功德念自己所能得的天界的莊嚴在憂愁恐怖特別是瀕臨病重的死亡邊緣如修六念可以心無怖畏而得內心的平安這有點近於一般宗教但不是祈求他力的救護修念佛等方便如與慧相應那信增上人也可能證果這就是四證淨由於佛涅槃後佛弟子對佛的永恆懷念發展為大乘佛法初期大乘念佛有了非常的發展如法華經說更以異方便助顯第一義異方便是特殊的方便念佛的因行而形成菩薩的六度大行念佛而造佛舍利塔西元一世紀起造佛像供養禮拜佛塔與佛像稱念佛名都是成佛的特別方便釋尊時代是沒有的偉大的菩薩六度大行要久劫修行這是怯劣根性所難以奉行的所以有往生淨土的易行道通於一切淨土而往生西方阿彌陀佛淨土受到大乘佛教界的尊重還有在十方現在一切佛前禮拜懺悔勸請隨喜迴向等也是為怯劣根性說的如信願堅固可以引入正常的菩薩道以上所說的念佛法門是一般可淺可深的重要的是觀想念佛由於那時的佛像流行念佛的都念佛的相好莊嚴觀佛身相而成就的是般舟一切佛現在前立三昧依此念佛三昧的定境而理會出是心作佛三界唯心虛妄唯識論者的唯識說也是從定境而理解出來的到了後期大乘說一切眾生本有如來藏我自性清淨心也就是本有如來德性於是修念佛觀的不但觀外在的佛更觀自身是佛秘密大乘佛法是從易行道來的易行乘認為歷劫修菩薩行成佛未免太迂緩了於是觀佛身佛土佛財佛業稱為天瑜伽而求即生成佛成佛為唯一目標度眾生等成了佛再說念佛觀在佛法的演化中是有最深遠影響的方便道的念法初期大乘中有了獨到的發展如般若經法華經等說讀經背或諷誦經寫經布施經典等有重於現生利益的不可思議功德並稱般若是大神呪是大明呪是無上呪是一切呪王咒術本是佛法所禁止的漸漸的滲入大乘佛法主要是為了護法降伏邪魔誦經與持咒有共同的傾向也與稱名的念佛相通音聲佛事特別是咒語成為秘密大乘修持的要目念佛念法外念天是非常重要的佛法容認印度群神天的存在但梵天帝釋四大王眾天的鬼神佛弟子是不信敬不禮拜的佛與在家出家弟子諸天卻表示了恭敬讚歎歸依自動的來護法的真誠邪神惡鬼在外佛與人間弟子勝過了天神是佛法的根本立場大乘佛法興起由於本生中菩薩有天神畜生身的所以有天菩薩在大乘經中出現如海龍王經大樹緊那羅王所問經密迹金剛力士經等華嚴經圓融無礙有無數的執金剛神主城神主地神大自在天來參加法會都是大菩薩善財童子參訪的善知識也附入了不少的主夜神女性夜叉夜叉菩薩名為金剛手或名執金剛金剛藏在華嚴經中地位高在十地以上初期大乘經深觀廣大菩薩行而與通俗的方便相統一入世而又有神秘化的傾向到了後期大乘如楞伽經大集經說到印度著名的天神都是如來的異名在鬼畜天的信仰者所見的如來就是鬼畜在理論上達到了天佛一如也就是神佛不二這是與印度教的興盛有關的到了秘密大乘佛法念天的影響更深如倣五部夜叉及帝釋在中間四大天王四方坐的集會而有五部如來的集會方式天菩薩著重忿怒相欲樂的身相觀自身是佛的佛慢也名為天慢而忉利天與四大王眾天的男女交合而不出精也成為實現大樂即身成佛的修證理想欲界天神大力鬼王與高等畜生天的融入佛教不但有五甘露尿屎骨髓精血五肉狗肉牛肉馬肉象肉人肉等鬼神供品而佛法所禁止的咒術以外占卜問鏡觀星宿火祭護摩這些印度神教的都納入秘密大乘念天而演變到以天鬼神教方式為佛法主流真是世俗所說的方便出下流了重信仰重秘密不得為未受法的人說說了墮地獄重修行索隱行怪的秘密大乘佛法是念佛與念欲天的最高統一五佛教思想的判攝準則在印度佛教思想史的探求中發現了一項重要的判攝準則南傳佛教的覺音三藏我沒有能力讀他的著作但從他四部阿含注釋書名中得到了啟發他的四部注釋長部注名吉祥悅意中部注名破斥猶豫相應即雜部注名顯揚真義增支部注名滿足希求四部注的名稱顯然與龍樹所說的四悉檀四宗四理趣有關如顯揚真義與第一義悉檀破斥猶豫與對治悉檀滿足希求與各各為人生善悉檀吉祥悅意與世界悉檀深信這是古代傳來的對結集而分為四部阿含表示各部所有的主要宗趣民國三十三年秋我在漢院講阿含講要先講阿含經的判攝就是依四悉檀而判攝四阿含的在原始聖典的集成研究中知道原始的結集略同雜阿含經而雜阿含經是修多羅祇夜記說等三分集成的以四悉檀而論修多羅是第一義悉檀祇夜是世界悉檀記說中弟子記說是對治悉檀如來記說是各各為人生善悉檀佛法有四類理趣真是由來久矣這可見雜阿含經以第一義悉檀為主而實含有其他三悉檀進一步的辨析那修多羅部分也還是含有其他三悉檀的所以這一判攝是約聖典主要的理趣所在而說的四悉檀傳來中國天臺家多約眾生的聽聞得益說其實是從教典文句的特性所作客觀的判攝依此四大宗趣觀察印度佛教教典的長期發展也不外乎四悉檀如表佛法第一義悉檀顯揚真義初期對治悉檀破斥猶豫大乘佛法後期各各為人悉檀滿足希求秘密大乘佛法世界悉檀吉祥悅意五十九年所寫成的原始佛教聖典之集成我從教典的先後作了以上的判攝這裡再為敘述從長期發展的觀點來看每一階段聖典的特色是一以雜阿含經相應部為本的四部阿含四部可以別配四悉檀是佛法的第一義悉檀無邊的甚深法義都從此根源而流衍出來二大乘佛法初期的大乘空相應經廣說一切法空遣除一切情執契入空性中論說大聖說空法為離諸見故是依寶積經說的所以大乘空相應經的特色是對治悉檀三大乘佛法後期為真常不空的如來藏我佛性說點出眾生心自性清淨為生善成佛的本因重在為人生善悉檀各各為人生善是多方面的心自性清淨就是心性本淨是出於滿足希求的增支部的成實論也說佛為懈怠眾生若聞心本不淨便謂性不可改則不發淨心故說本淨在後期大乘中就成為一切眾生有如來藏我佛性說這是一如來藏說是念自己身心中有佛初期大乘的念佛往生淨土念佛見佛的般舟三昧佛法六念中念佛都是為信增上者心性怯劣怖畏者說的這是二這些為人生善的教說都有易行誘導的傾向四秘密大乘佛法的流行融攝了印度神教所有的宗教行儀如說劣慧諸眾生以癡愛自蔽唯依於有著為度彼等故隨順說是法在修持上重定力以欲天的佛化為理想所以在身體上修風修脈修明點從欲樂中求成佛是世界悉檀佛法一切聖典的集成只是四大宗趣的重點開展我應用牧女賣乳而一再加水為喻為了多多利益眾生不能不求適應不能沒有方便如想多賣幾個錢而在乳中加些水一樣這樣的不斷適應不斷的加入世俗的方便四階段集成的聖典如在乳中一再加水去賣一樣終於佛法的真味淡了印度佛教也不見了這一判攝是佛法發展階段的重點不同不是說佛法都是第一義悉檀秘密大乘佛法都是世界悉檀所以說一切聖典的集成只是四大宗趣的重點開展在不同適應的底裡直接於佛陀自證的真實佛法的世界悉檀還是勝於世間的神教因為這還有傾向於解脫的成分這一切都是佛法秘密大乘是晚期佛教的主流這是佛教史上的事實所以我不能同意入篡正統的批評都是流傳中的佛法所以不會徹底否定某些佛法但我不是宗派徒裔不是學理或某一修行方法的偏好者我是為佛法而學為佛法適應於現代而學的所以在佛法的發展中探索其發展的脈絡而了解不同時代佛法的多姿多態而作更純正的更適應於現代的抉擇由於這一立場三期四期的分判相當於古德的分判而意見不同主要是由於純正的適應現代的要求也就作成這樣的結論立本於根本佛教之淳樸宏闡中期佛教指初期大乘之行解梵化之機應慎攝取後期佛教之確當者庶足以復興佛教而暢佛之本懷也歟六契理而又適應世間的佛法什麼是立本於根本佛教之淳樸佛弟子所應特別重視的是一切佛法的根源釋尊的教授教誡早期集成的聖典阿含經與律毘尼在阿含經與律中佛法僧三寶是樸質而親切的佛是印度迦毘羅衛的王子經出家修行而成佛說法入涅槃有印度的史跡可考增壹阿含經說諸佛皆出人間終不在天上成佛也佛不是天神天使是在人間修行成佛的也只有生在人間才能受持佛法體悟真理法而得正覺的自在解脫所以說人身難得佛出人間佛的教化是現實人間自覺覺他的大道所以佛法是人間佛教而不應該鬼化神化的不過在佛法的長期流傳中由於佛涅槃後佛弟子對佛的永恆懷念不免漸漸的理想化神化而失去了如來兩足人尊的特色僧伽是從佛出家眾弟子的組合佛法是解脫道依聖道修行而實現解脫在家出家是一樣的但在當時適應那時的印度風尚釋迦佛是出家的佛法的傳宏以佛及出家弟子的遊行教化而廣布是不容爭議的適應當時的社會在家弟子是沒有組織的對出家眾佛制有學處戒條且有團體的與經濟的規制出家眾的組合名為僧伽僧伽是和樂清淨健全的集團和樂清淨的僧伽內部是平等的民主的法治的以羯磨而處理僧事的出家眾除衣鉢坐臥具及少數日用品外是沒有私有財物的寺院土地財物都屬於僧伽所有而現住眾在合法下可以使用而且這不是現前住僧所有佛法是超越民族國家的只要是具備僧格的從各處來的比丘及比丘尼如長住下來就與舊住的一樣所以僧伽所有物原則是屬於四方僧的僧伽中思想是見和同解經濟是利和同均規制是戒和同遵這樣的僧伽制度才能和樂共住精進修行自利利他達成正法久住的目的但毘尼律是世界中實在律制的原則下不能沒有因時因地的適應性可惜在佛法流傳中重律的拘泥固執漸流於繁瑣形式而一分專重修證或重入世利生的卻不重毘尼不免形同自由的個人主義我想現代的佛弟子出家或在家的現在也已有組織應重視律制的特質律是法的一分法的第一義是八正道正見正思惟正語正業正命正精進正念正定依正確的知見而修行才能達成眾苦的解脫如約次第說八正道是聞思修正定相應慧的實踐歷程這是解脫者所必修的所以稱為古仙人道離此是沒有解脫的修行者在正見而起信願中要有正常的語言文字正常的身行為更要有正命正常的經濟生活初學者要這樣的學修行得解脫的更是這樣佛法在中國說圓說妙說心說性學佛者必備的正常經濟生活是很難得聽到的了依正見而起正語正業正命然後自淨其心定慧相應而引發無漏慧所以在五根信精進念定慧中佛說慧般若如房屋的棟樑一樣是在先的也是最後的佛法是理性的德行的宗教依正見而起信不是神教式的信心第一依慧而要修定定是方便所以也不是神教那樣的重禪定而眩惑於定境引起的神秘現象佛弟子多數是不得根本定的沒有神通但以法住智而究竟解脫這不是眩惑神秘者所能理解的有正見的不占卜不持咒不護摩火供佛法是這樣的純正正見如實知見的是緣起法的又一義世間一切的苦迫依眾生人類而有依人而有家庭社會國家等佛法是直從現實身心去了解一切知道身心自他物我一切是相依的依因緣而存在在相依而有的身心延續中沒有不變的非常沒有安穩的苦沒有自在的自己作主而支配其他無我世間是這樣的而眾生人不能正確理解緣起無明對自己他人他眾生外物都不能正見而起染著愛以無明染愛而有造作業因行業而有苦果三世的生死不已是這樣現生對自體身心與外境也是這樣成為眾生無可奈何的大苦如知道苦的原因所在集無明與愛等煩惱那從緣起的此生故彼生理解此滅故彼滅也就是以緣起正見而除無明不再執著常樂我我所了染愛也不起了這樣現生是不為外境及過去熏染的所干擾而解脫自在死後是因滅果不起而契入寂滅不能說是有是無只能從一切苦滅而名為涅槃涅槃是無上法佛法是理性的德行的宗教以解脫生老病死為目標的這是印度當時的思想主流但佛如實知緣起而大覺不同於其他的神教這是佛法的本源正確正常而又是究竟的正覺修學佛法的是不應迷失這一不共世間的特質什麼是宏闡中期佛教之行解中期是大乘法的興起是菩薩行為本而通於根本佛法的依涅槃而開展為一切法不生一切法空說涅槃是最甚深的當然可說是第一義悉檀但重點的開展顯然存有對治的特性如一佛法依緣起為本闡明四諦三寶世出世法在佛法流傳中顯然是異說紛紜佛教界形成異論互諍的局面大乘從高層次涅槃超越的立場掃盪一切而又融攝一切所以說一切法正一切法邪龍樹說愚者謂為乖錯智者得般若波羅蜜故入三種法門無所礙也就是這個意思二佛說緣起涅槃是緣起的寂滅是不離緣起此滅故彼滅而契入的在佛法流傳中傾向於世間與涅槃有為與無為的對立所以大乘說色等五蘊即是空空即是色等說示世間實相與文殊有關的教典說煩惱即菩提等依思益經說這是隨人所宜的對治法門三傳統的僧伽在寺塔莊嚴的發展中大抵以釋尊晚年的僧制為準繩以為這樣才是持戒的不知毘尼是世界中實不能因時因地而作合理的修正有些就不免徒存形式了專心修持的不滿拘泥守舊傾向於釋尊初期佛教的戒行正語正業正命或身語意命四清淨有重法的傾向而說罪犯不罪持不可得故具足尸羅戒波羅蜜如對治悉檀而偏頗發展那是有副作用的然般若經的深義專從涅槃異名的空性真如去發揚而實是空性與緣起不二如廣說十八空性而所以是空的理由是非常非滅故何以故性自爾這是本性空非常非滅也就是緣起如小品般若經舉如焰燒炷的譬喻而說因緣緣起甚深怎樣的甚深若心已滅是心更生不不也世尊若心生是滅相不世尊是滅相是滅相法當滅不不也世尊亦如是住如真如住不世尊亦如是住如真如住若如是住如如住者即是常耶不也世尊從這段問答中可見緣起是非常非滅的與空性不二所以經說如幻如化是譬喻緣起也是譬喻空性的般若經深義一切法如幻如化涅槃也如幻如化這一世間即涅槃的大乘法如不知立教的理趣會引起偏差的龍樹作中論依大乘法貫通阿含經的中道緣起說不生不滅不常不斷非常非滅不一不異不來不出的八不緣起一切法空依空而四諦三寶世出世法都依緣起而成立遮破異計廣說一切法空而從無我我所契入法性與釋尊本教相同一切法依緣起而善巧成立特別說明阿含經常說的十二緣起在龍樹的大智度論中說到緣起的一切法相大體與說一切有系說相近但不是實有而是幻有了三法印即一實相印依根性而有巧拙的差異這是通於阿含經及初期大乘經的說到大乘佛法的修行主要是菩提願大悲與般若無所得為方便由於眾生根性不一學修菩薩行的也有信願增上悲增上智增上的差異經典也有偏重的但在修菩薩行的歷程中這三者是必修而不可缺少的如有悲而沒有菩提願與空慧那只是世間的慈善家而已有空慧而沒有悲願那是不成其為菩薩的所以大乘菩薩行是依此三心而修主要是六度四攝布施等是佛法固有的修行項目大乘是更多的在家弟子發心所以布施為先菩薩大行的開展一則是佛弟子念佛的因行而發心修學一則是適應世間悲念世間而發心龍樹論闡揚的菩薩精神我在印度之佛教說其說菩薩也一三乘同入無餘涅槃而自發菩提心其精神為忘己為人二抑他力為卑怯自力不由他其精神為盡其在我三三僧祇劫有限有量其精神為任重致遠菩薩之精神可學略可於此見之菩薩行的偉大是能適應世間利樂世間的初期大乘佛法與佛法的差異正如古人所說古之學者為己今之學者為人什麼是梵化之機應慎梵化應改為天化也就是低級天的鬼神化西元前五年到西元二年佛法發展而進入初期大乘時代由於佛弟子對佛的永恆懷念理想化的信仰的成分加深與印度神教自然的多了一分共同性一文殊是舍利弗與梵天的合化普賢是目犍連與帝釋的合化成為如來新的二大脇侍取象溼婆天在色究竟天有圓滿的毘盧遮那佛魔王龍王夜叉王緊那羅王等低級天神都以大菩薩的姿態出現在大乘經中雖然所說的都是發菩提心悲智相應的菩薩行卻凌駕人間的聖者大有人間修行不如鬼神天的意趣無數神天成為華嚴法會的大菩薩而夜叉菩薩執金剛神地位比十地菩薩還高這表示了重天神而輕人間的心聲是值得人間佛弟子注意的二神教的咒術等也出現於大乘經中主要是為了護法但為了護持佛法誦咒來求護持這與佛法中自動的來護法不同而有祈求的意義神教的他力護持在佛法中發展起來三念佛念菩薩念法法門或是往生他方淨土或是能得現生利益消災治病延壽等求得現生利益與低級的神教巫術相近大乘佛法普及了而信行卻更低級了我不否認神教的信行如去年有一位曾參禪來信說否則乃至奧義書耆那教諸作者聖者就是騙子了我回信說不但奧義書耆那教不是騙子就是基督教甚至低級的巫術也不完全是騙人的宗教高級或低級的總有些修驗神秘經驗如有了些修驗大抵是信心十足自以為是如說給人聽決不能說是騙子不過不是騙人並不等於正確否則奧義書耆那教也好何必學佛初期大乘的神化部分如看作長阿含經那樣是世界悉檀吉祥悅意那大可作會心的微笑如受到方便法門功德無邊佛經的常例越是方便越是功德不可思議的眩惑順著世俗心而發展那是會迷失佛出人間人間大乘正行而流入歧途的什麼是攝取後期佛教之確當者如後期大乘的如來藏佛性我經說還是修菩薩行的如知道這是各各為人生善悉檀能順應世間人心激發人發菩提心學修菩薩行那就是方便了如說如來藏佛性是真我用來引人向佛再使他們知道開引計我諸外道故說如來藏當依無我如來之藏佛性者實非我也為眾生故說名為我那就可以進一步而引入佛法正義了只是信如來藏我的隨順世俗心想以為這才是究竟的這可就失去方便的妙用而引起負面作用了又如虛妄唯識論的瑜伽師地論等通用三乘的境行果攝事分還是雜阿含經修多羅的本母呢無著世親的唯識說也還是依無常生滅說分別自性緣起稱十二緣起為愛非愛緣起這是從說一切有部經部而來的重於果從因生的緣起論如知道這是為五事不具者所作的顯了解說那與龍樹的中道八不的緣起論有相互增明的作用了古代經論解理明行只要確立不神化的人間佛教的原則多有可以採用的人的根性不一如經說的異欲異解異忍佛法是以不同的方法世界對治為人第一義悉檀而引向佛法向聲聞向佛的解脫道而進修的這是我所認為是能契合佛法不違現代的佛法七少壯的人間佛教宣揚人間佛教當然是受了太虛大師的影響但多少是有些不同的一民國二十九年虛大師在我怎樣判攝一切佛法中說到行之當機及三依三趣以為現在進入依人乘行果趣進修大乘行的末法時期應依著人乘正行先修成完善的人格由此向上增進乃可進趣大乘行這是能適應現代根機但末法時期應該修依人乘而趣大乘行沒有經說的依據不易為一般信徒所接受反而有的正在宣揚稱名念佛是末法時期的唯一法門呢所以我要從佛教思想的演化中探求人間佛教的依據二大師的思想核心還是中國佛教傳統的臺賢禪淨本是初期大乘的方便道的思想依印度佛教思想史來看是屬於後期大乘的這一思想在中國我在談入世與佛學中列舉三義一理論的特色是至圓二方法的特色是至簡三修證的特色是至頓在信心深切的修學者沒有不是急求成就的一生取辦三生圓證直指人心見性成佛立地成佛或臨終往生淨土就大大的傳揚起來真正的大乘精神如彌勒的不修深禪定不斷盡煩惱從廣修利他的菩薩行中去成佛的法門在至圓至簡至頓的傳統思想下是不可能發揚的大師說中國佛教說大乘教修小乘行思想與實行真是這樣的不相關嗎不是的中國佛教自以為最上乘他修的也正是最上乘行呢遲一些的秘密大乘佛法老實的以菩薩行為迂緩而開展即身成佛的易行乘可說是這一思想傾向的最後一著我從印度佛教思想史中發見這一大乘思想的逆流佛德本具本來是佛等論所以斷然的贊同佛法與大乘佛法的初期行解三佛法本是人間的容許印度群神的存在只是為了減少弘傳的阻力而印度群神表示了尊敬與護法的真誠如作曼荼羅天神都是門外的守衛者少數進入門內成為外圍分子大乘佛法由於理想的佛陀多少神化了天鬼神菩薩也出現了發展到印度的群神與神教的行為儀式都與佛法融合這是人間佛教的大障礙所以民國三十年寫了佛在人間明確的說佛陀怎樣被升到天上我們還得照樣歡迎到人間人間佛教的信仰者不是人間就是天上此外沒有你模稜兩可的餘地從印度佛教的興起發展衰落而滅亡我譬喻為正如人的一生自童真少壯而衰老童真充滿活力是可稱讚的但童真而進入壯年不是更有意義嗎壯年而不知珍攝轉眼衰老了老年經驗多知識豐富表示成熟嗎也可能表示接近死亡存在於世間的都不出諸行無常我以這樣的看法而推重佛法與初期大乘的童真到壯年一般是生命力強重事實極端的成為唯物論唯心論是少有的由壯年而入老年內心越來越空虛所以老年的多信神教思想也接近唯心唯我唯神論是唯心論者而更多為自己著想為自己身體的健在著想長生不老的信行大抵來自早衰與漸老的老年更貪著財物自覺年紀漸老了人生不滿百常有千歲憂多為未來的生活著想所以孔子說老年戒之在得印度後期佛教與秘密大乘非常契合於老年心態唯心思想的大發展是一觀自身是佛進而在身體上修風修脈修明點要在大歡喜中即身成佛是二後期的中觀派瑜伽行派都有圓熟的嚴密思想體系知識經驗豐富是三我在這樣的抉擇下推重人間的佛陀人間的佛教我初學佛法三論與唯識就感到與現實佛教界的距離存在於內心的問題經虛大師思想的啟發終於在佛出人間終不在天上成佛也而得到新的啟發我不是宗派徒裔也不想作祖師不是講經論的法師也不是為考證而考證為研究而研究的學者我只是本著從教典得來的一項信念為佛法而學為佛教而學希望條理出不違佛法本義又能適應現代人心的正道為佛法的久住世間而盡一分佛弟子的責任我早期的作品多數是講記晚年才都是寫出的講的寫的只是為了從教典自身探求適應現代的佛法也就是脫落鬼化神天化回到佛法本義現實人間的佛法我明確的討論人間佛教民國四十年曾講了人間佛教緒言從依機設教來說明人間佛教人性人間佛教要略在預想中這只是序論而已這裡略述人間佛教要略的含義一論題核心是人菩薩佛從人而發心修菩薩行由學菩薩行圓滿而成佛從人而發菩薩心應該認清自己是具煩惱身久修再來者例外不可裝腔作勢眩惑神奇要悲心增上人而進修菩薩行的正信正見以外一定要力行十善利他事業以護法利生二理論原則是法與律合一導之以法齊之以律是佛法化世的根本原則重法而輕律即使心在入世利他也只是個人自由主義者緣起與性空的統一這是緣起甚深與涅槃甚深的統一是大乘法尤其是龍樹論的特色自利與利他的統一發心利他不應忽略自己身心的淨化否則未能自度焉能度人所以為了要利益眾生一定要廣學一切淨化身心如發願服務人群而在學校中努力學習一樣廣學一切只是為了利益眾生不為自己利益著想以悲心而學而行那所作世間的正業就是菩薩行三時代傾向現在是青年時代少壯的青年漸演化為社會中心所以要重視青年的佛教這不是說老人不能學菩薩行而是說應該重視少壯的歸信適應少壯的佛教必然的重於利他人菩薩行的大乘法是適應少壯唯一契機的法門現在是處世時代佛教本來是在人間的佛與弟子經常的遊化人間就是住在山林為了乞食每天都要進入村落城邑與人相接觸而隨緣弘化修菩薩行的應該作利益人類的事業傳播法音在不離世事不離眾生的原則下淨化自己覺悟自己現在是集體組織時代摩訶迦葉修頭陀行釋尊曾勸他回僧伽中住優波離想獨處修行釋尊要他住在僧中釋尊自己是佛在僧數的佛法是以集體生活來完成自己正法久住的與中國人所說的隱遁是根本不同的適應現代不但出家的僧伽要更合理更合於佛意化在家弟子學修菩薩行的也應以健全的組織來從事利他而自利不是為個人謀取名位權利四修持心要菩薩行應以信智悲為心要依此而修有利於他的一切都是菩薩行我曾特地寫了一篇學佛三要三要是信願大乘是願菩提心慈悲依緣起而勝解空性的智慧有信無智長愚癡有智無信長邪見如信與智增上而悲心不足就是二乘如信與慧不足雖以慈悲心而廣作利生善業不免是敗壞菩薩修學菩薩而失敗了所以在人間而修菩薩行的此三德是不可偏廢的八解脫道與慈悲心行虛大師提倡人生佛教我進而稱之為人間佛教民國四十年以前中國佛教界接受的程度是微小的臺灣佛教現在接受的程度高些但傳統的佛教界可能會不願探究道聽塗說而引起反感在少數贊同者也可能忘卻自己而陷於外向的庸俗化世間是緣起的有相對性副作用不能免於抗拒或俗化的情形但到底是越減少越好人間佛教是重於人菩薩行的但對立本於根本佛教之淳樸或者會覺得離奇的一般稱根本佛教為小乘想像為出家的隱遁獨善缺少慈悲心的怎麼能作為人間佛教人菩薩行的根本不知佛法本來無所謂大小大乘與小乘是在佛教發展中形成的小乘是指責對方的名詞釋尊宏傳的佛法適應當時的社會風尚以出家沙門弟子為重心但也有在家弟子出家與在家弟子都是修解脫行的以解脫為終極目標解脫行是以正確的見解而引發正確的信願正思惟正志依身語的正常行為正常的經濟生活為基而進修以念得定引發正慧般若覺才能實現解脫八正道的修行中正命是在家出家不同的出家的以乞求信施而生活三衣鉢坐臥具及少許日用品外是不許私有經濟的在家的經濟生活只要是國法所許可的佛法所贊同的都是正當的職業依此而過著合理的經濟生活出家的可說是一無所有財施是不可能的出家人一方面自己修行一方面遊化人間除雨季每天與一般人相見隨緣以佛法化導他們佛法否定當時社會的階級制否定求神能免罪得福否定火供護摩不作占卜瞻相咒術等邪命而以知善惡知因果知業報知凡聖來教化世人人人類也這樣的前途要自己來決定前途的光明要從自己的正見正確思想正語正業正命正當的行為中得來解脫也是這樣是如實修行所得到的釋尊是老師所以稱為本師那樣教導我們而已所以出家弟子眾是以慈和嚴肅樸質清淨的形象經常的出現於人間負起啟發激勵人心向上向解脫的義務稱為法施依現代說是廣義的社會教育在家弟子也要有正見正行也有為人說法的如質多長者在家眾多修財物的施予有悲田那是慈濟事業有敬田如供養父母尊長三寶有種植園果故林樹蔭清涼這是印度炎熱的好地方橋船以濟度造作福德舍穿井供渴乏客舍給行旅的那是公共福利事業了佛教有在家出家四眾弟子而我國一般人總以為佛教就是出家誤解出世為脫離人間不知出世是超勝世間不是隱遁也不是想遠走他方佛制比丘常乞食不許在山林中過隱遁的生活所以我在佛在人間中揭示了子題出家更接近了人間這不是局限於家庭本位者所能理解的人間佛教的人菩薩行以釋尊時代的佛法為本在以原始佛教為小乘的一般人也許會覺得離奇的然佛法的究竟理想是解脫而解脫心與利他的心行是並不相礙的雖受時代的局限不能充分表達佛的本懷但決不能說只論解脫而沒有慈悲利他的舉例說佛的在家弟子須達多好善樂施被稱為給孤獨長者梨師達多弟兄也是這樣摩訶男為了保全同族願意犧牲自己的生命這幾位都是證聖果的能說修解脫道的沒有道德意識嗎佛世的出家比丘身無長物當然不可能作物質的布施然如富樓那的甘冒生命的危險去教化粗獷的邊民能說沒有忘我為人的悲心嗎比丘們為心解脫而精進修行但每日去乞食隨緣說法為什麼要說法經中曾不止一次的說到如釋尊某次去乞食那位耕田婆羅門譏嫌釋尊不種田近於中國理學先生的觀點出家人是不勞而食釋尊對他說我也種田為說以種田為譬喻的佛法耕田婆羅門聽了大為感動要供養豐盛的飲食釋尊不接受因為為人說法是出於對人的關懷希望別人能向善向上向解脫而不是自己要得到什麼物質的利益解脫的心行決不是沒有慈悲心行的釋尊滅後佛教在發展中有的被稱為小乘雖是大乘行者故意的貶抑有些也確乎遠離了佛法的本意如佛世的質多長者與比丘大德們論到四種三昧或作解脫無量三昧空三昧無所有三昧無相三昧無量三昧是慈悲喜捨四無量心慈是給人喜樂悲是解除人的苦惱喜是見人離苦得樂而歡喜捨是怨親平等慈悲等是世間所說的道德意識了但在離私我離染愛空於貪瞋癡來說無量與空無所有無相三昧的智證解脫卻是一致的這是解脫心與道德心的不二但在小乘佛教中無量三昧被解說為世俗的也就是不能以此得解脫的又如戒在律師們的心目中是不可這樣不可那樣純屬法律的制度的有的不知毘尼是世界中實不知時地的適應拘泥固執些煩瑣事項自以為這是持戒然三學中戒尸羅的本義並不如此如說尸羅此言性善好行善道不自放逸是名尸羅或受戒行善或不受戒行善皆名尸羅十善道為舊戒十善有佛出世無佛時常有大智度論卷十三四六尸羅古人一向譯作戒其實是好行善道不自放逸也就是樂於為善而又謹慎的防護自己惡行的德行這是人類生而就有的又因不斷為善離惡而力量增強所以解說為性善或解說為數習尸羅是人與人間的道德狹義是私德軌範十善是印度一般的善行項目所以不只是佛弟子所有也是神教徒沒有宗教信仰者所有的尸羅是不一定受戒一條一條的學處古人也譯為戒的也是可以受的受戒本是自覺的出於理性出於同情覺得應該這樣的如十善之一不殺生經上這樣說斷殺生離殺生棄刀杖慚愧慈悲利益安樂一切眾生增支部十集若有欲殺我者我不喜我若所不喜他亦如是云何殺彼作是覺已受不殺生不樂殺生雜阿含經卷三七不殺生是以己度他情的我不願意被殺害他人也是這樣那我怎麼可以去殺他所以不殺生內心中含有慚愧崇重賢善輕拒暴惡的心理有慈悲利益眾生哀愍眾生的心理依佛法說心是複雜心所的綜合活動不殺生當然是有因果的但決不是一般所說的那樣殺了有多少罪要墮什麼地獄殺不得才不殺生出於功利的想法不殺生其他的例同實是人類在緣起的自他依存中自覺或不自覺的感覺到自他相同而引發對他的關懷與同情而決定不殺生的釋尊最初的教化並沒有一條條的戒學處只說正語正業正命身清淨語清淨意清淨命清淨一條一條的戒是由於僧伽的組合為了維護僧伽的和樂清淨而次第制立的制戒時佛也每斥責違犯者沒有慈心可見在僧伽中制定的戒行重於私德也還是以慈心為本的我曾寫有慈悲為佛法宗本一般道德與佛化道德可以參閱總之佛說尸羅的十善行是以慈心為本的財與法的布施慈悲喜捨三昧的修習達到遍一切眾生而起所以名為無量與儒者的仁心普洽浩然之氣充塞於天地之間相近但這還是世間的共一般的道德偉大的而不是究竟的偉大而究竟的無量三昧要通過無我的解脫道才能有忘我為人的最高道德初期大乘是菩薩道菩薩道的開展來自釋尊的本生談知滅而不證等於無生忍的不證實際的持行者可說是給以最有力的動力菩薩六度四攝的大行是在一切法不生一切法空以無所得為方便空慧而進行的不離佛法的解脫道般若只是悲心要強些多為眾生著想不急求速證而已九人菩薩行的真實形象修學人間佛教人菩薩行以三心為基本三心是大乘信願菩提心大悲心空性見一發願菩提心扼要的說是以佛為理想為目標立下自己要成佛的大志願發大菩提心先要信解佛陀的崇高偉大智慧的深徹智德悲心的廣大悲德心地的究竟清淨斷德超勝一切人天阿羅漢也不及佛的圓滿這不要憑傳說憑想像最好從釋迦牟尼佛的一代化跡中理解而深信佛功德的偉大而引發大心現實世間的眾生多苦多難世間法的相對改善當然是好事但不能徹底的解決深信佛法有徹底解脫的正道所以志願修菩薩行成佛以淨化世間解脫眾生的苦惱依此而發起上求佛道下化眾生的願菩提心但初學者不免猶如輕毛隨風東西所以要修習菩提心志願堅定以達到不退菩提心二大悲心是菩薩行的根本慈能予人安樂悲能除人苦惱為什麼只說大悲心為本佛法到底是以解脫眾生生死苦迫為最高理想的其次才是相對的救苦悲心要從人類眾生的相互依存到自他平等自他體空去理解修習的如什麼都以自己為主為自己利益著想那即使做些慈善事業也不能說是菩薩行的三空性見空性是緣起的空性初學應於緣起得世間正見知有善惡有因果有業報有凡聖進一步知道世間一切是緣起的生死是緣起的生死有因有緣而生死苦集起有因有緣而生死苦滅一切依緣起緣起是有相對性的所以是無非常不可能常住的緣起無常所以是苦不安穩而永不徹底的這樣的無常故苦所以沒有我自在自性沒有我也就沒有我所無我我所就是空空無願無相三解脫門觀無我我所名空觀無常苦名無願觀涅槃名無相其實生死解脫的涅槃是超越的沒有相也不能說是無相大乘顯示涅槃甚深稱之為空性無相無願真如法界等因無我我所而契入假名為空空相也是不可得的在大乘空相應經中緣起即空性空性即緣起空性是真如等異名不能解說為無的這是依緣起甚深而通達涅槃寂滅甚深了在菩薩行中無我我所空正知緣起而不著相是極重要的沒有無所得為方便處處取著怎麼能成就菩薩的大行這三者是修菩薩行所必要的悲心更為重要如缺乏悲心什麼法門都與成佛的因行無關的曲肱齋叢書說到西藏一位修無上瑜伽的大威德法門得到了大成就應該是成佛不遠了吧大威德明王是忿怒相這位修大威德而得大成就的流露出凶暴殘酷的神情見他的都驚慌失措有的竟被他嚇死了這位大成就者原來沒有修慈悲心可見沒有慈悲心古德傳來的什麼高明修法都不屬於成佛因行的菩提心大悲心空性見三者是修菩薩行所必備的切勿高推聖境要從切近處學習起我曾寫有菩提心的修習次第慈悲為佛法宗本自利與利他慧學概說等短篇依三心而修行一切都是菩薩行初修菩薩行的經說十善菩薩發大心十善是不殺生不不與取偷盜不邪淫出家的是不淫這三善是正常合理的身行不妄語不兩舌不惡口不綺語這四善是正常合理的語言文字行不貪不瞋不邪見這三善是正常合理的意行這裡的不貪是不貪著財利名聞權力不瞋就是慈悲心不邪見是知善惡業報信三寶功德知道前途的光明解脫成佛都從自己的修集善行中來不會迷妄的求神力等救護這十善如依三心而修就是十善菩薩行了或者覺得這是重於私德的沒有為人類謀幸福的積極態度這是誤會了佛法是宗教的不重視自己身心的淨化那是自救不了焉能度人經上說未能自度先度他菩薩於此初發心怎樣的先度他呢如有福國利民的抱負自己卻沒有學識或生活糜爛或一意孤行他能達成偉大的抱負嗎所以菩薩發心當然以利他為先這是崇高的理想要達成利他目的不能不淨化自己身心這就是理想要高而實行要從切近處做起菩薩在堅定菩提長養慈悲心勝解緣起空性的正見中淨化身心日漸進步這不是說要自己解脫了成了大菩薩成了佛再來利他而是在自身的進修中隨分隨力的從事利他不斷進修自身的福德智慧漸大利他的力量也越大這是初學菩薩行者應有的認識修人菩薩行的人間佛教佛法與初期大乘有良好的啟示如維摩詰長者六度利益眾生外從事治生是從事實業入治政法是從事政治在講論處宣講正法在學堂學校誘開童蒙那是從事教育了淫坊酒肆也去那是示欲之過能立其志不亂普入社會使別人向善向上引發菩提心這是一位在家大菩薩的形象善財童子的參訪善知識表示了另一意義善財所參訪的善知識初三位是出家的比丘開示的法門是繫念佛觀法處眾僧正確的信解三寶是修學佛法的前提其他的善知識比丘比丘尼以外有語言學者藝術工作者建築師數學家醫師國王鬻香師航海者法官總之出家菩薩以外在家菩薩是普入各階層的也有深入外道以外道身分而教化外道入佛法的善知識後來又加了一些鬼神們的誘化方便都是以自己所知所行來教人所以形成了同願同行的一群也就是從不同事業攝化有關的人同向於成佛的大道我依此而寫有青年的佛教以自己所作而教人的阿含經已這樣說如修行十善那就自作教他作讚歎他人作見他人作而心生隨喜就是自利利人了這是弘揚佛法的善巧方便試想修學佛法如十善的佛弟子在家庭中能盡到對家庭應盡的義務使家庭更和諧更美好能得到家庭成員的好感一定能誘導而成為純正的佛化家庭在社會上不論是田間商店工廠中都有同一事務的人如學佛者能成為同事中的優良工作者知識與能力以外更重要的是德性不只為自己更能關懷他人有布施愛語利行同事的表現那一定能引化有緣的同事歸向佛道的又如做醫師的為病人服務治療身病心病更為病人說到身心苦惱根源的煩惱病根治煩惱病的佛道從自己所知所行而引人學菩薩行正是善財參訪各善知識利他的最理想的方法從初期大乘時代到現在從印度到中國時地的差距太大現代的人間佛教自利利他當然會有更多的佛事利他的菩薩行不出於慧與福慧行是使人從理解佛法得到內心的淨化福行是使人從事行中得到利益兩者也互相關涉以慧行來說說法以外如日報雜誌的編發佛書的流通廣播電視的弘法佛學院與佛學研究所佛教大學的創辦利用寒暑假而作不同層次兒童青年的集體進修活動佛教學術界的聯繫重點在介紹佛法祛除一般對佛法的誤解使人正確理解而有利於佛法的深入人心以福行來說如貧窮疾病傷殘孤老急難等社會福利事業的推行家庭工作不和協而苦痛社會不同階層的衝突而混亂佛弟子應以超然關切的立場使大家在和諧歡樂中進步凡不違反佛法的一切都是好事但從事於或慧或福的利他菩薩行先應要求自身在佛法中的充實以三心而行十善為基礎否則弘化也好慈濟也好上也者只是世間的善行佛法的真義與世學混淆越來越稀薄了下也者是泥菩薩過河不見了引起佛教的不良副作用總之菩薩發心利他要站穩自己腳跟才得十向正確的目標邁進人菩薩行人間佛教的開展是適合現代的但也可能引起副作用我以為佛法有不共一般神教的特性是應該確認肯定的記得二十年前有人問我為什麼泰錫等小乘佛教區異教徒不容易發展而大乘佛教徒卻容易改信異教我當時只歎息而無辭以對這應該與佛法的寬容特性有關但釋尊的原始佛法寬容是有原則的如不否認印度的群神而人間勝過天上出家眾是不會禮拜群神的反而為天神所禮敬佛法是徹底否棄了占卜咒術護摩祈求印度神教也是一般低級的宗教行儀大乘佛教的無限寬容性印度佛教老化的主因發展到一切都是方便終於天佛不二中國佛教的理論真是圓融深妙極了但如應用到現實那會出現怎樣情形近代太虛大師是特長於融會貫通的三十年發起組織太虛大師學生會會員的資格是返俗的也好加入異教的也好去陝北的也好在大師的意境中夜叉羅剎亦有其用處太虛大師年譜後來學生會沒有進行會員這樣的雜濫不純如真的進行組織活動夜叉羅剎如黑社會一樣會對佛教引起怎樣的負面作用大乘佛教的寬容性在有利於大乘流通的要求下種種方便漸漸融攝進來終於到達天佛一如的境界我不反對方便方便是不可能沒有的但方便有時空的適應性也應有初期大乘正直捨方便的精神如虛大師在我怎樣判攝一切佛法中說到了這時候依天乘行果天國土的淨土天色身的密宗是要被謗為迷信神權的不惟不是方便而反成為障礙了虛大師長於圓融而能放下方便突顯適應現代的人生佛教可說是希有希有但對讀者大師心目中的人生佛教總不免為圓融所累現在的臺灣人生佛教人間佛教人乘佛教似乎漸漸興起來但適應時代方便的多契合佛法如實的少本質上還是天佛一如人間人生人乘的宣揚者不也有人提倡顯密圓融嗎如對佛法沒有見地以搞活動為目的那是庸俗化而已這裡不必多說重要的有的以為佛法是解脫道道德意識等於還在萌芽道德意識是菩薩道又覺得與解脫心不能合一這是漠視般若與大悲相應的經說有不用佛教術語來宏揚佛法的構想這一發展的傾向似乎有一定思想而表現出來卻又是一切神道教都是無礙的共存還是無所不可的圓融者有的提倡人間佛教而對佛法與異教佛與神表現出寬容而可以相通的態度一般的發展傾向近於印度晚期佛教的天佛一如中國晚期佛教三教同源的現代化為達成個己的意願或許是可能成功的但對佛法的純正化現代化不一定有前途反而有引起印度佛教末後一著為神教侵蝕而消滅的隱憂真正的人菩薩行要認清佛法不共世間的特性而適應今時今地今人的實際需要如虛大師的從巴利語系佛教說到今菩薩行所說以錫蘭等佛教為小乘虛大師還是承習傳統現在應作進一步的探求以成佛為理想修慈悲利他的菩薩道到底要經歷多少時間才能成佛這是一般所要論到的問題或說三大阿僧祇劫或說四大阿僧祇劫或說七大阿僧祇劫或說無量阿僧祇劫或說一生取辦即生成佛等可說眾說紛紜莫衷一是人心是矛盾的說容易成佛會覺得佛菩薩的不夠偉大如說久劫修成呢又覺得太難不敢發心修學所以經中要說些隨機的方便其實菩薩真正發大心的是不會計較這些的只知道理想要崇高行踐要從平實處做起隨分隨力盡力而行修行漸深漸廣那就在因果必然的深信中只知耕耘不問收穫功到自然成就的如悲願深而得無生忍那就體悟不落時空數量的涅槃甚深還說什麼久成速成呢印度佛教早期的論師以有限量心論菩薩道所以為龍樹所呵責佛言無量阿僧祇劫作功德欲度眾生何以故言三阿僧祇劫三阿僧祇劫有量有限大智度論卷四大乘佛法後期又都覺得太久了所以有速疾成佛說太虛大師曾提出本人在佛法中之意趣說到甲非研究佛書之學者乙不為專承一宗之徒裔丙無求即時成佛之貪心丁為學菩薩發心而修學者願以凡夫之身學菩薩發心修行即是本人意趣之所在優婆塞戒經講錄想即生成佛急到連菩薩行也不要了真是顛倒虛大師在佛法中的意趣可說是人間佛教人菩薩行的最佳指南人間佛教的人菩薩行不但是契機的也是純正的菩薩正常道下面引一段舊作的自利與利他不忍聖教衰不忍眾生苦的大心佛弟子依菩薩正常道而坦然直進吧要長在生死中修菩薩行自然要在生死中學習要有一套長在生死而能普利眾生的本領菩薩這套長在生死而能廣利眾生的本領除堅定信願菩提心長養慈悲而外主要的是勝解空性觀一切法如幻如化了無自性得二諦無礙的正見是最主要的一著所以經上說假使有世間正見增上者雖復百千生終不墮惡趣雜阿含經唯有了達得生死與涅槃都是如幻如化的這才能在生死中浮沉因信願菩提心慈悲特別是空勝解力能逐漸的調伏煩惱能做到煩惱雖小小現起而不會闖大亂子不斷煩惱瞋忿恨惱嫉害等與慈悲相違反的一定要伏除不起也不致作出重大惡業時時以眾生的苦痛為苦痛眾生的利樂為利樂我見一天天的薄劣慈悲一天天的深厚怕什麼墮落唯有專為自己打算的才隨時有墮落的憂慮發願在生死中常得見佛常得聞法世世常行菩薩道這是初期大乘的共義也是中觀與瑜伽的共義釋尊在中阿含經中說阿難我多行空瑜伽師地論解說為世尊於昔修習菩薩行位多修空住故能速證阿耨多羅三藐三菩提大乘經的多明一切法空即是不住生死不住涅槃修菩薩行的成佛大方便末了我再度表明自己我對佛法作多方面的探求寫了一些也講了一些但我不是宗派徒裔也不是論師我不希望博學多聞成一佛學者也不想開一佛法百貨公司你要什麼我就給你什麼這是大菩薩模樣我是繼承太虛大師的思想路線非鬼化的人生佛教而想進一步的非天化的給以理論的證明從印度佛教思想的演變過程中探求契理契機的法門也就是揚棄印度佛教史上衰老而瀕臨滅亡的佛教而讚揚印度佛教的少壯時代這是適應現代更能適應未來進步時代的佛法現在我的身體衰老了而我的心卻永遠不離佛教少壯時代佛法的喜悅願生生世世在這苦難的人間為人間的正覺之音而獻身
