body:
  text: 道在平常日用中民國七年十二月八日刊於菩提樹三四九期菩提樹創刊以來已屆三十周年在佛教的雜志界朱斐居士專心於這份月刊為菩提樹服務了這麼久實在是希有難得的逢此三十周年擬出紀念特輯並以如何使佛法普遍應用於日常生活中為主題這一主題對於佛法對於現代的中國佛教是非常切要應時應機是值得向佛教界鄭重提出的我們知道釋尊所開示的佛法與重信的神教不同是理智的德行的人本的宗教所以佛法的內容不外乎軌範身心淨化身心達到身心解脫自在信佛學佛不是向外追求物欲與神力救濟而是從自己身心的修治出發實現自利與利他的理想如能依著佛法去信受奉行當然會普遍應用於日常生活中佛法的信修一定會知見正確動機純正智慧與慈悲的不斷增進不過佛法在長期流行中從印度到中國或是為了適應世俗或是方便的曲引鈍根佛法傾向於神祕的形式的知識的學佛者的解行漸漸有了與日常生活脫節的現象這實在是值得大家重視的問題要知道佛法普遍應用於日常生活中並不等於天天忙著誦經禮懺放焰口日日研究經典講經著作念佛持咒素食放生到處參加法會布施功德或修建寺院辦學院辦文化慈善事業住茅蓬修行這些可能與佛法相應也可能是徒具形式從現代中國佛教來説上面這些活動並不太少而念佛持咒建大寺大佛近二十年來特別風行佛法的信受奉行者應生起軌範身心淨化身心或進而達到身心解脫自在的德用即使是弘法利生從事文化慈善教育國際佛教活動如自身忘失了這一真實意義也還不能説是佛法普遍應用於日常生活中的此地此時提出這如何使佛法普遍應用於日常生活中一題我認為值得佛教同人重視的使佛法應用於日常生活中也就是修學佛法能起軌範身心淨化身心解脫身心的德用佛法不是虛玄莫測的理論神奇怪僻的事行佛所開示的是一般人所能知能行的佛説我所説法如爪上塵所未説法如大地土這是説佛只開示基於人生正行而通向究竟的正法世間有更多的理論與事行即使有益於世間因無關於修治身心以趣向解脫的理想佛是存而不論的自有人去發揚如經中説到那是適應世間的世間善法佛直就人類衆生的身心指出迷妄流轉與如實解脫的可能激發誘導人去持行佛説五蘊六界六處法門都不外乎身心通於器界從不同立場而作不同的分別佛法可分知與行而知是行的始導也是行的完成知與行不可分離説到知即經説正見正思惟正觀如實知等身心以心識為主導的身心活動無論為對自己對他人衆生對物質世間或現在或從現在到過去從現在到未來佛説一切從緣生我論因説因佛從因緣相生相依存的理法去理解世間處理世間依緣起説法此有故彼有此生故彼生此無故彼無此滅故彼滅所以不落兩邊極端而開示不有不無不常不斷不一不異不來不去及不生不滅的中道凡從緣而生起的必歸於滅所以是無常的無常的不得究竟安穩所以是苦的無常苦的所以是無我我是真實常樂的衆生不能悟解世間是緣起的也就不能正知無常苦無我無我所不得解脫涅槃名為無明無明簡要分別為不知苦集不知苦滅一切煩惱由此而來煩惱依我我所為本計執我我所的是見染著我我所的是愛存我恃我的是慢依煩惱自我中心的思想與行為如違反緣起的相互依存損人他人他族他國利己是非法惡行業如順緣起而互助利人是法善行善行與惡行能得安樂與苦報由於不能正知緣起所以都是不徹底的是有漏的生生不已的生死法如正見緣起依法而行那就無常苦而起厭離無我無我所而能離欲離煩惱解脫而證滅身心憂苦的止息佛法只是依心識為主導的身心緣起開示苦集與苦滅的中道學佛要有此切要的正見正見不是知識而是化正確知識為自己的見地有正見就有正信信心淨為性如水清珠能清濁水一念淨信現前一定沒有煩惱沒有憂苦內心充滿了清淨安定與喜樂這樣才是真正的歸信三寶的弟子佛法所説的淨信與世俗所説的信不完全相同別人或書中所説的承認他是確實的一般也説是相信這只是確認如相信一加一等於二那樣還有對人及所説的話有好感有同感肯接受他所説的一般也稱之為信仰如信仰主義信仰領袖之類這只是世俗的順信世俗所説的信靈感信命運信風水等都不出於上二類佛法所説的淨信是依三寶而起內心所引發有清淨喜樂等感受的因正知正見而引發通過理性所以是寧靜的雖近於一神教的信心而不會陷於狂熱的迷妄説起來中國佛教徒是相當多的多數是信佛及僧羅漢與菩薩而信法的似乎不多不知法不信法所以神佛不分近來竟有人主張信佛也要信神對佛阿羅漢菩薩大多數是神祕仰信以信神那樣的心情去崇信一方面信佛及賢僧的神力祈求加被一方面多數信衆為了現生與來世的世俗利益健康長壽富貴家庭和樂事業發達不墮惡道而表現為消災免難植福延壽的宗教行為雖可説方便適化但專重於向外祈求不向身心檢點淨信不生又如何能使佛法普遍應用於日常生活之中徹悟緣起而能厭離欲滅的在這重物欲而向外馳求的時代當然不大容易解了相互依存的緣起法深信善行樂果惡行苦果通於三世的因果必然律應該是學佛者所能有的信心善惡業果説特點是自力創造非他力機會均等非特殊前途光明非絶望善惡有報非不定善惡業果的深信者確信基於正見而有的合理的行為成為改善過去開拓未來的力量不怨天不尤人盡自己的努力以向上不因現在的遭遇不如意而動搖離惡行善的決心深信因果而應用於日常生活中就能表顯出佛法的精神佛法的三世因果説傳來中國一般是似信還疑存有僥幸取巧的心理多數不肯依法而行從離惡行善的人生正行中去實踐而中國固有的求籤看風水地理等嚴重的滲入佛教中為多數長老大德所容許佛教界的向外祈求以及類似巫術化的低級行為是迷妄而不純正的正信三寶深信因果是學佛的基礎所以惟有正信而汰除不純潔的迷信佛法才能普遍應用於日常生活中淨信依於正見正見從正確而深切的認識中得來佛法的正知依於聽聞起初是釋尊開示弟子們展轉傳授等到經典集成書寫記録才有依經論而聞法的為了法義的明確經弟子間的長期論辨形成了體例精嚴的論書為了應付異教徒的責難也有深明法義以護持佛法的必要不過論義的發展不厭其詳而多少有點煩瑣部派分化法義的解説有了種種的解説不同更由於佛法長時期的流通適應時機方便無邊無論是印度傳來的中國古德所宏闡的都是內容廣大有義學説理的傾向佛法在世間的發展演化可説是必然而不可免的但部類繁多內容復雜對初學者來説從什麼經書去直握佛法的心要依正知而起正信確是一件為難的事這樣也難怪上也者深究而傾向於虛玄義學成為少數人的佛法下也者信佛而不知信法有些信法的只是信某部經的偉大持誦以求功德不免惑於方便專求現實世俗的利益了我覺得佛世的周梨槃陀伽愚笨而現證阿羅漢唐代的慧能不識字而能深有所悟依佛法正見而達信智一如的證淨不一定從無邊法義的研究講習中來只是末世善知識難得不能不依於經論為正法的宏揚引生正信著想佛法正義的精要提示佛法共通的基本法義應該是非常切要的同時經論的講習以及近代興起的學術化的研究當然有其存在的價值但不一定能使人從正解而引生正信使佛法深入人心能普遍應用於日常生活之中尤其是講説者與研究者為講説而講説為研究而研究自身不能因講説研究而引起正信在學佛的立場是沒有太多價值的至於佛法的義理那些更能應用於現實也是值得注意的説到行聲聞道是八正道菩薩道是六波羅蜜與四攝大概的説自利行以戒定慧為主利他行以施戒忍為主在佛法中行是以從正見而來的淨信為出發的信為欲依欲為精勤依有了清淨信心會引起願欲誓願依法而勤行三乘道的歸依菩薩道的菩提心都是以信願為體性的有了願欲求立定志向名為發心就能策發精進努力實行以求理想的實現所以從正知以引生淨信是一切佛弟子的入佛之門在修行中戒是聖道的基礎一般以為戒就是法律那樣的這樣不可犯那樣不可以不知這只是戒的施行項目不是戒的實質什麼是戒呢梵語尸羅譯為戒尸羅此言性善好行善道不自放逸作惡是名尸羅或受戒行善或不受戒行善皆名尸羅戒是性善數習所引發的性善戒不是一般的善行是經父母師友的啓發或從自身處世中引發出來內心一度的感動激發性善力潛在的生起有勇於為善抗拒罪惡的力量如遇到犯罪的因緣內心會不自覺的發出抗拒的力量性善是潛在而日夜常增長的小小違犯性善的戒德還是存在不過犯多了戒力會減退名為戒羸如犯了重大的惡行性善的力量消失這就是破戒了性善的戒德名為律儀也譯為護就是佛法所説的戒體這樣的戒善沒有佛法的時代或有法而不知的人都可以生起的不過佛法有正見的攝導表現於止惡行善更為正確有力而不致偏失罷了基於性善的戒德在日常生活中身語意行如法由於生活方式社會關係團體軌則不一致佛法應機而有在家出家等種種戒法而依此性善力成就自利利他的功德實質上是沒有差別的有了性善雖沒有受戒或僅受五戒都可以成為向解脫的道基如沒有雖清淨受持比丘戒菩薩戒也不一定能種解脫善根所以出現於內心深處的性善戒是佛弟子受戒持戒的要點三十年來我國傳戒的法會是年年有的雖依法授受而受戒者能在事相上著力的就不可多得這就難怪不能普遍應用於日常生活之中了淨信是於佛不壞信於法不壞信於僧不壞信性善戒是聖所愛戒成就成就這信戒為內容的四不壞信決不退墮決定向三菩提正覺如進修定慧那現生就能得解脫在佛法中淨信是入佛之門戒善是學佛之基更深一步的定慧修證是不能離信戒而有所成就的經上説持戒便得不悔因不悔便得歡悅因歡悅便得喜因喜便得止因止便得樂因樂便得定依戒修定是合理的向上進修如順水行舟容易到達修定的先要離五欲及惡不善法也就是這個意義有些修習禪定的為了身體健康為了神祕感受不離欲染不斷惡法多在氣息身體上專注觀想即使一心相續能夠不流於邪定落入魔王眷屬已經難得了這不是佛法所要修的有漏或無漏的淨定説到慧悟龍樹説信戒無基憶想取一空是為邪空平等空性的體悟豈是無信無戒者所能成就的信與戒人人都在説而其實並不如一般所想像的這所以佛法不能普遍應用於日常生活了我出家以來整日在三藏文字中摸索雖説為衆生而學想求得精要來供養世人但説來慚愧法海汪洋終於一鱗片爪所得有限我總覺得佛法本來平實可行而賢者過之愚者不及所以佛法一天天在興隆中墮落現在藉此紀念特輯略申所見與真正要學佛的共勉
