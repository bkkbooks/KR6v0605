body:
  text: 苦痛與知識二十八年在漢院佛學座談會厭苦求樂是生物的特徵是文明進展的動力人類不斷地發出解除苦痛的要求就不斷推動知識的前進不過世間的現象太矛盾了推進知識來解除痛苦結果因知識的發達而加深了苦痛拿戰事來說半開化的時代不過是血流漂杵滅此朝食現在的戰事卻走上了全體性的戰爭動員一切的人力物力用之於苦痛的戰爭知識愈發達苦痛愈增加文明的世界與苦痛的人間攜手合作有人主張發展知識組織群眾來解除苦痛物質的苦痛或許獲得部分的解除內心的隱痛試問如何解放有人走上了極端主張絕聖棄智不但違反了現實即使做到塊然無知的狀態也不過麻醉自己的心靈好讓他忍受苦痛的襲擊佛教的見解苦痛的根源在無知無明在對宇宙人生缺少根本的認識在不理解相依共存的緣起法則而固執個體獨立的存在雖然世間的知識也有部分類似的思想但既不懂得徹底的無性沒有真實不變的自體自然在緣起變化的背後潛藏著自我的活動在個體獨立的倒見控制之下產生了仇恨敵對的思想利用一切的知識文化成為製造苦痛的工具知識的發達苦痛的增加形成了正比例佛法的特色從悟解緣起無性人我法我下手獲得體悟真理的知識就是般若假如通達緣起就知道假我以一切的存在為根據就能解除因自我妄執而生起不必要的苦痛實現苦樂不入於胸次的自在同時在真空智的領導下發動一切的知識和文化促成慈悲共利大樂的實現佛是一切智者也就是常樂的具體表現者靈芳演培記
