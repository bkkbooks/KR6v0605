body:
  text: 辨法相與唯識法相與唯識是研究佛法者所常遇到的問題對它必須有個認識現在把我認識到的試述一點這問題民國以前的學佛者是沒有討論過的民國以來最先由歐陽漸居士提出了法相與唯識分宗的意見即是要把法相與唯識作分別的研究問題提出後即引起太虛大師的反對主張法相唯識不可分法相必歸宗於唯識一主分一主合這是很有意義的討論民國以來在佛教思想上有較大貢獻的要算歐陽氏的內學院和大師的佛學院但在研究的主張上便有此不同這到底是該分嗎合嗎先說到兩家的同異主張要分的因為內學院在研究無著世親的論典上發現了它的差別即是雖都談一切法卻有兩種形式一是用五蘊十二處十八界蘊處界來統攝一切法一則以心心所色不相應無為來統攝一切法因此方法的差異他們覺得大乘阿毘達磨集論大乘五蘊論等是法相宗百法明門論和攝大乘論等是唯識為宗應將它分開來研究所以他們說法相明平等義唯識明特勝義等十種差別見瑜伽師地論序以顯其異虛大師以為法相唯識都是無著世親一系法相紛繁必歸到識以統攝之否則如群龍無首覺得分宗的思想不啻把無著世親的論典和思想割裂了兩家之說都有道理因為無著世親的思想是須要貫通的割裂了確是不大好但在說明和研究的方便來說如將無著系的論典作法相與唯識的分別研究確乎是有它相當的意思我覺得法相與唯識這兩個名詞不一定衝突也不一定同一從學派思想的發展中去看法相足以表示上座系阿毘曇論的特色俱舍論已經略去阿毘曇心論雜心論等都開頭就說佛說一切諸法有二種相一自相二共相所以阿毘曇論特別是西北印學者的阿毘曇論主旨在抉擇自相共相因相果相等說到一切法即用五蘊十二處十八界來類攝這是佛陀本教的說明法古人造論即以此說明一切法相依此一切法進一步的說到染淨行證這是古代佛法的形式後來佛弟子又創色心心所不相應行無為的五類法如品類足論即有此說但此五法的次第與百法明門論等先說心心所不同為何如此色心心所等五類本非講說唯識這是分析佛說蘊界處等內容而來佛陀的蘊界處說本是以有情為體且從認識論的立場而分別的現在色心心所等即不以主觀的關係而區分從客觀的諸法體類而分列為五類然此仍依蘊界處來所以先說到色法無著世親他們雖接受東南印的大乘傾向唯識而本從西北印的學系出來他們起初造論大抵沿用蘊處界的舊方式可說舊瓶裝新酒但等到唯識的思想圓熟才倒轉五法的次第把心心所安立在前建立起以心為主的唯識大乘體系所以在無著論中若以蘊處界攝法都帶明共三乘的法相以唯識說即發揮大乘不共的思想一是順古一是創新由此把它分開研究也確是有意思的虛大師的說法為什麼也有意思即是起初西北印系的法相學到後來走上唯識所以也不妨說法相宗歸唯識現在我從全體佛教的立場想說明一點即是凡唯識必是法相的法相卻不必是唯識這是什麼意思呢如來說法說一切法是因緣所生的從因緣所生的諸法開示諸行無常諸法無我涅槃寂靜的理性此一切法如推論觀察它以何為體性這才有的從法相而歸向唯識了唯識有其深刻的哲學意義是在心識為體的立場以說明諸法的因果染淨的如所見所聞的是否即對象的本質如色法的質礙性是否有其實體不是的唯識學者從認識論的考察加上禪心的體驗以為並無色法物質的實性一切一切都是依心為體性依心而存在這樣才成立唯識學唯識的派別也很多如依無著世親等論典的思想說以為一切法都是以虛妄分別為自性的所以佛說的因緣所生法即是依他起性此依他起性唯識學者即以心心所法為體如辯中邊論說虛妄分別有世親釋說虛妄分別為三界心心所法他並非不說一切法相而以為一切法都依心識為體的即真如無為也就是識的實性這樣法相是歸於唯識了然而佛法的思想系中並不一律如此還有一條路大小乘皆有如有部經部等說蘊處界各有自體即所見的色所聞的聲以及能知的心識各有其自體這樣的法相即不歸唯識然此等思想大有漏罅因為色聲等是常識的佛陀不過從常識的認識論的立場說明此等法相所以富有常識哲學的色彩在此等現實的法相上指歸法性三法印與一實相印才是佛陀的目標所以有部等法相學如稍加推論就引起問題了如熱手觸物初以為冷而冷手觸之則覺得暖和這冷與暖果真是該物的實性嗎決不如此這實由於根識的關係而決定又如薩婆多部說青黃赤白等是色法的究極實體這也難說因為光線和目力等的條件會促成所見色的變化這不過是明顯的例子所以吾人以為如何如何並不見得對象就是如此所知的一切是與心識有關係的由此發揮到極端於是歸向到唯識論無著世親論師們就特別宣說此法相的歸宗唯識不過常識中的色聲諸法如以為是對象的質這種常識的實在論固然不能盡見佛意但法相必歸唯識也不能使我們同情因為吾人認識之有心識關係是對的由心識的因緣而安立是可以說的然說色法唯是自心所變即大有問題心識真的能不假境相為緣而自由的變現一切嗎自心還見自心以自心為本質的唯識論實是忽略識由境生的特性抹煞緣起幻境的相對客觀性而強調心識的絕對性優越性所以除小乘而外大乘中法相也不必宗歸唯識心色相待的無性緣起論中觀學者即如此說這樣從法相而深入略有兩大類一唯識說二境依心有不即是心說不但中觀者從一一法相看出它的體性本空而同時即空而有的心色是相依相成的緣起說如中國天台學者中山外派主張以理心為本而建立諸法山家派主張一色一香無非中道法法具足三千諸法也還是這個唯心說與心色平等說的差別所以單從無著世親的論典來談法相與唯識歐陽氏的分宗能看出它的差別虛大師的法相必宗唯識能看出它的一致都有相對的正確性但若從整個佛法來說那應該是唯識必是法相的法相不必宗唯識向尚記
