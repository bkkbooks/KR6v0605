body:
  text: 佛學大要佛學乃佛法之學西元前五六世紀釋迦牟尼佛創立於印度佛法經長期之發展可大分為三期初期之佛法中期之大乘佛法後期之秘密大乘佛法佛法傳入中國可考者為漢哀帝元壽元年西元前二年經典之大量傳譯則始於漢桓靈之世西元二世紀後半終於趙宋真宗西元十世紀譯典雖遍及三期然初後二期譯傳而未嘗廣事弘通傳宏而卓有所成之中國佛學以中期之大乘佛法為主中國佛學本於印度之大乘佛法而大乘佛法乃承初期佛法而來故應先明初期佛法之要釋迦時代印度宗教界以一切眾生為生死不已流轉於升沈苦樂之間各提出其解脫之道釋迦於菩提樹下廓然妙悟究竟解脫尊稱為佛乃覺者之義佛以自覺者覺人自覺覺人之道名為法釋迦佛之教義在無數世界無數眾生中人有勝於天神之特德能體悟人生之真實而達於究竟解脫故佛法為人本之宗教與神教異也佛法說解脫生死要在知見生死流轉之實義而從篤行中實現之依佛說一切從緣生世間生死流轉為種種因緣所成如知苦因而不起則得解脫一切從緣生稱為不落兩邊極端處中之說如著名之緣起說此有故彼有此生故彼生謂無明緣行生緣老死憂悲苦惱如是純大苦聚集此無故彼無此滅故彼滅謂無明滅則行滅生滅則老死憂悲苦惱滅如是純大苦聚滅生死不已之集起與滅均依於緣起緣起為法爾如是法性常住之正法約集起說蒙昧無知之無明貪欲染著之愛煩惱為集起生死要因依因緣起滅以觀世間一切為空諸行常恒不變易法空我我所空性自爾故生死不已業報相續神教以我主宰義為生命主體或作業或受報佛自因緣觀之我為妄執苦迫之根源故曰無常故苦永不安穩苦故無我不得自在無我所依因緣以明無常苦無我為佛法精義不共世間法所在知緣起無常無我則能厭生死不已向涅槃而行正道正道有八正見因緣法無常無我正思惟而向於實行此二為慧學正當之行為如正語正業正命此三為戒學正精進通於三學正念正定此三為定學依定得如實知離煩惱而悟入正法緣起寂滅此乃聖者自證非言說思惟所及不可說為有與無對世間生死而方便說之則非生死曰涅槃非繫縛曰解脫非雜染曰清淨非有為生滅曰無為不生不滅非虛妄曰真實非變異曰常涅槃寂滅為聖智自證非言說邊事唯從現實生死之正見正行以實證之故釋迦佛不予深說也佛入滅百年頃佛所說法已集成雜相應阿含經中阿含經長阿含經增一阿含經四阿含經或加雜藏為五部經文隨機散說或綜集條理之辨析精嚴重阿毘達磨論為上座系或隨文貫攝融通者為大眾系學風異而宗派生焉佛與菩薩之聖德為教界所共仰菩薩成佛之道以布施持戒忍辱精進禪定般若六波羅蜜為主大眾系說同時有十方佛佛身無漏如來色身實無邊際如來威力亦無邊際諸佛壽量亦無邊際一剎那心相應般若知一切法菩薩則入決定道為欲饒益有情願生惡趣隨意能往崇高佛德與菩薩方便近於大乘而上座系無十方佛佛身有漏蓋大眾系富於理想依釋迦佛而究其極上座系則謹守歷史上之佛陀為所宗也大乘佛法初興或重信願有懺悔迴向與願生淨土行或重智證有般若與方便行般若經特重般若勝義慧菩薩以般若為導攝導一切行歸於佛一切智海經說不著不取不可得無所住意在離妄執而悟入深義深奧處者空是其義無相無作無起無生無染淨寂滅離如法性界實際涅槃是其義菩薩悟入無生無生忍即此深義經說一切但有名字一切但依世俗說有如幻如化如虛空等故本性空本性清淨本自不生般若觀一切法本性空寂是二法不合不散無色無形見無對一相所謂無相實相超脫相對二法故一切法皆真如無二無分別菩薩得無生忍住不退轉以般若無所住悲願為方便不證實際證即同小乘涅槃得無生忍菩薩悲願方便遊一切佛土見佛聞法莊嚴佛土成熟眾生趣入一切智海至於生死流轉邊事則諸法無所有如是有如是無所有是事不知名為無明不知法性本空名為無明依無明而生死流轉同於初期佛法十二因緣如虛空不可盡是獨菩薩法能除諸顛倒坐道場時應如是觀當得一切種智般若經深義即阿含之涅槃深義菩薩利根巧度觀因緣本自空寂而後有為與無為世間與出世間生死與涅槃煩惱與菩提無二無別而開展大乘佛法之特勝初期大乘經部類繁多要皆本於般若之深義故空無生無二離自性相普入諸佛一切修多羅依此深義故一俗間經書治生產業皆與實相不相違背世間學術事業不違如實空性故入世無礙於出世如維摩詰長者無量方便利益眾生善財所參善知識有醫師數學家語言學者建築師航海師國王法官等並依自身所行化導眾生入於佛道二佛法說斷貪瞋癡等煩惱然菩薩無量無數劫中願度眾生不斷煩惱斷即墮小乘涅槃煩惱本性空寂煩惱實性即是菩提菩提與貪欲是一而非二貪欲之實性即是佛法性佛法之實性亦是貪欲性是二法一相所謂是無相菩薩深觀煩惱性空如知賊是賊賊不能為害故菩薩於生死中不斷煩惱勤行精進三一切法皆如一切法皆入法界菩薩悉見一切諸法如是諸法及於法界等淨如虛空法界清淨不二為一切法通相於法界中一切法亦清淨如空虛空是無礙相故法相性空法法平等即能悟入法法無礙互相涉入佛菩薩無礙境界悉依此而通達四菩薩願成佛道願度眾生不能離於煩惱菩薩從一切愛欲而起道意菩提心六十二見及一切煩惱皆是佛種佛境界當於一切眾生煩惱中求所以煩惱為佛種佛種從緣起西元三四世紀如來藏系經典傳出如大般涅槃經初分如來藏經等如來常住不變易如來有常樂我淨四德我者即是如來藏義一切眾生悉有佛性即是我義如來藏經九喻說如來藏佛性眾生身心中有如來智慧身相如來藏無染污德相備足如我無異如來在眾生身中猶如胎藏即眾生本有如來功德或說空如來藏若離若脫若異一切煩惱藏不空如來藏過於恒沙不離不脫不異不思議佛法或說空者二十五有不空者大般涅槃如來藏本性清淨為煩惱所纏與心性本淨即自性清淨心為客塵所染說相同故如來藏即自性清淨心依此真我淨心說轉染還淨法門承法華經大集經華嚴經而來然說真我真心不空與初期大乘方便異矣敘佛菩薩聖境以啟信行明一切法無二以策修證初期大乘經之體例如是西元三世紀以下大乘論師輩出精思入微條理嚴密以通釋大乘經義印度大乘論學不外中觀瑜伽如來藏三大流論學傳於中國或據以成一家之學然中國大乘佛學主流則條理貫攝諸經參考論義而闡發大乘之極意不以印度論學而自拘也中國大乘舊傳八宗其中禪淨密律重於持行以義學見長者唯三論唯識天台賢首四宗然宏傳論義者有地論師與攝論師蔚為大流此二系與唯識宗同源且與如來藏學有關不可不論及之大乘佛學所以分宗與二義有關一釋迦佛說此有故彼有而集起生死此無故彼無而還滅涅槃依緣起中道明生死可轉為涅槃大乘經說深義涅槃寂滅即空性法性真如法界實際等依此以明一切故曰不動真際建立諸法依無住本立一切法依緣起生滅大乘依真如寂滅立說之方便異也二經說生死依無明或依於識緣名色名色緣識識與無明不外乎心識故心雜染故眾生雜染心清淨故眾生清淨又曰心性明淨客塵所染生死流轉與還滅涅槃中心識有主導之勝用此則心識為依真如為依立說之方便又異中國大乘佛學源本印度於此各有宗重故各有特勝一三論宗依中論百論十二門論為名龍樹造中論十二門論更有大智度論弟子提婆造百論姚秦鳩摩羅什譯出即印度所傳代表初期大乘中觀學三論抉擇甚深義即因緣生法以明空眾緣所生法是即無自性眾因緣生法我說即是空一切法依因緣生非實非常非一非自性是故一切法無不是空者因緣所生法如幻如化但假名有能達空則離妄執而契入勝義空寂即空而明緣有則以有空義故一切法得成一切法本性空極無自性空無自性中無著無礙故依因緣而可有一切法依因緣而能轉染還淨中論以八不明緣起善滅諸戲論蓋本於釋迦之中道說法即緣起甚深通般若之空義即涅槃甚深而顯空有無礙之正道眾生生死流轉二乘證入涅槃菩薩深入無生悲願度生圓成佛果悉本此義以安立之三論之學齊末遼東僧朗傳入江南陳隋間最為顯學唐初嘉祥吉藏集其大成三論宗以有空為教諦假中道一實諦為體義本者以無住為體中此是合門於體中開為兩用謂真俗此是用中是即開門或立體中用中體假用假以融之總以都無所得為旨歸諸大乘經同以不二正道為宗般若經法華經涅槃經等經逗緣不同互相開避至論不二正道更無別異本此進而作勝鬘經寶窟涅槃經遊意依十八空論說唯識無塵會入如來藏佛性唯識之學非中觀之舊其學衰於盛唐唯無所得正觀演化為牛頭禪與達磨門下東山法門一時媲美二唯識宗印度瑜伽學仰推彌勒瑜伽師地論為本瑜伽師地論本地分立八識第八識為心謂一切種子所隨依止性所隨依附依止性體能執受異熟所攝阿賴耶識阿賴耶識為一切有漏無漏種子所依止能執受諸根及所依止業力所感總異熟體立二類種子本有本性住種新熏習所成種惟無漏種子眾生或有或無故立五性差別決擇分中以八相證成阿賴耶識及依阿賴耶識為依建立流轉還滅論說諸識俱轉有四種業一了別器業二了別依業三了別我業四了別境業世親依之作唯識三十論十大論師作釋唐玄奘受學於那爛陀寺戒賢傳歸中國糅十師之說為成唯識論阿賴耶識了別緣器世間種子及諸色根根所依處末那識了別阿賴耶識為自我六識了別色聲等境我說識所緣了別唯識所現故三類識所緣了即三類識所變現依此說三能變然心境變現要在種子阿賴耶識攝藏無量種子別別不同名自性差別緣起依種子起現行現行剎那生滅熏成種子種子生現現行熏種阿賴耶與前七識互為因緣又末那識等依阿賴耶阿賴耶依末那阿賴耶與末那更互依存唯識宗學不失阿含識緣名色名色緣識之義唯識宗立三自性依他起性是因緣生性即唯識現遍計所執性是於依他起而起種種執著即離心實有外境圓成實性是於依他起離遍計執所顯空性即唯識性心性本淨依他起性即心心所法而以根本阿賴耶識為依止依之明轉染還淨究竟清淨即無垢識為依止然無漏正智現前契入真如空性一切無漏功德依此乃能現起由聖法因說真如為法界究竟佛果名無漏法界唯識宗依三性說不許一切法都無自性空為了義立三無性以解說之若於依他起相及圓成實相中一切品類雜染清淨遍計所執相畢竟遠離性及於此中都無所得如是名為於大乘中總空性相遣除遍計所執相是空義遍計執空而依他泯寂都無所得是空性義如約世俗安立依他圓成是有不可說空唯識宗依瑜伽師地論特重解深密經無著依阿毘達磨大乘經造攝大乘論世親為之釋梁真諦譯出唐玄奘再譯傳宏者名攝論師真諦譯時有增益然攝大乘論本義與瑜伽師地論成唯識論確有差異之處如一攝大乘論立阿賴耶識為所知一切法依然無漏種子但立新熏出世清淨無漏從最清淨法界等流正聞熏習種子所生寄在異熟識中與彼和合俱轉猶如水乳然此熏習非阿賴耶識是法身解脫身攝二依他起相為阿賴耶識為種子虛妄分別所攝諸識安立阿賴耶識為義識應知此中餘識根身六塵器世間等是其相識若意識識意等六識及所依止染污意是其見識義識是因識從賴耶種子識現起前七識為見識根身與六塵等為相識一切從賴耶種子生唯識為性成一能變說三依他起二義一者依他熏習種子而生起故二者依他雜染清淨性不成故初義即從種子因緣生義次義即不定為雜染清淨可通二分依他起性由分別妄執時成雜染性無分別時成清淨性依他雜染分遍計執性如土清淨分圓成實性如金通二分說依他起如地界礦藏依他起通二分即雖染而成虛妄分別識而識之本性清淨經無分別智乃能證得雜染分即生死清淨分即涅槃依他起則雜染清淨所依轉染還淨之樞要也真諦譯異義極多其重要者一攝大乘論引阿毘達磨大乘經無始時來界偈解為阿賴耶識為生死涅槃所依真諦約依他起阿梨耶識通二分又解為此即此阿梨耶識界以解為性並引如來藏五義以釋解性由是法自性本來清淨此清淨名如如於一切眾生平等有說一切法名如來藏以清淨真如無差別解說如來藏為瑜伽學共義故以解為性應是解脫性有果報性及解性故攝論師說梨耶通真妄二聞熏習寄在阿賴耶識中而非阿賴耶識所攝是法身解脫身攝解脫身與法身為法界離障所顯以此真諦譯說聞熏習等次第漸增捨凡夫依作聖人依聖人依者聞熏習與解性和合以此為依一切聖道皆依此生依真諦意十解即十住以上是聖人聖人證入法界聞熏習與解性和合即聞熏攝在法界生起一切聖法是則聞熏習寄在阿梨耶識而證悟法界以上實依阿梨耶識之性淨法界三玄奘譯決擇分八地菩薩捨阿賴耶識而得轉依真諦異譯決定藏論譯轉依為阿摩羅識三無性論與轉識論約境空心寂都無所得為阿摩羅識均可說為正智相應無垢識但十八空論以阿摩羅識是自性清淨心與如來藏學之自性清淨心相合真諦所譯每以如來藏學入瑜伽學以瑜伽學入如來藏學有調和會通二學之意魏菩提流支勒那摩提佛陀扇多譯出無著世親論十地經論為最著宏傳者稱地論師傳地論師以阿梨耶識為第一義心以譯者所見互異故所傳不同勒那摩提以阿梨耶為淨識即法性真如故計法性生一切法計以真如為依持慧光傳其學流行於相州南道菩提流支以阿梨耶為真識不守自性而妄現者故計阿梨耶以為依持計梨耶生一切法道寵傳其學流行於相州北道慧光再傳曇遷得真諦譯攝大乘論而傳於北土說梨耶通真妄近北道之說考勒那摩提所譯寶性論立如來藏自性清淨心為染淨依止如來藏三義佛法身遍滿真如無差別瑜伽學但依此義皆實有佛種性寶性論與彌勒大乘莊嚴經論菩提品相通然依三義說如來藏不立八識不立種子不說唯識實別為如來藏學異於瑜伽師地論所說陰入界如地煩惱業如水不正念如風淨心界如空雜染依於淨心而自性清淨心不住彼諸法依止如來藏本有過於恒沙不離不脫不異不思議佛法離染顯出清淨佛德依如來藏有生死有涅槃是依持而非生因地論師計法性生一切法立義變矣菩提流支譯唯識論立心意識了別為相應心不相應心者所謂第一義諦常住不變自性清淨心依此以解十地經之三界虛妄但是一心作菩提流支譯楞伽經如來藏識不生不滅無始世來虛妄執著種種戲論諸熏習故阿梨耶識者名如來藏如來藏與阿梨耶識合說本於楞伽經可旁通真諦之攝大乘論如來藏真心藏識之學乃成為北土唯心論之主流唯識宗及攝論地論三系同源異流並為印度大乘論學惟宏傳北地之地論師以如來藏為能生一切漸有中國佛學之特色三天台宗北齊慧文於大智度論悟三智一心於中論得三諦相即之義經慧思傳天台智顗而大成自經典東來法門不一南朝宋之慧觀初創判教華嚴為頓說漸說為五時阿含方等般若法華涅槃依經說先後為次第北土判教多約義理淺深智顗研覈取去立五時八教五時為華嚴阿含方等般若法華與涅槃序說法之先後八教中化儀四教為頓漸秘密不定明說法之儀式化法四教為藏通別圓明法義之淺深藏教為小乘三藏通教以共般若為主別教為大乘不共如阿賴耶識及如來藏為依持圓教則以法華為主慧文慧思智顗以來並禪觀與教義相資博涉眾經基於禪慧悟解藉法華經之開顯而明如來一代教意顯究極圓宗不拘印度論義純乎中國佛學也三智三諦有得於龍樹論義龍樹論所依眾經如般若經明法法皆空法法皆如一切法趣色舉色為例是趣不過維摩經等說煩惱即菩提五逆即菩提等多明相即即為天台學所本然龍樹引經無如來藏佛性之說其後如來藏說一切眾生本具不思議佛法不空瑜伽學別說阿賴耶識為依持罕言相即凡是地論攝論師義界外法門智顗依相即互融而超越之故天台圓義意通中論大智度論而義異天台學圓融深廣且約一念三千以略明之三千諸法即一切法夫一心具十法界一法界又具十法界成百法界一界具三十種世間百法界即具三千種世間此三千在一念心十法界為地獄餓鬼畜生阿修羅人天聲聞緣覺菩薩佛十界互具成百界又有三世間五陰世間眾生世間國土世間十如是如是相性體力作因緣果報本末究竟等百界一一有三十總為三千諸法介爾有心即具三千若從一心生一切法者此則是縱先後若心一時含一切法者此則是橫同時縱亦不可橫亦不可只心是一切法一切法是心故非縱非橫非一非異玄妙深絕依此具是即義一念心即一切法具一切法之一念心實只一念無明法性十法界即是不可思議一心具一切因緣所生法一句名為一念無明法性心若廣說四句成一偈即因緣所生法即空即假即中何故名無明法性心迷染以無明為本無明極重為地獄聖證以法性為本法性圓證為佛十法界不出迷悟染淨不外無明法性無明即法性法性即無明故名一念無明法性心約無明說眾生具如來藏不思議佛法約法性說如來藏具生死雜染依此義故斷煩惱是不斷斷法性具惡無可斷也修行是不修修即性是修無別修也天台學本於龍樹故以一念三千為因緣所生法即空即假即中若法性無明合有一念法陰界入等即是俗諦一切界入一法界即是真諦非一非一切即是中道第一義諦若一法一切法即是因緣所生法是為假名假觀也若一切法即一法我說即是空空觀也若非一非一切即是中道觀只此一念無明法性心具一切法相依相即非一非異雖備明迷悟諦觀修證而純一實相實相外更無別法四賢首宗地論師慧光一系經大乘起信論發展而成賢首宗大乘起信論傳為真諦所譯馬鳴菩薩造北土唯心論有法性為依持如來藏說阿黎耶識為依持之諍大乘起信論頗能統一而調和之大乘起信論立義以眾生心為法體體相用三大為法義三大與如來藏三義大同則所謂眾生心即眾生有如來藏自性清淨心依此一心而有二門心真如門心生滅門一心真如者即是一法界大總相法門體真如法界即如來藏分別說之即如實空以能究竟顯實故空性如實不空以有自體具足無漏性功德故心真如即如來藏說真如與心不二故曰唯此一心故名真如法體空無妄故即是真心常恒不變淨法滿足二心生滅者依如來藏故有生滅心所謂不生不滅與生滅和合非一非異名為阿黎耶識如來藏真心不生滅無始無明是生滅和合非一非異即自性清淨心而有染污煩惱所染而自性清淨不一不異而名為阿黎耶識即真心在纏而現為妄心故能攝一切法能生一切法以此阿黎耶識有覺在纏真心與不覺無明二義依不覺義生三細染六麤染大同十二緣起次第又依此說心意意識轉即三界虛妄唯心所作之唯識說依覺義立本覺始覺相似覺隨分覺究竟覺遠離微細念故得見心性心即常住名究竟覺而實心體無念本來平等同一覺故轉迷還覺轉染還淨圓成佛道不外真心常恒不變淨法滿足離障所顯即如來藏名為法身論覺與不覺不一不異依覺故迷若離覺性則無不覺若離不覺之心則無真覺自相可說依真如熏無明無明熏真如明流轉與還滅依如來藏有阿黎耶識依心意意識轉似同楞伽經然不立種子真妄互熏異於楞伽經此論不傳於印度古有非馬鳴造昔日地論造論借菩薩名目之之說賢首宗依唐賢首法藏得名北土宏十地經論大乘起信論智正智儼以傳賢首賢首判五教而大成華嚴宗學五教者一小教即小乘法二始教即中觀空與瑜伽唯識有三終教如來藏真心隨染如大乘起信論四頓教絕相離言如禪宗五圓教即華嚴經賢首宗說法華經之圓為同教一乘華嚴經為別教一乘稱法本教直顯毘盧遮那佛海印三昧圓滿無盡圓融無礙之理終頓圓三同稱法性宗以法性如來藏真心為本對始教空有二宗自立三性義以簡之三性各有二義真中二義者一不變義二隨緣義依他二義者一似有義二無性義所執中二義者一情有義二理無義約依他說似有所以無性空是不異有之空無性所以似有即不異空之有故空有二宗無諍論師共興諍論乃應機之說相破相成約真如心說雖復隨緣成於染淨而恒不失自性清淨只由不失自性清淨故能隨緣成染淨也非直不動性淨成於染淨亦乃成染淨方顯性淨非直不壞染淨明於性淨亦乃由性淨故方成染淨真如不變隨緣隨緣不變同大乘起信論意以簡唯識宗真如凝然不變不許隨緣之說賢首宗以華嚴經為圓極又稱華嚴宗經明華藏世界毘盧遮那佛圓滿德相敘菩薩行位以趣入佛地相即相入重重無盡華嚴經處處說之土名華藏莊嚴世界佛為毘盧遮那如來藏身即如來藏恒沙佛法所顯發心修行圓顯如來藏即是法身毘盧遮那海印三昧所顯一切相即相入名為法界緣起依佛法界性隨染淨緣所現故名性起攝大乘論明種子六義賢首義準立法界緣起因門六義六義不外空有有力無力待緣不待緣由空有義故有相即門也由有力無力義故有相入門也由有待緣不待緣義故有同體異體門也由有此等義門故得毛孔容剎海事依此明相即相入法界緣起以十玄六相十玄為同時具足相應門一多相容不同門諸法相即自在門因陀羅網境界門微細相容安立門秘密隱顯俱成門廣狹自在無礙門十世隔法異成門主伴圓明具德門託事顯法生解門然此十門隨一門中即攝餘門無不皆盡應以六相方便而會通之六相為總別同異成壞總相者一含多德故別相者多德非一故別依止總滿彼總故同相者多義不相違故同成一總相故異相者多義相望各各異故成相者由此諸義緣起成故壞相者諸義各住自法不移動故依上因門六義十玄六相顯示圓融無礙法界緣起天台與賢首並以圓義見稱後之學者莫能外也如淨土宗重於信願往生釋其義者或以天台或取賢首如密宗本後期秘密大乘佛法唐開元中傳來胎藏金剛二部密法行持有其特色東傳日本或以賢首圓義釋之成東密或以天台圓義釋之成台密如禪宗本為如來藏禪宗密判曹溪禪為直顯心性而有二類一即今能語言動作貪瞋慈忍造善業造惡業等即汝佛性即此本來是佛除此無別佛也意指南宗近天台義二妄念本寂塵境本空空寂之心靈知不昧即此空寂之知是汝真性意指荷澤宗同華嚴學宋初天台有山家山外之諍山外者乃依天台而有取於真心之學天台與華嚴亦間有所諍以今觀之天台學本於初期大乘緣起性空攝後期大乘如來藏心融會之而歸於緣起故即當前一念無明法性心為本賢首學本於如來藏心融緣起性空而歸於真心故以圓常法界心為本宗依不同雖曰同明圓義圓義自難一致然依印度大乘佛法自出機杼融會而又超越之成為中國特有之大乘佛學則二宗固無異也
