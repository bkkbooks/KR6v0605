body:
  text: 淫欲為道一祕密大乘中的無上瑜伽內容非常豐富而最具代表性的是與印度教中性力派相同男女和合的祕密如編入世界佛學名著譯叢九十七冊的印度思想與宗教四一四一五說唐玄奘所見的佛教在北方和南方的多數地區之中已經衰落不堪了這種衰落由於和叫做性力崇拜的那些魔術和色情形式的祕密主義的不幸結合而加速了印度宗教有一獨特的方面雖然不易討論但是引人注意我指的是對於生殖力量的崇拜常見的是女神的崇拜存在於許多國家之中這種崇拜在巴比倫和小亞細亞很突出在埃及雖然不很突出但仍顯著存在在多數國家之中這些神祇和儀式都是歷史上的陳跡隨著文化的發展而消滅了只有在印度以及在受了印度影響的西藏在某種程度上一直流行到現代不以為恥這些習俗主要盛行於孟加拉和阿薩姆的性力崇拜中間這就是從前盛行無上瑜伽的地區但某些毗瑟紐教派也容許放肆行為兩者都受到大多數有身分印度教徒的指責但是兩者都有受過教育有能力的辨護者以上所引出於李榮熙所譯英人所著印度教與佛教史綱從女神崇拜而引起的猥褻儀式放肆行為有的在文化發展中消滅了而流行於印度的性力派從印度傳入西藏的無上瑜伽卻在文化發展中與某些理論相結合而流傳下來並信為與神合一即身成佛的神聖行為或說是猥褻可恥的或說是神聖無上的千百年傳來的神祕性行為我不想作是非的論斷只從我理解到的略加敘述二女神崇拜與神祕性力的宗教是人類文明初啓原始神祕信仰的遺留當然已隨著文化發展而有所演變原始女權的氏族社會是民知母而不知有父的一個個的新生命從女人生育而來女人成為氏族中心女人當然也就是氏族的領袖如我國古代夏族傳下的史跡明顯的表示了這一事實夏代已進入男人中心父家長的時代但君主還稱為后如后禹后啓后羿等在甲骨文中后是女人生育兒女的象形稱領袖為后表示了女權時代的名稱在國語中還留有后帝的名詞原始社會是政教不分的人間社會的后帝也就是神祕信仰氏族祖先的神女神在夏民族中是女媧女媧氏鍊五色石以補蒼天斷鼇足以立四極殺黑龍以濟九州積蘆灰以止淫水淮南子覽冥於是地平天成不改舊物這是在天地大破壞後重建天地的女神山海經說女媧一日而七十化在漢代石刻中女媧與伏羲傳說是兄妹是龍蛇形而互相交尾的這是我國古代史傳下來的女神也就是氏族領袖從石刻的交尾形意解出女性生殖器的神祕新生命從這裡源源不斷而來這一神祕古人以為神祕感在文化發展中演化為深玄的道學如老子說谷神不死是謂玄牝玄牝之門是謂天地根玄牝朱熹解說為玄妙也牝有所受而生物者也朱子全書老子說得非常正確只是意義含蓄了些牝本來是匕平聲是女性的陰器後來有人造了一個與匕同音的屄在動物中古來母牛寫作牝母馬寫作𮩲母鹿寫作麀等但後來通寫作牝人類起初寫作𡚧後來寫作妣成為母祖母等的代名所以玄牝是深祕微妙的女陰形容生生不已的大道牝是中虛而生生不已的所以說谷神大戴禮易本命說丘陵為牡溪谷為牝谷是溪谷中虛而不盡的流水出來與牝是象形的同義詞谷神是神妙的谷是永恆不死的就是深玄莫測的牝老子的虛靜守雌都依此而引申出來玄牝是宇宙根源天地根的大道人類進步到成立家庭夫婦匹配已是男性中心的時代玄理也就是一陰一陽之謂道了文化一天天發展而原始女陰女神的神祕敬畏還在人心中潛流下來直到現代一貫道所崇奉的無極聖母無生老母還不是原始女神信仰的變形原始人類對女陰的神祕感在男家長時代演化為男人男與女取得神祕欲樂的場所這類祕密宗教的理想是印度教的性力派是神人合一祕密大乘的無上瑜伽是即身成佛我國道家的房中術是得道登仙西元一世紀班固所作的漢書藝文志方伎篇房中術共有八家可見起初以黃老思想治國的西漢房中術是非常盛行的房中術不只是一般的性交而是別有方術的我國的道家思想根本表現在老莊中老子說到玄牝為天地之根根深柢固長生久視之道莊子說到坐忘虛室生白吉祥止止分明是共世間的禪定境戰國末年方士道盛行可說是道教的先聲道教除符籙治病等外高級的是求長生不老的仙藥冶鍊金銀等丹藥服食而求長生對自己身體的修治如漢初西元二世紀初的張良導引不食榖史記留侯世家而求仙導引是行氣運氣術東漢桓帝時安世高來華譯出安般守意經安般是出入息以呼吸修習止觀而得定慧的法門那時的道家修吐納即出入息也是很流行的東漢張衡的樂府說素女為我師天老教軒皇黃帝王充的論衡說素女對黃帝陳五女之法在道家的傳說中素女仙女教黃帝修男女交合的房中術黃帝這才得道而登天的道家陳五女之法在無上瑜伽中可以多到九人徐陵答周處士書說優遊俯仰極素女之經文升降盈虛盡軒皇之圖籙素女房中術的升降盈虛不正是無上瑜伽的提降收放嗎神祕的男女交合一定要修風呼吸運氣通脈在交合時能對精液提降收放自在才得我國方士們這一修煉存在於後來稱為天師道而起源於漢末三張的太平道或五斗米道中西元五世紀初元魏的道士寇謙之傳出雲中音誦新科之誡該書編入正統道藏洞神部戒律類名老君音誦誡經魏書釋老志引文說吾太上老君自稱此經誡自天地開闢以來不傳於世今運數既出汝宣吾新科清整道教除去三張僞法租米錢稅及男女合氣之術大道清虛豈有斯事專以禮度為首而加之以服食閉鍊三張是張道陵張衡張魯東漢末年道流非常興盛如黃巾賊張角的太平道張修的五斗米道都與張魯通聲氣張魯是張陵的孫子繼承張陵的符籙治病驅鬼信道教的每年繳納五斗米稱為天租米這就是寇謙之所說的三張僞法租米錢稅所說的男女合氣之術就是房中術據老君音誦誡經說當時是淫風大行損辱道教的寇謙之要革除三張僞法成立新的天師道主張以禮度為首而加之以服食閉鍊禮度是禮儀法度奉行儒家的禮法服食閉鍊那就是導引服氣辟榖冶鍊丹藥的長生術了從上來所引述可見神祕的男女術在天師道中是非常流行的道教徒從來沒有否棄這一方術只是更隱密些在唐代道教南宗的悟真篇中也還在說種在彼家呢三釋迦牟尼在印度創始的佛法以解脫為究竟目的對男女問題在家弟子應過著國法與社會倫理所容許的夫婦正常生活出家弟子修離欲梵清淨行嚴持不得非梵行淫欲的戒行在家與出家都可以從修行而得解脫那為什麼在家的有夫婦生活而出家的要受持不得非梵行戒呢這點留在本篇的末後去解說食色性也在生死流轉中的人類確是有此本能與需要的所以在不完善的人性傾向下發展中的佛法漸有類似印度的性力派中國道家的房中術出現先是潛在流行或作神祕與暗昧的表示到西元四五世紀才漸漸的公然流行這裡先舉一經一論一事實一傳說來說明一經不可思議解脫經就是編入華嚴經的入法界品入法界品的傳出很早龍樹的大智度論已一再引用約在西元二世紀末集出入法界品敘述善財童子參訪善知識的歷程在善知識中有一位婆須蜜多是最美麗的女菩薩婆須蜜多的功德莊嚴可說是以色相度衆生的如唐譯大方廣佛華嚴經卷六十八入法界品說若天見我我為天女形貌光明殊勝無比如是乃至人非人等而見我者我即為現人非人女隨其樂欲皆令得見若有衆生欲意所纏來詣我所我為說法彼聞法已則離貪欲若有衆生暫見於我則離貪欲暫與我語若有衆生暫執我手則離貪欲若有衆生暫升我床座暫觀於我見我頻申見我目瞬抱持於我若有衆生唼我脣吻則離貪欲凡有衆生親近於我一切皆得住離貪際入菩薩一切智地現前無礙解脫依經文說這是大菩薩化度衆生的一門方便婆須蜜多是天神也是人及非人是神人合一的女菩薩他為男性衆生說法使他們離貪欲他不只說法也以執手擁抱接吻等行為而使男性離貪欲的依佛法的傳說不同類的衆生有不同類的淫事如二二交會的相抱的執手的相顧而笑的眼相顧視的都能滿足淫事而熱惱便息瑜伽師地論卷五一般衆生滿足了淫欲熱惱便息但不久又有淫欲熱惱的需求婆須蜜多可不同了從顧視執手抱持唼吻等的行動中能使衆生永離貪欲這顯然是以欲離欲的法門與後起祕密大乘的無上瑜伽雖還沒有完全一致但到底傳達了從淫欲中離欲的消息特別值得一提的婆須蜜多是險難地方人險難的梵語為突伽正是印度教中自在天溼婆天后烏摩的別名突伽早已存在於印度神教中後來從溼婆派中分出的性力派就是以突伽為主神的還有婆須蜜多的婆須或譯作婆藪是印度一部分天神的通稱婆藪天婆藪天女婆藪大仙都見於祕密大乘的教典婆藪是天神蜜多譯為友所以婆須蜜多可解說為天神的女友突伽與婆須蜜多出現於入法界品以欲離欲的法門中決不是偶然的與後起的性力派及無上瑜伽有一脈相通的一定關係圓融無礙的入法界品融攝了這一祕密法門然在一般學佛人的心目中多少有是非不分邪正莫辨的感覺一論大乘阿毗達磨集論西元四世紀中無著菩薩所造的在大乘阿毗達磨集論卷七決擇分中論議品論到祕密決擇引經說又契經言菩薩摩訶薩成就五法名梵行者成就第一清淨梵行何等為五一者常求以欲離欲二者捨斷欲法三者欲貪已生即便堅執四者怖治欲法五者二二數會二二數會原文誤作三二數貪依大乘阿毗達磨雜集論卷十六改正經上所說的五法如依文解說那是一求從淫欲中離欲的法門二不取一般的斷欲法門三如欲貪生起了要一直堅持下去四厭惡對治貪欲的法門五男女一再的交合佛法本是修離欲梵行的而所引經說恰好相反不用斷欲反而稱為第一清淨梵行這類不合佛法正道的語言如逆害於父母王及二多聞誅國及隨行是人說清淨等大乘阿毗達磨集論卷七應怎樣去解說無著在大乘阿毗達磨集論卷六中又稱之為轉變祕密意思說語句隱密不能依通常的文義去解說要轉變為反面的別解才不致於誤會如二二數會大乘阿毗達磨雜集論卷十六解說為於染淨因果差別四真諦中以世出世二道及奢摩他止毗鉢舍那觀二道數數證會故無著世親的時代以欲離欲的法門已開始流行這就是無上瑜伽男女和合的密法這一祕密法門早期的偶然流露在正常的佛法中還不能被容忍所以無著作了這樣的抉擇祕密的不了義說唐不空在西元七四六年來華譯出一切如來真實攝大乘現證大教王經廣本中一再說到蓮華金剛杵相合此說即為最上樂等不空是知道的所以在大樂金剛不空真實三昧耶經般若理趣釋卷下中說想十六大菩薩以自金剛男根與彼蓮華女根二體和合成為定慧是故瑜伽廣品中密意說二根交會五塵成大佛事不空不說男女的實體和合而說觀想男女和合修成定慧相應說二根交會是密意說與無著說部分相同其實不空的時代印度的無上瑜伽男女和合的即身成佛法門已相當興盛了不空這樣的解說也許是覺得不合中國的倫理觀念怕引起障礙而故意這樣說的吧一事實中國佛教史上曇無讖是一位卓越的大譯師他所譯的大般涅槃經卷七卷二說佛法有我即是佛性我者即是如來藏義一切衆生悉有佛性即是我義後期大乘佛法的重要論題是如來藏我佛性在曇無讖的譯典中有了充分的說明他譯出大般涅槃經四十卷外還譯了大方等大集經大方等大雲經金光明經菩薩地持經瑜伽師地論菩薩地的古譯優婆塞戒經等後期大乘在中國的開展曇無讖是有貢獻的曇無讖的譯經是在姑臧得到北涼沮渠蒙遜的護持而譯出的譯經的年代依可見的記載從北涼玄始三年西元四一四起十五年四二六止永和一年四三三曇無讖四十九歲就死了曇無讖是中天竺或說是罽賓人在佛教的記録中曇無讖是一位明解呪術所向皆驗西域號為大呪師出三藏記集卷十四高僧傳卷二出三藏記集說到曇無讖隨國王入山國王口渴曇無讖持咒使枯石流出水來故意說這是大王惠澤所感國王當然非常歡喜也就尊寵曇無讖但時間久了國王對他的待遇也薄了於是曇無讖打算咒龍入甕令天下大旱然後放龍下雨以便再得國王的優待事情被泄露了國王要殺他才逃到西域來高僧傳部分相同曇無讖為了取得國王的優待豐厚的供養不惜天下大旱害苦無數的人民從佛法在人間的立場來說曇無讖的心態與行為是多麼卑鄙與邪惡大咒師的無比神驗與純正的佛法是不相干的其實曇無讖的邪僻行為還多著呢如魏書卷九十九列傳八十七沮渠蒙遜傳說始罽賓沙門曰曇無讖東入鄯善自云能使鬼治病使婦人多子與鄯善王妹曼頭陀林私通發覺亡奔涼州蒙遜寵之號曰聖人曇無讖以男女交接之術教授婦人蒙遜諸女子婦皆從受法北史卷九十七所說相同曇無讖的使鬼即役使鬼神治病是一般咒師的行為他的專長是男女交接之術能使婦女生子的男女交接之術就是二二交會無上瑜伽的男女和合不過曇無讖修到怎樣程度是不得而知的希奇的是沮渠蒙遜的女兒兒媳婦都跟他學習北史卷九十七列傳八十一僭僞附庸中說蒙遜性淫忌忍於殺戮閨庭之中略無風紀淫亂猜忌殘酷是蒙遜的性格沮渠氏本胡人其先為凶奴官號沮渠因氏焉通志氏族略淫亂殘酷閨庭中沒有禮法確是文化低而粗獷的胡人模樣閨庭之中略無風紀正是女兒媳婦都從曇無讖學習男女交接之術的情形蒙遜性淫忌雖沒有文證怕也是從曇無讖學習的學而有效這才蒙遜寵之號曰聖人了沒有來涼州以前也就因為這樣曇無讖與王妹曼頭陀林私通了鄯善王不信這一套大概要處分他這才逃到涼州來私通這一名詞多少出於社會倫理觀念如在文化低落習慣於神祕信仰的地區那王妹的行為正是供養上師修行呢曇無讖是被殺死的被殺的原因依佛教高僧傳等說魏太武帝知道曇無讖的神術一再派人來要求沮渠蒙遜讓曇無讖去北魏蒙遜怕曇無讖的咒術幫助了北魏而魏的勢力又不敢得罪太武帝曇無讖自知處境困難以去西域求經名義而去蒙遜派人把他殺了然北史卻這麼說太武帝聞諸行人言曇無讖術乃召之蒙遜不遣遂發露其事拷訊殺之蒙遜的確是淫亂猜忌忍於殺戮的不願曇無讖去又不敢留他來個彼此都得不到揭發曇無讖的穢亂宮庭拷打審問把他殺了曇無讖的使鬼治病術男女交接術正是祕密大乘的風範一傳說罽賓迦溼彌羅滅法的傳說傳說不一但這應是有事實的魏延興二年西元四七二吉迦夜編譯的付法藏因緣傳卷六說有比丘名曰師子於罽賓國大作佛事時彼國王名彌羅掘邪見熾盛心無敬信於罽賓國毀壞塔寺殺害衆僧即以利劍用斬師子頭頭中無血唯乳流出相付法人於是便絶師子比丘的被殺依佛祖統紀卷五還別有原因原因是師子尊者在罽賓弘化聲聞遐邇外道摩目多部或作都落遮二人素學幻術乃盜為僧形潛入王宮淫犯妃后且曰不成則歸罪釋子既而事敗王大怒即毀寺害僧遂斬師子首佛祖歷代通載卷五也有相同的記載這樣師子比丘的被殺罽賓佛教的大破壞是由於外道的假冒釋子入宮淫亂而引起的然迦爾訶那鉢提多纂輯的罽賓諸王史說那拉一世曾興建一所伽藍住在這所伽藍的一位佛教行者以魔力誘拐王后引起那拉一世的憤怒將這所伽藍及所屬的數千伽藍一律焚毀所說的王名不同而由於淫犯妃后卻是一致的佛祖統紀的外道僞作釋子怕是佛教徒在傳說中的文飾吧入宮淫亂不是一般的私通而是幻術以魔力誘拐幻術魔力是宗教的是神祕的男女交接之術在印度教中是性力派佛教是祕密大乘的無上瑜伽依玄奘所傳迦溼彌羅的佛教受到二次破壞一大唐西域記卷二說迦膩色迦王沒後土著訖利多人取得政權破壞佛法後來得呬摩呾羅國王力量的幫助佛法才復興起來二西元五世紀後期嚈噠的大族王摩醯邏矩羅或譯作寐吱曷羅俱彌羅崛婆睺羅拘婆侵入印度印度北部的佛教受到了最嚴重的摧殘如付法藏因緣傳卷六大唐西域記卷三蓮華面經卷下等說傳說的入宮淫亂妃后魔力誘拐王后因神祕淫亂而引起的罽賓法滅是在摩醯邏矩羅王大破壞以前的如隋闍那崛多所譯大威德陀羅尼經卷十七說彼等比丘所至家處攝前語言後以方便令作己事於彼舍中共語言已即便停住示現身瘡於俗人所種種誑惑種種教示彼應與我如來付囑汝病者所須彼即報言汝明日來如己家無異我住於此十年勤求猶尚不能得是諸法如汝今者於一夜中已得是法常來俗家攝受白衣道遂相染愛捨離戒行如是因緣滅此法教時城中王既聞此事即大瞋忿捉彼所有三千比丘一時斷命如是因緣滅此法教的事實不只是一佛教行者二外道而是多數比丘經文沒有明說罽賓但經上接著說部分比丘渡河到多剎尸羅城這可見是罽賓了經中再說到邊地的婆睺羅舒婆王來比丘們多逃走了北方的寺院都被放火燒毀在大族王破壞以前罽賓的佛教墮落不堪遭受國王的殺害破壞經文隱約實際是與男女有關的但不是私通而是公開的說彼應與我如來付囑汝要女人奉獻身體因為這是佛說的在信仰佛教的熱情下既然是佛說的是無邊功德的大供養就與他好合了這就是以方便令作己私事如己家無異就是儼同夫妻還說這是我勤求十年後得來的佛法如汝今者於一夜中已得是法一夜就學會的佛法就是無上瑜伽的雙身法歡喜法後來元順帝的太子也說西番僧教我佛經我一夕便曉元權衡庚申外史卷下一夜就學會的祕法在初期流行時會受到正統佛法的抗拒也是社會所不能容忍的罽賓佛法所以受到嚴重的破壞罽賓本是說一切有部的重鎮受到破壞而又恢復起來僧徒的品格低落他們受持根本說一切有部律竟然說沒有全部毀犯四根本戒而懺悔的還算是苾芻依常規犯一種根本戒就不是比丘而要逐出僧團的所以受到世親的嚴厲呵責此言凶勃若如是人猶有苾芻性應自歸禮如是類苾芻阿毗達磨俱舍論卷十五近代祕密行者陳健民在所著禪海燈塔十章中說此時宜離鄉別井遠走生疏地帶佯為瘋子向禮教不重之邊地如西康西藏一帶可得許多機會既不會遭官家之刑罰亦不受士大夫階級之批評此時已早有神通康藏一帶婦女自知前來以身供養工夫因此必大長進依陳氏的意思參禪到家了還要進一層就是在男女和合上下工夫他不願受禮教社會文明的約束贊同不重禮教的邊地其實康藏地區受千百年來祕密欲樂宗教信仰的熏習加上政教合一女人才會自動來奉獻身體否則文化落後的邊地不一定能讓祕密行者稱心如意一切不必說罽賓佛教受到幻術魔力一夜已得是法的影響遭到破壞是佛教史上的慘痛事件純正的佛弟子應多多為佛教著想下缺
